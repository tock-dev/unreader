<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>un-reader BBS - Chat</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org/face/symbola/css/symbola.css" type="text/css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="bbs.css" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.2/purify.min.js"></script>
  <script src="common.js"></script>
  <style type="text/css">
    #active-users {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #roster-list,
    #dm-list {
      max-height: 150px;
      overflow-y: auto;
      background: white;
    }

    .roster-user {
      padding: 4px 8px;
      border-bottom: 1px solid #eee;
      font-size: 11px;
    }

    .roster-name {
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
    }

    .nav-item {
      padding: 6px 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-size: 11px;
      background: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover {
      background: #f0f0f0;
    }

    .nav-item-active {
      background-color: #000000 !important;
      color: #ffffff !important;
      font-weight: bold;
    }

    .mod-indicator-btn {
      background: #fff;
      border: 2px dashed red !important;
      color: red;
      width: 95%;
      font-weight: bold;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 0;
      text-align: center;
    }

    .mod-indicator-active {
      background: red !important;
      color: white !important;
      border-style: solid !important;
    }

    .page-btn {
      background: #ffffff;
      border: var(--border);
      padding: 2px 8px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
      box-shadow: 1px 1px 0 black;
    }

    #page-display-index {
      margin: 0 10px;
      font-weight: bold;
      font-size: 12px;
    }

    .message-container {
      width: 100%;
      margin-bottom: 10px;
      clear: both;
      display: block;
      position: relative;
    }

    .message {
      border: var(--border);
      padding: 6px 10px;
      max-width: 75%;
      width: auto;
      position: relative;
      background: white;
      box-shadow: 2px 2px 0px black;
    }

    .message-meta {
      font-size: 10px;
      font-weight: bold;
      color: #555;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .message-text {
      font-size: 13px;
      white-space: pre-wrap;
      line-height: 1.3;
      color: black;
    }

    .my-msg {
      border-style: dashed;
    }

    .other-msg {
      border-style: solid;
    }

    .purged-msg {
      border-style: dotted !important;
      background: #fafafa !important;
      opacity: 0.6;
    }

    .admin-msg .message-text,
    .admin-msg .message-meta {
      color: white !important;
    }

    .user-delete-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      border: 1px dashed black;
      background: white;
      font-size: 9px;
      cursor: pointer;
      padding: 0 4px;
      font-family: monospace;
    }

    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10000;
    }

    #modal-overlay .info-window {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      height: 60vh;
      background: rgba(255, 255, 255);
      border: var(--border);
      box-shadow: var(--shadow);
      overflow-y: auto;
    }
  </style>
</head>

<body>
  <div id="modal-overlay" class='hide' onclick="closeInfoModal()">
    <div class="info-window" onclick="event.stopPropagation()">
      <div class="title-bar">
        <div class="title-stripes"></div>
        <div class="title-text" id="modal-title">GET INFO</div>
        <button class='paper-btn'
          style='position: absolute; right: 8px; width: 3.5ex; height: 3.5ex; box-shadow: 1px 1px 0px black;'
          onclick="closeInfoModal()"> X
        </button>
      </div>
      <div class="info-body" id="modal-content">
        <div id="profile-view">
          <div style="font-size: 24px; text-align: center; margin: 8px" id="info-avatar">
            👤
          </div>
          <div style="font-weight: bold; margin: 6px">
            User: <span id="info-username"></span>
          </div>
          <div style="margin: 6px">
            Location: <span id="info-location"></span>
          </div>
          <div style="
                border: 1px solid black;
                padding: 6px;
                background: #fafafa;
                min-height: 40px;
                margin: 6px;
                word-break: break-all;
              " id="info-bio"></div>

          <div id="info-edit-controls" class='hide' style="
                display: flex;
                flex-direction: column;
                align-items: stretch;
                border-top: 1px dashed black;
                padding-top: 8px;
                margin: 8px;
              ">
            <div style="display: flex;">
              <input type="text" id="edit-avatar" class='paper-input' placeholder="Emoji" style="
                    width: min-content;
                    min-width: 0;
                    text-align: center;
                  " />
              <input type="text" id="edit-location" placeholder="Location..." class='paper-input' style="
                    flex-grow: 1;
                    margin-left: 6px;
                  " />
            </div>
            <textarea id="edit-bio" placeholder="Bio description..." class='paper-input' style="
                  margin-top: 6px;
                  resize: none;
                  height: max-content;
                "></textarea>
            <button onclick="saveProfileChanges()" class='paper-btn' style="margin-top: 6px;">
              SAVE PROFILE
            </button>

            <div style="
                  border-top: 1px dotted black;
                  padding-top: 8px;
                  margin-top: 8px;
                ">
              <span style="
                    font-size: 14px;
                    font-weight: bold;
                    display: block;
                  ">SECURITY PREFERENCE:</span>
              <div style="display: flex; align-items: stretch; margin-top: 6px;">
                <input type="password" id="change-pass-current" placeholder="Current Password"
                  class='paper-input' style="flex-grow: 1; margin-right: 6px; min-width: 0;" />
                <input type="password" id="change-pass-new" placeholder="New Password"
                  class='paper-input' style="flex-grow: 1; margin-right: 6px; min-width: 0;" />
                <button onclick="submitPasswordChange()" class='paper-btn'>
                  UPDATE PASSWORD
                </button>
              </div>
            </div>
          </div>

          <div id="admin-controls" class='hide' style="
                border-top: 2px solid black;
                padding-top: 8px;
                margin-top: 8px;
              ">
            <span style="
                  font-size: 10px;
                  font-weight: bold;
                  display: block;
                  margin: 4px;
                  color: red;
                ">SYSTEM OPERATOR COMMANDS:</span>
            <div style="display: flex; margin: 6px;">
              <button id="admin-ban-btn" class='paper-btn' style="width: calc(50% - 3px); margin-right: 6px">
                BAN
              </button>
              <button id="admin-pardon-btn" class='paper-btn' style="width: calc(50% - 3px);">
                PARDON
              </button>
            </div>
            <div style="margin: 6px; display: flex;">
              <input type="number" id="admin-timeout-dur" value="60" class='paper-input' style="width: min-content; margin-right: 6px; min-width: 0;" />
              <button id="admin-timeout-btn" class='paper-btn' style="flex-grow: 1;">
                TIMEOUT (MINS)
              </button>
            </div>
          </div>

          <button id="info-dm-btn" class='paper-btn' style="
                width: calc(100% - 12px);
                box-sizing: border-box;
                font-family: monospace;
                font-weight: bold;
                padding: 4px;
                cursor: pointer;
                margin: 6px;
              ">
            SEND DIRECT MESSAGE
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="auth-screen">
    <div class="auth-box">
      <h2 id="auth-title" style="margin-top: 0">LOGIN</h2>
      <input type="text" id="auth-user" placeholder="Username" autocomplete="off" />
      <input type="password" id="auth-pass" placeholder="Password" />
      <button id="auth-submit-btn">SUBMIT</button>
      <div id="auth-toggle" style="
            font-size: 11px;
            margin-top: 12px;
            cursor: pointer;
            text-decoration: underline;
            color: blue;
            font-weight: bold;
          ">
        Need an account? Register
      </div>
    </div>
  </div>

  <div class="window">
    <div class="title-bar">
      <div class="title-stripes"></div>
      <button id="back-btn" onclick="window.location.href = 'index.html'">
        ◀ HOME
      </button>
      <div class="title-text">un-reader BBS - Chat</div>
      <span id="user-display" onclick="openProfileModal(myUsername)"></span>
    </div>

    <div id="workspace-table">
      <div id="sidebar-cell">
        <div class="panel-header">Main Spaces</div>
        <div class="nav-item nav-item-active" id="nav-public" onclick="switchChannel( 'public', '' )">
          All of Unreader Chat
        </div>

        <div class="panel-header">Direct Messages</div>
        <div class="sidebar-input-container">
          <input type="text" id="dm-target-input" class="sidebar-input" placeholder="Username..." />
          <button class="sidebar-btn" onclick="triggerAddDM()">CHAT</button>
        </div>
        <div id="dm-list"></div>

        <div class="panel-header" id="active-users">
          <div>Active Users</div>
          <button id='kick-all-btn' class="sidebar-btn hide" style="margin:0;" onclick='kickAllUsers()'>KICK ALL</button>
        </div>
        <div id="roster-list"></div>

        <div class="panel-header">System Operations</div>
        <div id="settings-box-container" style="padding: 6px">
          <div id="mod-toggle-container" style="display: none; margin-bottom: 4px">
            <button id="mod-mode-btn" class="mod-indicator-btn" onclick="toggleModMode()">
              MOD MODE: OFF
            </button>
            <button id="modmenu-link-btn" style="
                    width: 95%;
                    font-family: monospace;
                    font-size: 10px;
                    margin-top: 4px;
                    cursor: pointer;
                    border: 1px solid black;
                    background: white;
                  " onclick="window.location.href = 'modmenu.html'">
              MODERATION APP
            </button>
          </div>
        </div>
      </div>
      <div id="chat-cell">
        <div id="pagination-header-bar">
          <button class="page-btn" onclick="jumpPage(-1)">
            &lt; NEWER
          </button>
          <span id="page-display-index">PAGE: 0</span>
          <button class="page-btn" onclick="jumpPage(1)">OLDER &gt;</button>
        </div>

        <div id="chat-scroll-wrapper"></div>

        <div id="input-bar-container">
          <textarea id="content" placeholder="Type message here..." autocomplete="off"></textarea>
          <button id="send">SEND</button>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      var token = localStorage.getItem("token");
      var myUsername = localStorage.getItem("username");
      var currentMode = "public";
      var currentTarget = "";
      var socket = null;
      var isRegisterMode = false;
      var currentHistoryIndex = 0;
      var modModeActive = false;
      var userRoles = { is_admin: false, is_moderator: false };

      function toggleModMode() {
        modModeActive = !modModeActive;
        log("Mod mode toggle state:", modModeActive);
        var btn = document.getElementById("mod-mode-btn");
        btn.textContent = modModeActive ? "MOD MODE: ACTIVE" : "MOD MODE: OFF";
        btn.className = modModeActive
          ? "mod-indicator-btn mod-indicator-active"
          : "mod-indicator-btn";
        loadHistory();
      }

      document.getElementById("auth-toggle").onclick = function () {
        isRegisterMode = !isRegisterMode;
        log("Auth mode toggled. isRegisterMode:", isRegisterMode);
        document.getElementById("auth-title").textContent = isRegisterMode
          ? "REGISTER"
          : "LOGIN";
        this.textContent = isRegisterMode
          ? "Already have an account? Login"
          : "Need an account? Register";
      };

      document.getElementById("auth-submit-btn").onclick = async function () {
        var username = document.getElementById("auth-user").value.trim();
        var password = document.getElementById("auth-pass").value;
        if (!username || !password)
          return await unAlert("Fill in all log credentials.");
        var url = isRegisterMode ? "/api/register" : "/api/login";
        log("Auth submit. endpoint:", url, "user:", username);
        var xhr = new XMLHttpRequest();
        xhr.open("POST", BACKEND_URL + url, true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.onreadystatechange = async function () {
          if (xhr.readyState === 4) {
            log("Auth XHR complete. status:", xhr.status);
            if (xhr.status === 200) {
              try {
                var data = JSON.parse(xhr.responseText);
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.username);
                token = data.token;
                myUsername = data.username;
                applySavedPreferences();
                initApp(false);
              } catch (e) {
                log("Auth JSON parse error:", e);
                await unAlert("Server returned an invalid packet signature.");
              }
            } else {
              log("Auth failed. buffer:", xhr.responseText);
              try {
                var errData = JSON.parse(xhr.responseText);
                await unAlert("Server error: " + (errData.error || "Access Denied"));
              } catch (e) {
                await unAlert("Structural connection failure.");
              }
            }
          }
        };
        xhr.send(JSON.stringify({ username: username, password: password }));
      };

      function initApp(secondTry) {
        log("Booting application logic layers.");
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("user-display").textContent = "@" + myUsername;

        if (socket) {
          try {
            socket.close();
          } catch (e) { }
        }
        log("Opening WS link:", WS_URL);
        socket = new WebSocket(WS_URL);
        socket.onopen = function () {
          log("WS Link connected. Authenticating...");
          socket.send(JSON.stringify({ type: "auth", token: token }));
        };
        socket.onmessage = async function (event) {
          var data = JSON.parse(event.data);
          log("Incoming packet:", data.type);
          if (data.type === "terminated") {
            await unAlert(data.reason || "Session expired.");
            localStorage.clear();
            window.location.reload();
            return;
          }
          if (data.type === "auth_success") {
            if (data.userRoles.is_admin) {
              show('#kick-all-btn')
            }
            return;
          }
          if (data.type === "error_alert") {
            await unAlert(data.message);
            return;
          }
          if (data.type === "refresh_feed") {
            log("Broadcast: refresh_feed received.");
            loadHistory();
            return;
          }
          if (data.type === "roster_update") {
            renderUserRoster(data.users);
            return;
          }
          if (data.type === "topics_update") {
            if (data.user_roles) {
              userRoles = data.user_roles;
              log("Roles updated:", userRoles);
              if (userRoles.is_admin || userRoles.is_moderator) {
                document.getElementById("mod-toggle-container").style.display =
                  "block";
                localStorage.setItem("unreader-rank", "mod");
              } else {
                localStorage.setItem("unreader-rank", "user");
              }
            }
            return;
          }
          if (currentHistoryIndex === 0) loadHistory();
        };
        let exit = false;
        socket.onclose = function () {
          log("WS Link disconnected");
          if (!secondTry || secondTry === false)
            setTimeout(initApp, 5000, true);
          else
            exit = true;
        }
        if (exit) {
          localStorage.clear();
          window.location.reload();
        }
        loadDMContacts();
        loadHistory();
      }

      var onlineUsers = [];
      function renderUserRoster(userList) {
        onlineUsers = userList;
        var container = document.getElementById("roster-list");
        container.innerHTML = "";

        var sysDiv = document.createElement("div");
        sysDiv.className = "roster-user";
        sysDiv.style.display = "flex";
        sysDiv.style.justifyContent = "space-between";
        var sysSpan = document.createElement("span");
        sysSpan.className = "roster-name";
        sysSpan.textContent = "system (Global)";
        sysSpan.onclick = function() { openProfileModal("system"); };
        sysDiv.appendChild(sysSpan);
        container.appendChild(sysDiv);

        for (var i = 0; i < userList.length; i++) {
          var u = userList[i];
          if (u.username === "system") continue; 
          var div = document.createElement("div");
          div.className = "roster-user";
          div.style.display = "flex";
          div.style.justifyContent = "space-between";
          var span = document.createElement("span");
          span.className = "roster-name";
          var context = u.mode === "public" ? " (Global)" : u.mode === "dm" ? " (DM @" + u.target + ")" : " (" + u.target + ")";
          span.textContent = u.username + context;
          (function (user) {
            span.onclick = function () {
              openProfileModal(user.username);
            };
          })(u);
          div.appendChild(span);
          log("Showing online user: " + u.username +
            (u.mode === "public" ? " (Global)" : u.mode === "dm" ? " (DM @" + u.target + ")" : " (" + u.target + ")") +
            " who " + ((userRoles.is_admin || userRoles.is_moderator)
              && u.username !== myUsername ? "can" : "cannot") + " be kicked.");
          if (u.username !== myUsername
            && (userRoles.is_admin ||
            (userRoles.is_moderator
            && !u.userRoles.is_admin))) {
            const username = u.username;
            var kick = document.createElement("button");
            kick.className = "sidebar-btn";
            kick.textContent = "KICK";
            kick.onclick = function () {
              kickUser(username);
            };
            div.appendChild(kick);
          }
          container.appendChild(div);
        }
      }

      function loadDMContacts() {
        log("Syncing DM contacts.");
        var xhr = new XMLHttpRequest();
        xhr.open("GET", BACKEND_URL + "/dm-contacts", true);
        xhr.setRequestHeader("Authorization", "Bearer " + token);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            var contacts = JSON.parse(xhr.responseText);
            for (var i = 0; i < contacts.length; i++) {
              ensureDMNavOption(contacts[i]);
            }
          }
        };
        xhr.send();
      }

      function ensureDMNavOption(username) {
        if (
          document.getElementById("nav-dm-" + username) ||
          username === myUsername
        )
          return;
        var item = document.createElement("div");
        item.className = "nav-item";
        item.id = "nav-dm-" + username;
        item.textContent = "💬 " + username;
        item.onclick = function () {
          switchChannel("dm", username);
        };
        document.getElementById("dm-list").appendChild(item);
      }

      function triggerAddDM() {
        var inp = document.getElementById("dm-target-input");
        var target = inp.value.trim();
        if (!target || target === myUsername) return;
        ensureDMNavOption(target);
        switchChannel("dm", target);
        inp.value = "";
      }

      function switchChannel(mode, target) {
        log("Switching UI space. mode:", mode, "target:", target);
        currentMode = mode;
        currentTarget = target || "";
        currentHistoryIndex = 0;

        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ type: "switch_context", mode: mode, target: target }));
        }

        var items = document.getElementsByClassName("nav-item");
        for (var i = 0; i < items.length; i++) items[i].className = "nav-item";
        if (mode === "public")
          document.getElementById("nav-public").className =
            "nav-item nav-item-active";
        else if (mode === "dm") {
          ensureDMNavOption(target);
          document.getElementById("nav-dm-" + target).className =
            "nav-item nav-item-active";
        }
        loadHistory();
      }

      function appendMessage(data) {
        // --- CLIENT-SIDE INTERCEPTION SPOOFING FLAG ---
        if (data.content && data.content.startsWith("\u200B[SYSTEM_BOT]\u200B")) {
          data.username = "system"; // Forces UI to parse identity as system
          data.content = data.content.replace("\u200B[SYSTEM_BOT]\u200B", ""); // Clear raw tag block
          data.is_admin = false; // STRIP ADMIN PRIVILEGES FROM SENDER TO PREVENT BADGE CLONING
          data.is_system_bot = true; // Inject pure layout flag for distinct system rank rendering
        }
        // ----------------------------------------------

        log("APPEND_MESSAGE payload details:", JSON.stringify(data));
        var chatWrapper = document.getElementById("chat-scroll-wrapper");
        var containerDiv = document.createElement("div");
        containerDiv.className = "message-container";
        var msgDiv = document.createElement("div");
        msgDiv.id = "msg-id-" + data.id;
        var effectiveUsername = data.username || data.sender || "UNKNOWN_NODE";
        var isMe = effectiveUsername === myUsername;
        msgDiv.style.float = isMe ? "right" : "left";

        var styleClass = "message ";
        if (data.is_deleted) styleClass += "purged-msg";
        else {
          if (data.is_system_bot) styleClass += "mod-msg"; // Uses clean system box styling
          else if (data.is_admin) styleClass += "admin-msg";
          else if (data.is_moderator || effectiveUsername === "system") styleClass += "mod-msg";
          else styleClass += isMe ? "my-msg" : "other-msg";
        }
        msgDiv.className = styleClass;

        var timeStr = formatTimeToken(data.timestamp);
        var meta = document.createElement("div");
        meta.className = "message-meta";
        meta.style.cursor = "pointer";
        
        // Render precise SYSTEM rank tag instead of copying your Admin title
        var nameDisplay =
          (data.is_system_bot ? "SYSTEM " : data.is_admin ? "ADMIN " : (data.is_moderator || effectiveUsername === "system") ? "MOD " : "")
          + "@" + effectiveUsername;
        meta.textContent = nameDisplay + " • " + timeStr;
        (function (username) {
          meta.onclick = function () {
            openProfileModal(username);
          };
        })(effectiveUsername);

        var txtBody = document.createElement("div");
        txtBody.className = "message-text";
        msgDiv.appendChild(meta);
        msgDiv.appendChild(txtBody);

        if (data.is_deleted) {
          txtBody.innerHTML = "<em>[MESSAGE PURGED]</em>";
        } else {
          txtBody.innerHTML = parseMarkup(data.content);
          if (isMe && data.id !== -1) {
            var selfDelBtn = document.createElement("button");
            selfDelBtn.className = "user-delete-btn";
            selfDelBtn.textContent = "X";
            selfDelBtn.onclick = async function () {
              if (await unConfirm("Delete message?"))
                sendModAction("mod_delete", data.id);
            };
            msgDiv.appendChild(selfDelBtn);
          }
        }
        containerDiv.appendChild(msgDiv);
        injectModTray(containerDiv, data, isMe);
        chatWrapper.appendChild(containerDiv);
        chatWrapper.scrollTop = chatWrapper.scrollHeight;
      }

      function injectModTray(targetNode, data, isMe) {
        if (
          (!userRoles.is_admin && !userRoles.is_moderator) ||
          !modModeActive ||
          data.id === -1
        )
          return;
        var trayDiv = document.createElement("div");
        trayDiv.className = "mod-action-tray";
        trayDiv.style.float = isMe ? "right" : "left";
        trayDiv.style.clear = "both";

        if (!data.is_deleted) {
          var dBtn = document.createElement("button");
          dBtn.className = "mod-tray-btn";
          dBtn.textContent = "PURGE";
          dBtn.onclick = async function () {
            var r = userRoles.is_admin
              ? "Admin doesn't need any reasons"
              : await unPrompt('Reason for purge?');
            if (r !== null) sendModAction("mod_delete", data.id, r);
          };
          trayDiv.appendChild(dBtn);
        }
        else {
          if (
            userRoles.is_admin ||
            (userRoles.is_moderator && data.deleted_by === myUsername)
          ) {
            var rBtn = document.createElement("button");
            rBtn.className = "mod-tray-btn";
            rBtn.textContent = "RESTORE";
            rBtn.onclick = function () {
              log("Sending restore packet for id:", data.id);
              sendModAction("mod_restore", data.id);
            };
            trayDiv.appendChild(rBtn);
          }
        }
        targetNode.appendChild(trayDiv);
      }

      function sendModAction(type, id, reason) {
        log("Dispatching moderator action packet:", type);
        socket.send(
          JSON.stringify({
            type: type,
            id: id,
            channel: currentMode,
            reason: reason,
          }),
        );
      }

      async function kickUser(username) {
        if (!socket || socket.readyState !== WebSocket.OPEN)
          return await unAlert('Socket offline.');
        var reason = userRoles.is_admin ? 'Admin doesn\'t need any reasons' : await unPrompt('Reason for kick?');
        if (!userRoles.is_admin && !reason) return;
        var payload = {
          type: 'mod_kick',
          target: username,
          reason: reason,
        };
        log('Sending mod_kick packet for:', username, payload);
        socket.send(JSON.stringify(payload));
      }

      function kickAllUsers() {
        for (const user of onlineUsers) {
          const username = user.username;
          if (username === myUsername || user.userRoles.is_admin) continue;
          kickUser(username);
        }
      }

      function jumpPage(val) {
        currentHistoryIndex = Math.max(0, currentHistoryIndex + val);
        loadHistory();
      }

      function loadHistory() {
        log(
          "Refreshing data view. space:",
          currentMode,
          "index:",
          currentHistoryIndex,
        );
        var wrapper = document.getElementById("chat-scroll-wrapper");
        wrapper.innerHTML = "";
        var xhr = new XMLHttpRequest();
        var endpoint = "/history?index=";
        if (currentMode === "dm")
          endpoint = "/dm-history?target=" + currentTarget + "&index=";
        xhr.open("GET", BACKEND_URL + endpoint + currentHistoryIndex, true);
        if (token) xhr.setRequestHeader("Authorization", "Bearer " + token);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            log("History stream synced.");
            var data = JSON.parse(xhr.responseText);
            document.getElementById("page-display-index").textContent =
              "PAGE: " + currentHistoryIndex;
            for (var i = 0; i < data.length; i++) {
              appendMessage(data[i]);
            }

            // ---- SERVER-SIDE PERSISTENCE DETECTOR FOR ALT BOT ACCOUNT ----
            if (data.length > 0 && myUsername === "system" && currentHistoryIndex === 0) {
              var latestMsg = data.reduce((max, msg) => (msg.id > max.id ? msg : max), data[0]);
              var lastRespondedId = localStorage.getItem("sys_last_id");
              
              if (lastRespondedId === null) {
                localStorage.setItem("sys_last_id", latestMsg.id);
                return;
              }

              if (latestMsg && String(latestMsg.id) !== String(lastRespondedId) && latestMsg.username !== "system") {
                if (latestMsg.content.trim().startsWith("@system")) {
                  localStorage.setItem("sys_last_id", latestMsg.id);
                  var query = latestMsg.content.trim().substring(7).trim();
                  simulateSystemSearch(query, latestMsg.username);
                }
              }
            }
            // -------------------------------------------------------------
          }
        };
        xhr.send();
      }

      function sendMessage() {
        var input = document.getElementById("content");
        var text = input.value.trim();
        if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;

        // GLOBAL CHAT INTERCEPT: Checks for the @system keyword in both public and DMs
        if (text.startsWith("@system")) {
          log("Global decentralized AI intercept sequence triggered.");

          // 1. Instantly send out your query block so the rest of the BBS sees your prompt
          socket.send(
            JSON.stringify({
              type: currentMode === "public" ? "message" : "dm",
              content: text,
              target: currentTarget,
            }),
          );
          input.value = "";

          // 2. Extract your query and run it through the decentralized generator link
          var query = text.substring(7).trim();
          processGlobalAICore(query, currentMode, currentTarget);
          return;
        }

        log("Dispatching message packet stream.");
        socket.send(
          JSON.stringify({
            type: currentMode === "public" ? "message" : "dm",
            content: text,
            target: currentTarget,
          }),
        );
        input.value = "";
      }

      function dispatchSystemResponse(outputText, senderUsername) {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(
            JSON.stringify({
              type: currentMode === "public" ? "message" : "dm",
              content: outputText,
              target: currentMode === "public" ? "" : senderUsername,

          );

      // -----------------------------------------------------------------

      document.getElementById("send").onclick = sendMessage;
      document.getElementById("content").onkeydown = function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };
      document.getElementById("content").oninput = function () {
        this.style.height = "auto";
        this.style.height = this.scrollHeight + "px";
      };

      function openProfileModal(targetUser) {
        log("Pulling profile metadata for:", targetUser);
        var xhr = new XMLHttpRequest();
        xhr.open("GET", BACKEND_URL + "/api/profile/" + targetUser, true);
        xhr.setRequestHeader("Authorization", "Bearer " + token);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            var p = JSON.parse(xhr.responseText);
            showProfileInModal(p);
          }
        };
        xhr.send();
      }

      function showProfileInModal(p) {
        log("Profile modal view active.");
        if (!p) {
          show('#modal-overlay')
          return;
        }

        document.getElementById("info-username").textContent = p.username;
        document.getElementById("info-location").textContent = p.location;
        document.getElementById("info-bio").textContent = p.bio;
        document.getElementById("info-avatar").textContent = p.avatar_emoji;

        var isSelf = p.username === myUsername;
        document.getElementById("info-dm-btn").onclick = function () {
          closeInfoModal();
          switchChannel("dm", p.username);
        };

        if (isSelf) {
          document.querySelector('#info-edit-controls').style.display = 'flex';
          hide('#info-dm-btn');
          document.getElementById("edit-avatar").value = p.avatar_emoji;
          document.getElementById("edit-location").value = p.location;
          document.getElementById("edit-bio").value = p.bio;
          document.getElementById("change-pass-current").value = "";
          document.getElementById("change-pass-new").value = "";
        } else {
          document.querySelector('#info-edit-controls').style.display = 'none';
          show('#info-dm-btn');
        }

        if (userRoles.is_admin) {
          show('#admin-controls')
          show('#admin-ban-btn')
          show('#admin-pardon-btn')
          show('#admin-timeout-btn')
          document.getElementById("admin-ban-btn").onclick = async function () {
            if (await unConfirm("Ban " + p.username + "?"))
              socket.send(
                JSON.stringify({ type: "mod_ban", target: p.username }),
              );
          };
          document.getElementById("admin-pardon-btn").onclick = function () {
            socket.send(
              JSON.stringify({ type: "mod_pardon", target: p.username }),
            );
          };
          document.getElementById("admin-timeout-btn").onclick = async function () {
            var dur = document.getElementById("admin-timeout-dur").value;
            var r = userRoles.is_admin
              ? "Admin doesn't need any reasons"
              : await unPrompt('Reason for timeout?');
            socket.send(
              JSON.stringify({
                type: "mod_timeout",
                target: p.username,
                duration: dur,
                reason: r,
              }),
            );
          };
        } else if (userRoles.is_moderator && !isSelf) {
          show('#admin-controls')
          hide('#admin-ban-btn')
          hide('#admin-pardon-btn')
          show('#admin-timeout-btn')
          document.getElementById("admin-timeout-btn").onclick = async function () {
            var dur = document.getElementById("admin-timeout-dur").value;
            var r = userRoles.is_admin
              ? "Admin doesn't need any reasons"
              : await unPrompt('Reason for timeout?');
            if (r)
              socket.send(
                JSON.stringify({
                  type: "mod_timeout",
                  target: p.username,
                  duration: dur,
                  reason: r,
                }),
              );
          };
        } else {
          hide('#admin-controls')
        }
        show('#modal-overlay')
      }

      function closeInfoModal() {
        hide('#modal-overlay')
      }

      function saveProfileChanges() {
        var av = document.getElementById("edit-avatar").value.trim();
        var loc = document.getElementById("edit-location").value.trim();
        var bio = document.getElementById("edit-bio").value.trim();
        log("Sending profile update packet.");
        var xhr = new XMLHttpRequest();
        xhr.open("POST", BACKEND_URL + "/api/profile", true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Authorization", "Bearer " + token);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            closeInfoModal();
            openProfileModal(myUsername);
          }
        };
        xhr.send(JSON.stringify({ bio: bio, location: loc, avatar_emoji: av }));
      }

      async function submitPasswordChange() {
        var currentPass = document.getElementById("change-pass-current").value;
        var newPass = document.getElementById("change-pass-new").value;
        if (!currentPass || !newPass)
          return await unAlert("Please fill out both password fields.");
        log("Sending security parameter update packet.");
        var xhr = new XMLHttpRequest();
        xhr.open("POST", BACKEND_URL + "/api/change-password", true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Authorization", "Bearer " + token);
        xhr.onreadystatechange = async function () {
          if (xhr.readyState === 4) {
            var res = JSON.parse(xhr.responseText);
            if (xhr.status === 200 && res.success) {
              await unAlert("Password updated!");
              closeInfoModal();
            } else await unAlert(res.error || "Failed to update password.");
          }
        };
        xhr.send(
          JSON.stringify({
            currentPassword: currentPass,
            newPassword: newPass,
          }),
        );
      }

      if (token && myUsername) {
        initApp(false);
      }
    </script>
