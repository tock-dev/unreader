<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Un-Reader Dashboard</title>
  <style>
    /* --- E-ink Core Architecture --- */
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --border-color: #000000;
      --border-width: 3px;
      --body-font: "Courier New", Courier, monospace; /* Classic E-Reader feel */
    }

    body.dark-mode {
      --bg-color: #000000;
      --text-color: #ffffff;
      --border-color: #ffffff;
    }

    * { box-sizing: border-box; transition: none !important; animation: none !important; border-radius: 0 !important; }

    html, body {
      width: 100%; height: 100%; margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-color);
      font-family: var(--body-font); user-select: none; overflow: hidden;
    }

    /* --- Shell --- */
    .top-bar {
      display: flex; justify-content: space-between; padding: 10px;
      border-bottom: var(--border-width) solid var(--border-color);
      font-weight: bold;
    }

    .apps-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; padding: 20px;
    }

    /* --- Kindle App Items --- */
    .app-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; border: var(--border-width) solid var(--border-color);
      padding: 15px; cursor: pointer;
    }

    .app-item:active { background: var(--text-color); color: var(--bg-color); }

    .app-icon {
      width: 32px; height: 32px;
      border: 3px solid var(--text-color);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .app-item:active .app-icon { border-color: var(--bg-color); }

    /* --- Overlays --- */
    .fullscreen-view {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color); z-index: 2000; padding: 20px;
    }

    .modal-btn {
      border: 3px solid var(--text-color); background: var(--bg-color);
      color: var(--text-color); padding: 10px; font-weight: bold; cursor: pointer;
      width: 100%; margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <span>Un-Reader</span>
    <span id="settings-trigger" style="text-decoration: underline;">Settings</span>
  </div>

  <div class="apps-grid" id="apps-container"></div>

  <div class="fullscreen-view" id="settings-view">
    <h2>Settings</h2>
    <button class="modal-btn" onclick="document.getElementById('settings-view').style.display='none'">Back</button>
    <button class="modal-btn" id="toggle-darkmode">Toggle Dark/Light Mode</button>
  </div>

  <script>
    const APP_DATABASE = [
      { name: 'Chat', icon: '💬' },
      { name: 'Topics', icon: '📝' },
      { name: 'Nearby', icon: '📍' },
      { name: 'AI', icon: '🤖' },
      { name: 'Calc', icon: '🔢' },
      { name: 'Discord', icon: '🔗' }
    ];

    function buildGrid() {
      const container = document.getElementById('apps-container');
      container.innerHTML = '';
      APP_DATABASE.forEach(app => {
        const div = document.createElement('div');
        div.className = 'app-item';
        div.innerHTML = `<div class="app-icon">${app.icon}</div><div style="font-weight:bold">${app.name}</div>`;
        div.onclick = () => {
          // Add flash effect for Kindle realism
          document.body.style.filter = 'invert(1)';
          setTimeout(() => document.body.style.filter = 'invert(0)', 100);
        };
        container.appendChild(div);
      });
    }

    document.getElementById('settings-trigger').onclick = () => document.getElementById('settings-view').style.display = 'block';
    
    document.getElementById('toggle-darkmode').onclick = () => {
      document.body.classList.toggle('dark-mode');
    };

    buildGrid();
  </script>
</body>
</html>
