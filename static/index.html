<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>un-reader</title>
  <style type="text/css">
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      height: 100%; width: 100%;
      font-family: monospace; background-color: #f0f0f0;
    }
    .paper { 
      border: 3px solid black; background-color: white; 
      color: black; margin: 2px;
    }
    #title-bar { 
      padding: 4px; height: 40px; background-color: white;
      text-transform: uppercase; letter-spacing: 1px;
    }
    #title-bar h1 { font-size: 16px; margin: 0; float: left; padding: 8px; }
    #title-right { float: right; padding: 8px; }
    #logout-btn { cursor: pointer; padding: 2px 8px; font-family: monospace; font-size: 11px;}
    
    #workspace-table {
      width: 100%; height: 90%; border-collapse: collapse; table-layout: fixed;
    }
    #sidebar-cell {
      width: 220px; background: #e6e6e6; border-right: 3px solid black;
      vertical-align: top; padding: 0;
    }
    #chat-cell {
      vertical-align: top; padding: 0; position: relative; background-color: #f0f0f0;
    }
    
    .panel-header { font-weight: bold; padding: 8px; text-transform: uppercase; border-bottom: 2px solid black; background: white; font-size: 12px; }
    .nav-item { padding: 10px; cursor: pointer; border-bottom: 1px solid black; font-size: 13px; background: white; margin: 2px; }
    .nav-item-active { background-color: black !important; color: white !important; }
    #dm-target-input { margin: 4px; padding: 6px; font-family: monospace; font-size: 12px; outline: none; width: 190px; }

    #chat-scroll-wrapper {
      position: absolute; top: 0; bottom: 60px; left: 0; right: 0; overflow-y: scroll; padding: 15px;
    }
    
    #typing-indicator { position: absolute; bottom: 65px; left: 15px; font-size: 11px; font-weight: bold; color: #555; font-style: italic; height: 15px; }
    
    #input-bar-container {
      position: absolute; bottom: 2px; left: 2px; right: 2px; height: 50px; background-color: lightgray; padding: 6px; box-sizing: border-box;
    }
    #content { float: left; width: 75%; padding: 8px; font-size: 14px; font-family: monospace; outline: none; }
    #send { float: right; width: 20%; height: 36px; cursor: pointer; font-family: monospace; font-weight: bold; font-size: 14px; background: white; }

    .message-container { width: 100%; margin-bottom: 12px; clear: both; }
    .message { border: 2px solid black; padding: 8px 12px; max-width: 70%; width: auto; box-shadow: 2px 2px 0px black; position: relative; }
    .message-meta { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 4px; }
    .message-text { font-size: 14px; white-space: pre-wrap; }
    
    .my-msg { float: right; background-color: #e2f0cb; text-align: left; }
    .other-msg { float: left; background-color: white; }

    .boss-msg {
      float: right;
      background: #ffe066 !important;
      border: 4px solid black !important;
      box-shadow: 4px 4px 0px #00ffff, 6px 6px 0px #000000 !important;
      animation: neonPulse 2s infinite alternate;
    }
    .boss-meta {
      color: #7a00cc !important;
      font-weight: bold !important;
    }
    @keyframes neonPulse {
      0% { transform: translateY(0); }
      100% { transform: translateY(-2px); }
    }

    .del-btn {
      position: absolute; top: 4px; right: 4px; color: red; border: 1px solid red;
      font-size: 10px; cursor: pointer; background: white; padding: 0 4px; font-weight: bold;
    }

    #mod-box-container, #settings-box-container {
      margin: 4px; padding: 6px; background: #ffcccc; border: 2px dashed red;
    }
    #settings-box-container { background: #e0e0e0; border: 2px solid black; }
    .mod-input, .settings-input { width: 90%; padding: 4px; margin-bottom: 4px; font-family: monospace; font-size: 11px; }
    .mod-btn, .settings-btn { width: 95%; font-family: monospace; font-size: 11px; font-weight: bold; background: black; color: white; cursor: pointer; padding: 4px 0; border: none; }
    .settings-btn { background: #333; }

    #auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #222; display: block; z-index: 100; text-align: center; padding-top: 100px; }
    .auth-box { padding: 30px; width: 300px; margin: 0 auto; background: white; }
    .auth-box input { width: 90%; padding: 8px; margin: 8px 0; font-family: monospace; }
    .auth-box button { width: 97%; padding: 10px; margin-top: 10px; cursor: pointer; font-family: monospace; font-weight: bold; }
    .auth-toggle { font-size: 12px; margin-top: 15px; cursor: pointer; text-decoration: underline; color: blue; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="paper auth-box">
      <h2 id="auth-title" style="margin-top:0; text-transform:uppercase;">Login</h2>
      <input class="paper" type="text" id="auth-user" placeholder="Username" autocomplete="off">
      <input class="paper" type="password" id="auth-pass" placeholder="Password">
      <button class="paper" id="auth-submit">SUBMIT</button>
      <div id="auth-toggle" class="auth-toggle">Need to create an account? Register</div>
    </div>
  </div>

  <div class="paper" id="title-bar">
    <h1>un-reader</h1>
    <div id="title-right">
      <span id="user-display" style="font-size:12px; font-weight:bold; margin-right:10px;"></span>
      <button class="paper" id="logout-btn">LOGOUT</button>
    </div>
  </div>
  
  <table id="workspace-table">
    <tr>
      <td id="sidebar-cell">
        <div class="panel-header">Channels</div>
        <div class="nav-item nav-item-active" id="nav-public" onclick="switchChannel('public', '')">🌍 Global Chat</div>
        <div class="panel-header" style="border-top: 2px solid black;">Direct Messages</div>
        <input class="paper" type="text" id="dm-target-input" placeholder="+ Type user & press Enter..." autocomplete="off">
        <div id="dm-list"></div>
        
        <div class="panel-header" style="border-top: 2px solid black;">Account Settings</div>
        <div id="settings-box-container">
          <input type="password" id="settings-new-pass" class="paper settings-input" placeholder="New Password...">
          <button id="settings-save-btn" class="settings-btn">UPDATE PASSWORD</button>
        </div>

        <div id="mod-sidebar-panel" style="display: none;">
          <div class="panel-header" style="border-top: 2px dashed red; color: red;">SYS_OP PANEL</div>
          <div id="mod-box-container">
            <input type="text" id="mod-target-user" class="paper mod-input" placeholder="Target Username..." autocomplete="off">
            <button id="mod-kick-btn" class="mod-btn">TERMINATE USER SESSION</button>
          </div>
        </div>
      </td>
      <td id="chat-cell">
        <div id="chat-scroll-wrapper"></div>
        <div id="typing-indicator"></div>
        <div id="input-bar-container" class="paper">
          <input class="paper" type="text" id="content" placeholder="Enter a message..." autocomplete="off">
          <button class="paper" id="send">SEND</button>
        </div>
      </td>
    </tr>
  </table>

  <script type="text/javascript">
    // ⚠️ CONFIGURATION TARGET: UPDATE LINKS ACCORDING TO DEPLOYMENT PROFILES
    var BACKEND_URL = "https://unreader.onrender.com"; 
    var WS_URL = "wss://unreader.onrender.com";

    var token = localStorage.getItem('token');
    var myUsername = localStorage.getItem('username');
    var currentMode = 'public';
    var currentDMTarget = '';
    var socket = null;
    var isRegisterMode = false;
    var typingClearTimer = null;

    var authToggle = document.getElementById('auth-toggle');
    authToggle.onclick = function() {
      isRegisterMode = !isRegisterMode;
      document.getElementById('auth-title').textContent = isRegisterMode ? 'Register' : 'Login';
      authToggle.textContent = isRegisterMode ? 'Already have an account? Login' : 'Need to create an account? Register';
    };

    function isMasterAdmin(name) {
      return name === 'augustinejames' || name === 'tockdev';
    }

    document.getElementById('auth-submit').onclick = function() {
      var username = document.getElementById('auth-user').value.trim();
      var password = document.getElementById('auth-pass').value;
      if(!username || !password) return alert('Please fill in all fields');

      var url = isRegisterMode ? '/api/register' : '/api/login';
      
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200 || xhr.status === 401 || xhr.status === 400) {
            var data = JSON.parse(xhr.responseText);
            if(data.error) return alert(data.error);
            
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username);
            token = data.token;
            myUsername = data.username;
            initApp();
          } else {
            alert('Server pipeline connection failed. Status: ' + xhr.status);
          }
        }
      };
      xhr.send(JSON.stringify({ username: username, password: password }));
    };

    document.getElementById('settings-save-btn').onclick = function() {
      var newPassword = document.getElementById('settings-new-pass').value;
      if (!newPassword) return alert('Please input a fresh password string');

      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/change-password', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var data = JSON.parse(xhr.responseText);
          if (data.error) return alert(data.error);
          
          document.getElementById('settings-new-pass').value = '';
          alert('Password profile systematically modified successfully!');
        }
      };
      xhr.send(JSON.stringify({ password: newPassword }));
    };

    document.getElementById('logout-btn').onclick = function() {
      localStorage.clear();
      window.location.reload();
    };

    function initApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('user-display').textContent = '@' + myUsername;
      
      if (isMasterAdmin(myUsername)) {
        document.getElementById('mod-sidebar-panel').style.display = 'block';
      }
      
      socket = new WebSocket(WS_URL);
      
      socket.onopen = function() { socket.send(JSON.stringify({ type: 'auth', token: token })); };

      socket.onmessage = function(event) {
        var data = JSON.parse(event.data);
        
        if (data.type === 'terminated') {
          alert('Your session was terminated by an administrator.');
          localStorage.clear();
          window.location.reload();
          return;
        }

        if (data.type === 'msg_deleted') {
          var targetNode = document.getElementById('msg-id-' + data.id);
          if (targetNode) {
            targetNode.innerHTML = '<div class="message-meta">System</div><div class="message-text">[MESSAGE PURGED BY ROOT]</div>';
          }
          return;
        }

        if (data.type === 'typing' && currentMode === 'dm' && currentDMTarget === data.sender) {
            showTypingState(data.sender + ' is typing...');
            return;
        }

        if (data.type === 'public' && currentMode === 'public') {
          appendMessage({ id: data.id, username: data.username, content: data.content, timestamp: data.timestamp });
        } else if (data.type === 'dm') {
          var senderPartner = data.sender === myUsername ? data.receiver : data.sender;
          ensureDMNavOption(senderPartner);
          if (currentMode === 'dm' && currentDMTarget === senderPartner) {
            clearTypingIndicator();
            appendMessage({ id: data.id, username: data.sender, content: data.content, timestamp: data.timestamp });
          }
        }
      };
      
      loadDMContacts(); 
      loadHistory();
    }

    document.getElementById('mod-kick-btn').onclick = function() {
      var target = document.getElementById('mod-target-user').value.trim();
      if (!target) return alert('Enter a target user string');
      if (isMasterAdmin(target)) return alert('Operation Aborted: Cannot terminate root profiles');
      
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          type: 'mod_kick',
          target: target
        }));
        document.getElementById('mod-target-user').value = '';
        alert('Termination order broadcasted for: ' + target);
      }
    };

    function triggerMsgDeletion(msgId) {
      if (!isMasterAdmin(myUsername)) return;
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          type: 'mod_delete',
          id: msgId,
          channel: currentMode
        }));
      }
    }

    function loadDMContacts() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', BACKEND_URL + '/dm-contacts', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var contacts = JSON.parse(xhr.responseText);
          for (var i = 0; i < contacts.length; i++) {
            ensureDMNavOption(contacts[i]);
          }
        }
      };
      xhr.send();
    }

    function showTypingState(text) {
        var indicator = document.getElementById('typing-indicator');
        indicator.textContent = text;
        clearTimeout(typingClearTimer);
        typingClearTimer = setTimeout(clearTypingIndicator, 3000);
    }
    
    function clearTypingIndicator() {
        document.getElementById('typing-indicator').textContent = '';
    }

    function ensureDMNavOption(username) {
      if (document.getElementById('nav-dm-' + username) || username === myUsername) return;
      var targetList = document.getElementById('dm-list');
      var item = document.createElement('div');
      item.className = 'nav-item';
      item.id = 'nav-dm-' + username;
      item.textContent = '💬 ' + username;
      item.onclick = function() { switchChannel('dm', username); };
      targetList.appendChild(item);
    }

    document.getElementById('dm-target-input').onkeypress = function(e) {
      var key = e.keyCode || e.which;
      if (key === 13) {
        var target = e.target.value.trim();
        if(!target || target === myUsername) return;
        ensureDMNavOption(target);
        switchChannel('dm', target);
        e.target.value = '';
      }
    };

    function switchChannel(mode, target) {
      if(!target) target = '';
      currentMode = mode;
      currentDMTarget = target;
      clearTypingIndicator();
      
      var navItems = document.getElementById('sidebar-cell').getElementsByTagName('div');
      for (var i = 0; i < navItems.length; i++) {
        if(navItems[i].className.indexOf('nav-item') !== -1) {
          navItems[i].className = 'nav-item';
        }
      }
      
      if(mode === 'public') {
        document.getElementById('nav-public').className = 'nav-item nav-item-active';
      } else {
        var activeTab = document.getElementById('nav-dm-' + target);
        if (activeTab) activeTab.className = 'nav-item nav-item-active';
      }
      document.getElementById('chat-scroll-wrapper').innerHTML = '';
      loadHistory();
    }

    function appendMessage(data) {
      var chatWrapper = document.getElementById('chat-scroll-wrapper');
      var containerDiv = document.createElement('div');
      containerDiv.className = 'message-container';
      
      var msgDiv = document.createElement('div');
      msgDiv.id = 'msg-id-' + data.id;
      var isMe = data.username === myUsername;
      var isBoss = isMasterAdmin(data.username);
      
      var messageStyleClass = 'message paper ';
      if (isBoss) {
          messageStyleClass += 'boss-msg';
      } else if (isMe) {
          messageStyleClass += 'my-msg';
      } else {
          messageStyleClass += 'other-msg';
      }
      msgDiv.className = messageStyleClass;
      
      var timeStr = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      var nameDisplay = isBoss ? '👑 ' + data.username + ' [SYS_OP]' : data.username;
      var metaStyleClass = isBoss ? 'message-meta boss-meta' : 'message-meta';

      msgDiv.innerHTML = '<div class="' + metaStyleClass + '">' + nameDisplay + ' • ' + timeStr + '</div><div class="message-text"></div>';
      
      if (isMasterAdmin(myUsername)) {
        var delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.textContent = 'X';
        delBtn.onclick = function() { triggerMsgDeletion(data.id); };
        msgDiv.appendChild(delBtn);
      }

      msgDiv.querySelector('.message-text').textContent = data.content;
      
      containerDiv.appendChild(msgDiv);
      chatWrapper.appendChild(containerDiv);
      chatWrapper.scrollTop = chatWrapper.scrollHeight;
    }

    function loadHistory() {
      var xhr = new XMLHttpRequest();
      if (currentMode === 'public') {
        xhr.open('GET', BACKEND_URL + '/history?index=0', true);
      } else {
        xhr.open('GET', BACKEND_URL + '/dm-history?target=' + currentDMTarget, true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      }
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var data = JSON.parse(xhr.responseText);
          for (var i = 0; i < data.length; i++) {
            var msg = data[i];
            if (currentMode === 'public') {
              appendMessage(msg);
            } else {
              appendMessage({ id: msg.id, username: msg.sender, content: msg.content, timestamp: msg.timestamp });
            }
          }
        }
      };
      xhr.send();
    }

    var input = document.getElementById('content');
    input.oninput = function() {
        if (currentMode === 'dm' && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: 'typing', target: currentDMTarget }));
        }
    };

    function sendMessage() {
      var text = input.value.trim();
      if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: currentMode, content: text, target: currentDMTarget }));
      input.value = '';
    }

    document.getElementById('send').onclick = sendMessage;
    input.onkeypress = function(e) {
      var key = e.keyCode || e.which;
      if (key === 13) sendMessage();
    };

    if (token && myUsername) initApp();
  </script>
</body>
</html>
