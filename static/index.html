<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Un-Reader Dashboard</title>
  <style>
    /* --- KINDLE E-INK AESTHETIC --- */
    * { box-sizing: border-box; transition: none !important; animation: none !important; border-radius: 0 !important; }
    :root { --bg-color: #ffffff; --text-color: #000000; --border-color: #000000; --border-width: 2px; --body-font: "Courier New", Courier, monospace; }
    html, body { width: 100%; height: 100%; margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: var(--body-font); overflow: hidden; }

    /* Home Layout (Ref: 1781893955316.jpeg) */
    .header-container { text-align: center; padding: 20px; border-bottom: var(--border-width) solid var(--border-color); }
    .title { font-size: 24px; font-weight: 900; }
    .settings-btn { position: absolute; top: 10px; right: 20px; cursor: pointer; font-weight: 900; }
    .featured-box { margin: 20px; border: var(--border-width) solid var(--border-color); padding: 15px; }
    .featured-title { font-weight: 900; border-bottom: var(--border-width) solid var(--border-color); padding-bottom: 5px; margin-bottom: 15px; }
    .apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .app-item { padding: 15px; border: var(--border-width) solid var(--border-color); cursor: pointer; text-align: center; }
    .app-name { font-weight: 900; font-size: 14px; }
    .app-desc { font-size: 10px; font-style: italic; margin-top: 4px; }

    /* Control Panel (Ref: 32784.jpg) */
    .fullscreen-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 2000; padding: 10px; border: 3px solid var(--border-color); overflow-y: auto; }
    .control-header { border: 3px solid var(--border-color); padding: 5px; font-weight: 900; text-align: center; margin-bottom: 10px; }
    .setting-group { margin-bottom: 20px; }
    .setting-title { font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--border-color); margin-bottom: 10px; }
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
    .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; background: var(--text-color); }
  </style>
</head>

<body>
  <!-- Header (Home Screen) -->
  <div class="header-container">
    <div class="title">UN-READER</div>
    <div class="subtitle" id="user-status">Guest Mode</div>
    <div class="settings-btn" id="settings-trigger">[SETTINGS]</div>
  </div>

  <div class="featured-box">
    <div class="featured-title">FEATURED</div>
    <div class="apps-grid" id="apps-container"></div>
  </div>

  <!-- Control Panel -->
  <div class="fullscreen-view" id="settings-view">
    <div class="control-header">Control Panel</div>
    <div class="setting-group">
      <div class="setting-title">System</div>
      <div class="setting-item">
        <div><div style="font-weight:900">Flush Screen</div></div>
        <button id="flush-btn">Flush</button>
      </div>
    </div>
    <button style="width:100%; padding:10px; font-weight:900" onclick="document.getElementById('settings-view').style.display='none'">[CLOSE]</button>
  </div>

  <script>
    // Logic: Username or Guest
    const username = localStorage.getItem('unreader-username');
    document.getElementById('user-status').textContent = username ? username : 'Guest Mode';

    // App Database
    const APP_DATABASE = [
      { name: 'CHAT', desc: 'Talk', url: 'chat.html' },
      { name: 'TOPICS', desc: 'Discuss', url: 'topics.html' },
      { name: 'NEIGHBOURHOOD', desc: 'Connect', url: 'neighbourhood.html' },
      { name: 'AI', desc: 'AI Assistant [Beta]', url: 'chatai.html' },
      { name: 'CALC', desc: 'Math', url: 'calc.html' },
      { name: 'MOD', desc: 'Moderation', url: 'modmenu.html', req: 'mod' }
    ];

    function buildGrid() {
      const container = document.getElementById('apps-container');
      const rank = localStorage.getItem('unreader-rank') || 'user';
      container.innerHTML = '';
      APP_DATABASE.forEach(app => {
        if (app.req === 'mod' && rank !== 'mod') return;
        const div = document.createElement('div');
        div.className = 'app-item';
        div.innerHTML = `<div class="app-name">${app.name}</div><div class="app-desc">${app.desc}</div>`;
        div.onclick = () => window.location.href = app.url;
        container.appendChild(div);
      });
    }

    // Handlers
    document.getElementById('settings-trigger').onclick = () => document.getElementById('settings-view').style.display='block';
    document.getElementById('flush-btn').onclick = () => {
        const f = document.createElement('div'); f.className = 'flash-overlay';
        document.body.appendChild(f); setTimeout(() => f.remove(), 150);
    };
    buildGrid();
  </script>
</body>
</html>
