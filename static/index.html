<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Un-Reader Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.2/purify.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <script src="common.js"></script>
  <meta name="description" content="A social network for Kindles and other e-readers.">
  <meta name="robots" content="index, follow">
  <style>
    /* --- KINDLE E-INK CORE LAYOUT & ARCHITECTURE --- */
    * {
      box-sizing: border-box;
      transition: none !important;
      animation: none !important;
      border-radius: 0 !important; /* Forces rigid hardware shape */
    }

    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --border-color: #000000;
      --border-width: 3px;
      --font-weight-mod: 900;
      --body-font: "Courier New", Courier, monospace;
    }

    body.dark-mode {
      --bg-color: #000000;
      --text-color: #ffffff;
      --border-color: #ffffff;
    }

    html, body {
      width: 100%; height: 100%; margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-color);
      font-family: var(--body-font); user-select: none;
      overflow: hidden; border: var(--border-width) solid var(--border-color);
    }

    .device-screen { display: flex; flex-direction: column; width: 100%; height: 100%; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; font-size: 14px; font-weight: 900;
      border-bottom: var(--border-width) solid var(--border-color);
    }

    .app-item {
      display: flex; align-items: center; justify-content: center;
      text-align: center; cursor: pointer; padding: 20px;
      border: var(--border-width) solid var(--border-color);
      background: var(--bg-color); color: var(--text-color);
      font-weight: 900; text-transform: uppercase;
    }

    .app-item:active { background: var(--text-color); color: var(--bg-color); }

    .fullscreen-view {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-color); color: var(--text-color);
      z-index: 2000; overflow-y: auto; padding: 20px; border: var(--border-width) solid var(--border-color);
    }

    .modal-btn {
      border: var(--border-width) solid var(--text-color);
      background: var(--bg-color); color: var(--text-color);
      font-weight: 900; padding: 15px; cursor: pointer;
    }

    .modal-btn:active { background: var(--text-color); color: var(--bg-color); }

    .auth-form input, select {
      border: var(--border-width) solid var(--border-color) !important;
      font-weight: 900 !important;
    }

    .flash-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; pointer-events: none; background: var(--text-color);
    }

    /* Keep original layout classes for grid functionality */
    .dashboard-container { flex: 1; padding: 20px; overflow-y: auto; }
    .apps-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .status-banner { padding: 10px; border: var(--border-width) solid var(--border-color); margin-bottom: 16px; font-weight: bold; display: none; }
  </style>
</head>

<body>
  <div class="device-screen">
    <div class="top-bar">
      <div class="top-bar-left">
        <span class="brand-name">UN-READER</span>
        <span class="clickable-tool" id="settings-trigger">[SETTINGS]</span>
      </div>
      <div id="live-clock">12:00 PM</div>
      <div class="top-bar-right">
        <span id="user-display-name">GUEST</span>
      </div>
    </div>

    <div class="dashboard-container">
      <div class="apps-grid" id="apps-container"></div>
    </div>
  </div>

  <div class="fullscreen-view" id="settings-view">
    <button class="modal-btn" onclick="closeView('settings-view')">[BACK]</button>
    <div class="setting-section-title">SYSTEM PREFERENCES</div>
    <div class="setting-row">
      <button class="modal-btn" id="toggle-darkmode">TOGGLE DARK/LIGHT</button>
      <button class="modal-btn" id="force-refresh-btn">FLUSH SCREEN</button>
    </div>
  </div>

  <div class="fullscreen-view" id="auth-view">
    <h2 id="auth-title">LOG IN</h2>
    <form class="auth-form" id="main-auth-form" onsubmit="handleAuthSubmit(event)">
      <input type="text" id="auth-username" placeholder="USERNAME" required />
      <input type="password" id="auth-password" placeholder="PASSWORD" required />
      <button type="submit" class="modal-btn">SUBMIT</button>
    </form>
    <button class="modal-btn" onclick="closeView('auth-view')">CANCEL</button>
  </div>

  <script>
    // Original core scripts preserved
    function executeFlashClear() {
      const flash = document.createElement('div');
      flash.className = 'flash-overlay';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 150);
    }

    function applySavedPreferences() {
        if(localStorage.getItem('unreader-darkmode') === 'enabled') document.body.classList.add('dark-mode');
    }

    function openView(id) { document.getElementById(id).style.display = 'block'; }
    function closeView(id) { document.getElementById(id).style.display = 'none'; }
    
    document.getElementById('settings-trigger').addEventListener('click', () => openView('settings-view'));
    document.getElementById('force-refresh-btn').addEventListener('click', executeFlashClear);
    document.getElementById('toggle-darkmode').addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('unreader-darkmode', document.body.classList.contains('dark-mode') ? 'enabled' : 'disabled');
    });

        // --- Full Curated Dashboard Apps Database ---
    const APP_DATABASE = [
      { id: 'chat', name: 'CHAT', url: 'chat.html' },
      { id: 'topics', name: 'TOPICS', url: 'topics.html' },
      { id: 'neighbourhood', name: 'NEIGHBOURHOOD', url: 'neighbourhood.html' },
      { id: 'chatai', name: 'AI ASSISTANT', url: 'chatai.html' },
      { id: 'calc', name: 'CALCULATOR', url: 'calc.html' },
      { id: 'discord-link', name: 'DISCORD', url: 'https://discord.gg/6jdVebZZQu' },
      { id: 'rekindle', name: 'REKINDLE', url: 'rekindle.html' },
      { id: 'modmenu', name: 'MODERATION', url: 'modmenu.html', requirement: 'mod' },
      { id: 'settings_app', name: 'SETTINGS', onclick: () => openView('settings-view') }
    ];

    function buildApplicationGrid() {
      const container = document.getElementById('apps-container');
      if (!container) return;
      container.innerHTML = '';
      
      const currentRank = localStorage.getItem('unreader-rank') || 'user';

      APP_DATABASE.forEach(app => {
        // Filter out mod-only apps if not authorized
        if (app.requirement === 'mod' && currentRank !== 'mod') return;

        const div = document.createElement('div');
        div.className = 'app-item';
        div.innerHTML = app.name;
        div.onclick = () => {
          if (app.onclick) app.onclick();
          else if (app.url) window.location.href = app.url;
        };
        container.appendChild(div);
      });
    }

    buildApplicationGrid();
