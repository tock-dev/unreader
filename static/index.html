<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>un-reader</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; font-family: monospace; background-color: #f0f0f0; }
    .paper { border: 3px solid black; background-color: white; color: black; margin: 2px; box-shadow: 2px 2px 0px black; }
    #title-bar { padding: 4px; height: 5vh; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
    #title-bar h1 { font-size: 2.2vh; margin: 0 10px; text-transform: uppercase; letter-spacing: 1px; }
    #logout-btn { cursor: pointer; padding: 2px 8px; font-family: monospace; font-size: 1.4vh; margin-right: 10px;}
    #workspace { display: flex; flex-grow: 1; height: 86vh; overflow: hidden; }
    #sidebar { width: 25vw; display: flex; flex-direction: column; background: #e6e6e6; border-right: 3px solid black; }
    .panel-header { font-weight: bold; padding: 8px; text-transform: uppercase; border-bottom: 2px solid black; background: white; font-size: 1.4vh; }
    .nav-item { padding: 10px; cursor: pointer; border-bottom: 1px solid black; font-size: 1.6vh; background: white; margin: 2px; }
    .nav-item:hover, .nav-item.active { background-color: black; color: white; }
    #dm-target-input { margin: 4px; padding: 6px; font-family: monospace; font-size: 1.4vh; outline: none; }
    #chat-area { flex-grow: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
    
    /* NEW: Visual positioning parameters for typing notification elements */
    #typing-indicator { position: absolute; bottom: 8vh; left: 15px; font-size: 1.3vh; font-weight: bold; color: #555; font-style: italic; min-height: 20px; }
    
    #chat { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 30px; }
    #input { display: flex; padding: 6px; background-color: lightgray; box-sizing: border-box; gap: 6px; height: 7vh; align-items: center; }
    #input input { flex-grow: 1; padding: 8px; font-size: 1.8vh; font-family: monospace; outline: none; }
    #input button { display: flex; align-items: center; justify-content: center; width: 5vh; height: 5vh; cursor: pointer; padding: 0; }
    #input button:hover { background-color: #000; }
    #input button:hover svg { stroke: #fff; }
    .message { border: 2px solid black; border-radius: 4px; padding: 8px 12px; max-width: 60vw; width: fit-content; word-wrap: break-word; box-shadow: 2px 2px 0px black; }
    .message-meta { font-size: 1.1vh; font-weight: bold; color: #555; margin-bottom: 4px; }
    .message-text { font-size: 1.6vh; white-space: pre-wrap; }
    .my-msg { align-self: flex-end; background-color: #e2f0cb; }
    .other-msg { align-self: flex-start; background-color: white; }
    #auth-screen { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
    .auth-box { padding: 30px; width: 300px; text-align: center; }
    .auth-box input { width: 90%; padding: 8px; margin: 8px 0; font-family: monospace; }
    .auth-box button { width: 97%; padding: 10px; margin-top: 10px; cursor: pointer; font-family: monospace; font-weight: bold; }
    .auth-toggle { font-size: 12px; margin-top: 15px; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="paper auth-box">
      <h2 id="auth-title" style="margin-top:0; text-transform:uppercase;">Login</h2>
      <input class="paper" type="text" id="auth-user" placeholder="Username" autocomplete="off" />
      <input class="paper" type="password" id="auth-pass" placeholder="Password" />
      <button class="paper" id="auth-submit">SUBMIT</button>
      <div id="auth-toggle" class="auth-toggle">Need to create an account? Register</div>
    </div>
  </div>

  <div class="paper" id="title-bar">
    <h1>un-reader</h1>
    <div style="display:flex; align-items:center;">
      <span id="user-display" style="font-size:1.4vh; font-weight:bold; margin-right:10px;"></span>
      <button class="paper" id="logout-btn">LOGOUT</button>
    </div>
  </div>
  
  <div id="workspace">
    <div id="sidebar">
      <div class="panel-header">Channels</div>
      <div class="nav-item active" id="nav-public" onclick="switchChannel('public')">🌍 Global Chat</div>
      <div class="panel-header" style="border-top: 2px solid black;">Direct Messages</div>
      <input class="paper" type="text" id="dm-target-input" placeholder="+ Type user & press Enter..." autocomplete="off" />
      <div id="dm-list"></div>
    </div>

    <div id="chat-area">
      <div id="chat"></div>
      <div id="typing-indicator"></div> <!-- Container element hook for typing alert status -->
      <div id="input" class="paper">
        <input class="paper" type="text" id="content" placeholder="Enter a message..." autocomplete="off" />
        <button class="paper" id="send">
          <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4.698 4.034l16.302 7.966l-16.302 7.966a.503 .503 0 0 1 -.546 -.124a.555 .555 0 0 1 -.12 -.568l2.468 -7.274l-2.468 -7.274a.555 .555 0 0 1 .12 -.568a.503 .503 0 0 1 .546 -.124z" />
            <path d="M6.5 12h14.5" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('token');
    let myUsername = localStorage.getItem('username');
    let currentMode = 'public';
    let currentDMTarget = '';
    let socket = null;
    let isRegisterMode = false;
    let typingTimeout = null;

    const authToggle = document.getElementById('auth-toggle');
    authToggle.addEventListener('click', () => {
      isRegisterMode = !isRegisterMode;
      document.getElementById('auth-title').textContent = isRegisterMode ? 'Register' : 'Login';
      authToggle.textContent = isRegisterMode ? 'Already have an account? Login' : 'Need to create an account? Register';
    });

    document.getElementById('auth-submit').addEventListener('click', async () => {
      const username = document.getElementById('auth-user').value.trim();
      const password = document.getElementById('auth-pass').value;
      if(!username || !password) return alert('Please fill in all fields');

      const url = isRegisterMode ? '/api/register' : '/api/login';
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if(data.error) return alert(data.error);
      
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username);
      token = data.token;
      myUsername = data.username;
      initApp();
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.clear();
      window.location.reload();
    });

    function initApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('user-display').textContent = `@${myUsername}`;
      
      // Fixed: Auto-adjust protocols securely based on site encryption layer context
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      socket = new WebSocket(`${wsProtocol}//${window.location.host}`);
      
      socket.onopen = () => { socket.send(JSON.stringify({ type: 'auth', token })); };

      socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        // NEW: Intercept and render incoming typing states
        if (data.type === 'typing' && currentMode === 'dm' && currentDMTarget === data.sender) {
            showTypingState(`${data.sender} is typing...`);
            return;
        }

        if (data.type === 'public' && currentMode === 'public') {
          appendMessage({ username: data.username, content: data.content, timestamp: data.timestamp });
        } else if (data.type === 'dm') {
          const senderPartner = data.sender === myUsername ? data.receiver : data.sender;
          ensureDMNavOption(senderPartner);
          if (currentMode === 'dm' && currentDMTarget === senderPartner) {
            clearTypingIndicator(); // Instantly hide typing notice when text layout arrives
            appendMessage({ username: data.sender, content: data.content, timestamp: data.timestamp });
          }
        }
      };
      loadHistory();
    }

    // NEW: Flash notification controller methods
    function showTypingState(text) {
        const indicator = document.getElementById('typing-indicator');
        indicator.textContent = text;
        clearTimeout(window.typingClearTimer);
        window.typingClearTimer = setTimeout(clearTypingIndicator, 3000); // clear indicator after 3 seconds of silence
    }
    function clearTypingIndicator() {
        document.getElementById('typing-indicator').textContent = '';
    }

    function ensureDMNavOption(username) {
      if (document.getElementById(`nav-dm-${username}`) || username === myUsername) return;
      const targetList = document.getElementById('dm-list');
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.id = `nav-dm-${username}`;
      item.textContent = `💬 ${username}`;
      item.onclick = () => switchChannel('dm', username);
      targetList.appendChild(item);
    }

    document.getElementById('dm-target-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const target = e.target.value.trim();
        if(!target || target === myUsername) return;
        ensureDMNavOption(target);
        switchChannel('dm', target);
        e.target.value = '';
      }
    });

    function switchChannel(mode, target = '') {
      currentMode = mode;
      currentDMTarget = target;
      clearTypingIndicator();
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      if(mode === 'public') document.getElementById('nav-public').classList.add('active');
      else document.getElementById(`nav-dm-${target}`)?.classList.add('active');
      document.getElementById('chat').innerHTML = '';
      loadHistory();
    }

    const chat = document.getElementById('chat');
    function appendMessage(data) {
      const msgDiv = document.createElement('div');
      const isMe = data.username === myUsername;
      msgDiv.className = `message paper ${isMe ? 'my-msg' : 'other-msg'}`;
      const timeStr = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      msgDiv.innerHTML = `<div class="message-meta">${data.username} • ${timeStr}</div><div class="message-text"></div>`;
      msgDiv.querySelector('.message-text').textContent = data.content;
      chat.appendChild(msgDiv);
      chat.scrollTop = chat.scrollHeight;
    }

    async function loadHistory() {
      try {
        let res, data;
        if (currentMode === 'public') {
          res = await fetch('/history?index=0');
          data = await res.json();
          data.forEach(msg => appendMessage(msg));
        } else {
          res = await fetch(`/dm-history?target=${currentDMTarget}`, { headers: { 'Authorization': `Bearer ${token}` } });
          data = await res.json();
          data.forEach(msg => appendMessage({ username: msg.sender, content: msg.content, timestamp: msg.timestamp }));
        }
      } catch (err) { console.error(err); }
    }

    const input = document.getElementById('content');
    
    // NEW: Track key strokes to dispatch streaming updates towards target receivers
    input.addEventListener('input', () => {
        if (currentMode === 'dm' && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
                type: 'typing',
                target: currentDMTarget
            }));
        }
    });

    function sendMessage() {
      const text = input.value.trim();
      if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: currentMode, content: text, target: currentDMTarget }));
      input.value = '';
    }

    document.getElementById('send').addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    if (token && myUsername) initApp();
  </script>
</body>
</html>
