<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>un-reader BBS - Topics</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org/face/symbola/css/symbola.css" type="text/css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="bbs.css" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.2/purify.min.js"></script>
  <script src="common.js"></script>
  <style type="text/css">
    #active-users {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header {
      font-weight: bold;
      padding: 6px 8px;
      text-transform: uppercase;
      border-bottom: var(--border);
      border-top: var(--border);
      background: #eee;
      font-size: 10px;
      letter-spacing: 1px;
    }

    .panel-header:first-child {
      border-top: none;
    }

    #topic-list {
      max-height: 150px;
      overflow-y: auto;
      background: white;
    }

    .page-btn {
      background: #ffffff;
      border: var(--border);
      padding: 2px 8px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
      box-shadow: 1px 1px 0 black;
    }

    #page-display-index {
      margin: 0 10px;
      font-weight: bold;
      font-size: 12px;
    }

    .message-container {
      width: 100%;
      margin-bottom: 10px;
      clear: both;
      display: block;
      position: relative;
    }

    .message {
      border: var(--border);
      padding: 6px 10px;
      max-width: 75%;
      width: auto;
      position: relative;
      background: white;
      box-shadow: 2px 2px 0px black;
    }

    .message-meta {
      font-size: 10px;
      font-weight: bold;
      color: #555;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .message-text {
      font-size: 13px;
      white-space: pre-wrap;
      line-height: 1.3;
      color: black;
    }

    .my-msg {
      border-style: dashed;
    }

    .other-msg {
      border-style: solid;
    }

    .purged-msg {
      border-style: dotted !important;
      background: #fafafa !important;
      opacity: 0.6;
    }

    .admin-msg .message-text,
    .admin-msg .message-meta {
      color: white !important;
    }

    .user-delete-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      border: 1px dashed black;
      background: white;
      font-size: 9px;
      cursor: pointer;
      padding: 0 4px;
      font-family: monospace;
    }

    .mod-action-tray {
      display: block;
      background: #fff;
      border: 1px dashed red;
      padding: 4px;
      font-size: 11px;
      font-family: monospace;
      margin-top: 4px;
      max-width: 75%;
      box-sizing: border-box;
    }

    .mod-tray-btn {
      background: white;
      border: 1px solid black;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 4px;
      padding: 1px 4px;
      font-family: monospace;
    }

    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.2);
      display: none;
      z-index: 2000;
    }

    .info-window {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translate(-50%, 0);
      width: 340px;
      background: white;
      border: var(--border);
      box-shadow: var(--shadow);
    }

    .info-body {
      padding: 12px;
      font-size: 12px;
      max-height: 80vh;
      overflow-y: auto;
    }

    #auth-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      display: block;
      z-index: 3000;
      text-align: center;
      padding-top: 100px;
    }

    .auth-box {
      padding: 24px;
      width: 280px;
      margin: 0 auto;
      background: white;
      border: var(--border);
      box-shadow: var(--shadow);
    }

    .auth-box input {
      width: 90%;
      padding: 6px;
      margin: 6px 0;
      font-family: monospace;
      border: var(--border);
    }

    .auth-box button {
      width: 96%;
      padding: 8px;
      margin-top: 8px;
      cursor: pointer;
      font-family: monospace;
      font-weight: bold;
      background: white;
      border: var(--border);
      box-shadow: 2px 2px 0 black;
    }

    /* E-Ink / Brutalist Dark Mode adjustments */
    body.dark-mode {
      --bg-color: #121212;
      --text-color: #ffffff;
      --border: 2px solid #ffffff;
      --shadow: 4px 4px 0px #ffffff;
      --stripe-pattern: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          #fff 3px,
          #fff 4px);
      background-color: #242424 !important;
    }

    body.dark-mode .window,
    body.dark-mode .title-bar,
    body.dark-mode .title-text,
    body.dark-mode #back-btn,
    body.dark-mode #user-display,
    body.dark-mode .nav-item,
    body.dark-mode .sidebar-input,
    body.dark-mode .sidebar-btn,
    body.dark-mode .message,
    body.dark-mode #content,
    body.dark-mode #send,
    body.dark-mode .info-window,
    body.dark-mode .auth-box,
    body.dark-mode .comment-item,
    body.dark-mode .comment-toggle-btn,
    body.dark-mode .page-btn,
    body.dark-mode .mod-indicator-btn,
    body.dark-mode #find-user-btn,
    body.dark-mode #view-logs-btn,
    body.dark-mode .mod-action-tray {
      background-color: #121212 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    body.dark-mode #sidebar-cell {
      background-color: #1a1a1a !important;
      border-right-color: #ffffff !important;
    }

    body.dark-mode #chat-cell {
      background-color: #121212 !important;
    }

    body.dark-mode .panel-header,
    body.dark-mode #pagination-header-bar,
    body.dark-mode #input-bar-container {
      background-color: #222222 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    body.dark-mode .nav-item-active {
      background-color: #ffffff !important;
      color: #000000 !important;
    }

    body.dark-mode .roster-user {
      border-bottom-color: #333 !important;
    }

    body.dark-mode .nav-item {
      border-bottom-color: #333 !important;
    }

    body.dark-mode .user-delete-btn,
    body.dark-mode .mod-tray-btn {
      background: #121212 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    body.contrast-medium {
      --border: 3px solid var(--text-color);
      --border-width: 3px;
    }

    body.contrast-high {
      --border: 4px solid var(--text-color);
      --border-width: 4px;
    }
  </style>
</head>

<body>
  <div id="modal-overlay" class="hide" onclick="closeInfoModal()">
    <div class="info-window" onclick="event.stopPropagation()">
      <div class="title-bar">
        <div class="title-stripes"></div>
        <div class="title-text" id="modal-title">GET INFO</div>
        <button class="paper-btn" style="
              position: absolute;
              right: 8px;
              width: 3.5ex;
              height: 3.5ex;
              box-shadow: 1px 1px 0px black;
            " onclick="closeInfoModal()">
          X
        </button>
      </div>
      <div class="info-body" id="modal-content">
        <div id="profile-view">
          <div style="font-size: 24px; text-align: center; margin: 8px" id="info-avatar">
            👤
          </div>
          <div style="font-weight: bold; margin: 6px">
            User: <span id="info-username"></span>
          </div>
          <div style="margin: 6px">
            Location: <span id="info-location"></span>
          </div>
          <div style="
                border: 1px solid black;
                padding: 6px;
                background: #fafafa;
                min-height: 40px;
                margin: 6px;
                word-break: break-all;
              " id="info-bio"></div>

          <div id="info-edit-controls" class="hide" style="
                display: flex;
                flex-direction: column;
                align-items: stretch;
                border-top: 1px dashed black;
                padding-top: 8px;
                margin: 8px;
              ">
            <div style="display: flex">
              <input type="text" id="edit-avatar" class="paper-input" placeholder="Emoji"
                style="width: min-content; min-width: 0; text-align: center" />
              <input type="text" id="edit-location" placeholder="Location..." class="paper-input"
                style="flex-grow: 1; margin-left: 6px" />
            </div>
            <textarea id="edit-bio" placeholder="Bio description..." class="paper-input"
              style="margin-top: 6px; resize: none; height: max-content"></textarea>
            <button onclick="saveProfileChanges()" class="paper-btn" style="margin-top: 6px">
              SAVE PROFILE
            </button>

            <div style="
                  border-top: 1px dotted black;
                  padding-top: 8px;
                  margin-top: 8px;
                ">
              <span style="font-size: 14px; font-weight: bold; display: block">SECURITY PREFERENCE:</span>
              <div style="display: flex; align-items: stretch; margin-top: 6px">
                <input type="password" id="change-pass-current" placeholder="Current Password" class="paper-input"
                  style="flex-grow: 1; margin-right: 6px" />
                <input type="password" id="change-pass-new" placeholder="New Password" class="paper-input"
                  style="flex-grow: 1; margin-right: 6px" />
                <button onclick="submitPasswordChange()" class="paper-btn">
                  UPDATE PASSWORD
                </button>
              </div>
            </div>
          </div>

          <div id="admin-controls" class="hide" style="
                border-top: 2px solid black;
                padding-top: 8px;
                margin-top: 8px;
              ">
            <span style="
                  font-size: 10px;
                  font-weight: bold;
                  display: block;
                  margin: 4px;
                  color: red;
                ">SYSTEM OPERATOR COMMANDS:</span>
            <div style="display: flex; margin: 6px">
              <button id="admin-ban-btn" class="paper-btn" style="width: calc(50% - 3px); margin-right: 6px">
                BAN
              </button>
              <button id="admin-pardon-btn" class="paper-btn" style="width: calc(50% - 3px)">
                PARDON
              </button>
            </div>
            <div style="margin: 6px; display: flex">
              <input type="number" id="admin-timeout-dur" value="60" class="paper-input"
                style="width: min-content; margin-right: 6px" />
              <button id="admin-timeout-btn" class="paper-btn" style="flex-grow: 1">
                TIMEOUT (MINS)
              </button>
            </div>
          </div>

          <button id="info-dm-btn" class="paper-btn" style="
                width: calc(100% - 12px);
                box-sizing: border-box;
                font-family: monospace;
                font-weight: bold;
                padding: 4px;
                cursor: pointer;
                margin: 6px;
              ">
            SEND DIRECT MESSAGE
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="auth-screen">
    <div class="auth-box">
      <h2 id="auth-title" style="margin-top: 0">LOGIN</h2>
      <input class="paper-input" type="text" id="auth-user" placeholder="Username" autocomplete="off" />
      <input class="paper-input" type="password" id="auth-pass" placeholder="Password" />
      <button id="auth-submit-btn" class="paper-btn">SUBMIT</button>
      <div id="auth-toggle" style="
            font-size: 12px;
            margin-top: 12px;
            cursor: pointer;
            text-decoration: underline;
            color: blue;
            font-weight: bold;
          ">
        Need an account? Register
      </div>
    </div>
  </div>

  <div class="window">
    <div class="title-bar">
      <div class="title-stripes"></div>
      <button class="paper-btn" id="back-btn" onclick="window.location.href = 'index.html'">
        ◀ HOME
      </button>
      <div class="title-text">un-reader BBS - Chat</div>
      <span class="paper-btn" id="user-display" onclick="openProfileModal(myUsername)"></span>
    </div>

    <div id="workspace-table">
      <div id="sidebar-cell">
        <div class="panel-header">Main Spaces</div>
        <div class="nav-item" onclick="window.location.href = 'chat.html'">
          💬 Back to Chat
        </div>

        <div class="panel-header">Topics</div>
        <div class="sidebar-input-container">
          <input type="text" id="topic-target-input" class="paper-input" placeholder="New Topic..." />
          <button class="paper-btn sidebar-btn" onclick="triggerCreateTopic()">
            ADD
          </button>
        </div>
        <div id="topic-list"></div>

        <div class="panel-header" id="active-users">
          <div>Active Users</div>
          <button id="kick-all-btn" class="paper-btn hide" style="margin: 0" onclick="kickAllUsers()">
            KICK ALL
          </button>
        </div>
        <div id="roster-list"></div>

        <div class="panel-header">System Operations</div>
        <div id="settings-box-container" style="padding: 6px">
          <div id="mod-toggle-container" class="hide" style="
                display: none;
                flex-direction: column;
                align-items: stretch;
              ">
            <button id="mod-mode-btn" class="paper-btn mod-indicator-btn" onclick="toggleModMode()">
              MOD MODE: OFF
            </button>
            <button id="modmenu-link-btn" class="paper-btn" style="margin-top: 6px; cursor: pointer"
              onclick="window.location.href = 'modmenu.html'">
              MODERATION APP
            </button>
          </div>
        </div>
      </div>
      <div id="chat-cell">
        <div id="pagination-header-bar">
          <button class="paper-btn shadow" onclick="jumpPage(-1)">
            &lt; NEWER
          </button>
          <span id="page-display-index">PAGE: 0</span>
          <button class="paper-btn shadow" onclick="jumpPage(1)">
            OLDER &gt;
          </button>
        </div>

        <div id="chat-scroll-wrapper"></div>

        <div id="input-bar-container">
          <textarea id="content" class="paper-input" placeholder="Type message here..." autocomplete="off"
            autofocus></textarea>
          <button id="send" class="paper-btn">SEND</button>
        </div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    var token = localStorage.getItem('token');
    var myUsername = localStorage.getItem('username');
    var currentMode = 'topic';
    var currentTarget = '';
    var socket = null;
    var isRegisterMode = false;
    var currentHistoryIndex = 0;
    var modModeActive = false;
    var userRoles = {
      role: { role: '', prefix: '', style: '', class: '' },
      is_banned: false,
      timeout_until: 0,
      last_ip: null,
    };

    function log(...args) {
      if (DO_LOGGING) console.log(`[CLIENT]`, ...args);
    }

    function formatTimeToken(unixTimestamp) {
      if (!unixTimestamp) return 'MOMENTS AGO';
      var parsedNum = Number(unixTimestamp);
      if (isNaN(parsedNum)) return 'MOMENTS AGO';
      var d = new Date(parsedNum);
      return (
        d.toLocaleDateString() +
        ' ' +
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      );
    }

    function toggleModMode() {
      modModeActive = !modModeActive;
      log('Mod mode toggle state:', modModeActive);
      var btn = document.getElementById('mod-mode-btn');
      btn.textContent = modModeActive ? 'MOD MODE: ACTIVE' : 'MOD MODE: OFF';
      btn.classList.toggle('mod-indicator-active', modModeActive);
      loadHistory();
    }

    document.getElementById('auth-toggle').onclick = function () {
      isRegisterMode = !isRegisterMode;
      log('Auth mode toggled. isRegisterMode:', isRegisterMode);
      document.getElementById('auth-title').textContent = isRegisterMode
        ? 'REGISTER'
        : 'LOGIN';
      this.textContent = isRegisterMode
        ? 'Already have an account? Login'
        : 'Need an account? Register';
    };

    document.getElementById('auth-submit-btn').onclick = async function () {
      var username = document.getElementById('auth-user').value.trim();
      var password = document.getElementById('auth-pass').value;
      if (!username || !password)
        return await unAlert('Fill in all log credentials.');
      var url = isRegisterMode ? '/api/register' : '/api/login';
      log('Auth submit. endpoint:', url, 'user:', username);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onreadystatechange = async function () {
        if (xhr.readyState === 4) {
          log('Auth XHR complete. status:', xhr.status);
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              localStorage.setItem('token', data.token);
              localStorage.setItem('username', data.username);
              token = data.token;
              myUsername = data.username;
              applySavedPreferences();
              initApp();
            } catch (e) {
              log('Auth JSON parse error:', e);
              await unAlert('Server returned an invalid packet signature.');
            }
          } else {
            log('Auth failed. buffer:', xhr.responseText);
            try {
              var errData = JSON.parse(xhr.responseText);
              await unAlert(
                'Server error: ' + (errData.error || 'Access Denied'),
              );
            } catch (e) {
              await unAlert('Structural connection failure.');
            }
          }
        }
      };
      xhr.send(JSON.stringify({ username: username, password: password }));
    };

    function initApp() {
      log('Booting application logic layers.');
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('user-display').textContent = '@' + myUsername;

      if (socket) {
        try {
          socket.close();
        } catch (e) { }
      }
      log('Opening WS link:', WS_URL);
      socket = new WebSocket(WS_URL);
      socket.onopen = function () {
        log('WS Link connected. Authenticating...');
        socket.send(JSON.stringify({ type: 'auth', token: token }));
      };
      socket.onmessage = async function (event) {
        var data = JSON.parse(event.data);
        log('Incoming packet:', data.type);
        if (data.type === 'terminated') {
          await unAlert(data.reason || 'Session expired.');
          localStorage.clear();
          window.location.reload();
          return;
        }
        if (data.type === 'auth_success') {
          if (
            data.userRoles.role.role &&
            data.userRoles.role.role === 'admin'
          ) {
            show('#kick-all-btn');
          }
          return;
        }
        if (data.type === 'error_alert') {
          await unAlert(data.message);
          return;
        }
        if (data.type === 'refresh_feed') {
          log('Broadcast: refresh_feed received.');
          loadHistory();
          return;
        }
        if (data.type === 'roster_update') {
          renderUserRoster(data.users);
          return;
        }
        if (data.type === 'topics_update') {
          renderTopicList(data.topics);
          if (data.user_roles) {
            userRoles = data.user_roles;
            log('Roles updated:', userRoles);
            if (['admin', 'moderator'].includes(userRoles.role.role)) {
              document.querySelector('#mod-toggle-container').style.display =
                'flex';
              localStorage.setItem('unreader-rank', 'mod');
            } else {
              localStorage.setItem('unreader-rank', 'user');
            }
          }
          if (data.topics && data.topics.length > 0 && !currentTarget) {
            switchChannel('topic', data.topics[0].slug);
          }
          return;
        }
        if (currentHistoryIndex === 0) loadHistory();
      };
      loadHistory();
    }

    var onlineUsers = [];
    function renderUserRoster(userList) {
      onlineUsers = userList;
      var container = document.getElementById('roster-list');
      container.innerHTML = '';

      var sysDiv = document.createElement('div');
      sysDiv.className = 'roster-user';
      sysDiv.style.display = 'flex';
      sysDiv.style.justifyContent = 'space-between';
      sysDiv.style.alignItems = 'center';
      var sysSpan = document.createElement('span');
      sysSpan.className = 'roster-name';
      sysSpan.textContent = 'system (Global)';
      sysSpan.onclick = function () {
        openProfileModal('system');
      };
      sysDiv.appendChild(sysSpan);
      container.appendChild(sysDiv);

      for (var i = 0; i < userList.length; i++) {
        var u = userList[i];
        if (u.username === 'system') continue;
        var div = document.createElement('div');
        div.className = 'roster-user';
        div.style.display = 'flex';
        div.style.justifyContent = 'space-between';
        div.style.alignItems = 'center';
        var span = document.createElement('span');
        span.className = 'roster-name';
        var context =
          u.mode === 'public'
            ? ' (Global)'
            : u.mode === 'dm'
              ? ' (DM @' + u.target + ')'
              : ' (Neighborhood)';
        span.textContent = u.username + context;
        (function (user) {
          span.onclick = function () {
            openProfileModal(user.username);
          };
        })(u);
        div.appendChild(span);
        log(
          'Showing online user: ' +
          u.username +
          (u.mode === 'public'
            ? ' (Global)'
            : u.mode === 'dm'
              ? ' (DM @' + u.target + ')'
              : ' (Neighborhood)') +
          ' who ' +
          (['admin', 'moderator'].includes(userRoles.role.role) &&
            u.username !== myUsername
            ? 'can'
            : 'cannot') +
          ' be kicked.',
        );
        if (
          u.username !== myUsername &&
          userRoles.role.role &&
          (userRoles.role.role === 'admin' ||
            (userRoles.role.role === 'moderator' &&
              !u.userRoles.role.role === 'admin'))
        ) {
          const username = u.username;
          var kick = document.createElement('button');
          kick.className = 'paper-btn';
          kick.textContent = 'KICK';
          kick.onclick = function () {
            kickUser(username);
          };
          div.appendChild(kick);
        }
        container.appendChild(div);
      }
    }

    function renderTopicList(topics) {
      var container = document.getElementById('topic-list');
      container.innerHTML = '';
      for (var i = 0; i < topics.length; i++) {
        var t = topics[i];
        var div = document.createElement('div');
        div.className = 'nav-item';
        div.id = 'nav-topic-' + t.slug;
        div.textContent = '# ' + t.title;
        (function (slug) {
          div.onclick = function () {
            switchChannel('topic', slug);
          };
        })(t.slug);
        if (currentTarget === t.slug) {
          div.className = 'nav-item nav-item-active';
        }
        container.appendChild(div);
      }
    }

    function triggerCreateTopic() {
      var inp = document.getElementById('topic-target-input');
      var title = inp.value.trim();
      if (!title) return;
      if (socket && socket.readyState === WebSocket.OPEN) {
        log('Sending create_topic request.');
        socket.send(JSON.stringify({ type: 'create_topic', title: title }));
      }
      inp.value = '';
    }

    function switchChannel(mode, target) {
      log('Switching topic room. target:', target);
      currentMode = 'topic';
      currentTarget = target || '';
      currentHistoryIndex = 0;

      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(
          JSON.stringify({
            type: 'switch_context',
            mode: 'topic',
            target: target,
          }),
        );
      }

      var items = document.getElementsByClassName('nav-item');
      for (var i = 0; i < items.length; i++) items[i].className = 'nav-item';
      var node = document.getElementById('nav-topic-' + target);
      if (node) node.className = 'nav-item nav-item-active';
      loadHistory();
    }

    function appendMessage(data) {
      log('APPEND_MESSAGE payload details:', JSON.stringify(data));
      var chatWrapper = document.getElementById('chat-scroll-wrapper');
      var containerDiv = document.createElement('div');
      containerDiv.className = 'message-container';
      var msgDiv = document.createElement('div');
      msgDiv.id = 'msg-id-' + data.id;
      var effectiveUsername = data.username || data.sender || 'UNKNOWN_NODE';
      var isMe = effectiveUsername === myUsername;
      msgDiv.style.float = isMe ? 'right' : 'left';
      msgDiv.style.cssText += data.role.style;

      var styleClass = 'message ';
      if (data.is_deleted) styleClass += 'purged-msg';
      else {
        styleClass += isMe ? 'my-msg' : 'other-msg';
      }
      styleClass += ` ${data.role.class || ''}`;
      msgDiv.className = styleClass;

      var timeStr = formatTimeToken(data.timestamp);
      var meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.style.cursor = 'pointer';
      var nameDisplay = (data.role.prefix || '') + ' @' + effectiveUsername;
      meta.textContent = nameDisplay.trim() + ' • ' + timeStr;
      (function (username) {
        meta.onclick = function () {
          openProfileModal(username);
        };
      })(effectiveUsername);

      var txtBody = document.createElement('div');
      txtBody.className = 'message-text';
      msgDiv.appendChild(meta);
      msgDiv.appendChild(txtBody);

      if (data.is_deleted) {
        txtBody.innerHTML = '<em>[MESSAGE PURGED]</em>';
      } else {
        txtBody.innerHTML = censor(parseMarkup(data.content));
        if (isMe && data.id !== -1) {
          var selfDelBtn = document.createElement('button');
          selfDelBtn.className = 'user-delete-btn';
          selfDelBtn.textContent = 'X';
          selfDelBtn.onclick = async function () {
            if (await unConfirm('Delete message?'))
              sendModAction('mod_delete', data.id);
          };
          msgDiv.appendChild(selfDelBtn);
        }
      }
      containerDiv.appendChild(msgDiv);
      injectModTray(containerDiv, data, isMe);
      chatWrapper.appendChild(containerDiv);
      chatWrapper.scrollTop = chatWrapper.scrollHeight;
    }

    function injectModTray(targetNode, data, isMe) {
      if (
        !['admin', 'moderator'].includes(userRoles.role.role) ||
        !modModeActive ||
        data.id === -1
      )
        return;
      var trayDiv = document.createElement('div');
      trayDiv.className = 'mod-action-tray';
      trayDiv.style.float = isMe ? 'right' : 'left';
      trayDiv.style.clear = 'both';

      if (!data.is_deleted) {
        var dBtn = document.createElement('button');
        dBtn.className = 'mod-tray-btn';
        dBtn.textContent = 'PURGE';
        dBtn.onclick = async function () {
          var r =
            userRoles.role.role && userRoles.role.role === 'admin'
              ? "Admin doesn't need any reasons"
              : await unPrompt('Reason for purge?');
          if (r !== null) sendModAction('mod_delete', data.id, r);
        };
        trayDiv.appendChild(dBtn);
      } else {
        if (
          userRoles.role.role &&
          (userRoles.role.role === 'admin' ||
            (userRoles.role.role === 'moderator' &&
              data.deleted_by === myUsername))
        ) {
          var rBtn = document.createElement('button');
          rBtn.className = 'mod-tray-btn';
          rBtn.textContent = 'RESTORE';
          rBtn.onclick = function () {
            log('Sending restore packet for id:', data.id);
            sendModAction('mod_restore', data.id);
          };
          trayDiv.appendChild(rBtn);
        }
      }
      targetNode.appendChild(trayDiv);
    }

    function sendModAction(type, id, reason) {
      log('Dispatching moderator action packet:', type);
      socket.send(
        JSON.stringify({
          type: type,
          id: id,
          channel: currentMode,
          reason: reason,
        }),
      );
    }

    async function kickUser(username) {
      if (!socket || socket.readyState !== WebSocket.OPEN)
        return await unAlert('Socket offline.');
      var reason =
        userRoles.role.role && userRoles.role.role === 'admin'
          ? "Admin doesn't need any reasons"
          : await unPrompt('Reason for kick?');
      if (
        !(userRoles.role.role && userRoles.role.role === 'admin') &&
        !reason
      )
        return;
      var payload = {
        type: 'mod_kick',
        target: username,
        reason: reason,
      };
      log('Sending mod_kick packet for:', username, payload);
      socket.send(JSON.stringify(payload));
    }

    function kickAllUsers() {
      for (const user of onlineUsers) {
        const username = user.username;
        if (
          username === myUsername ||
          (user.userRoles.role.role && user.userRoles.role.role === 'admin')
        )
          continue;
        kickUser(username);
      }
    }

    function jumpPage(val) {
      currentHistoryIndex = Math.max(0, currentHistoryIndex + val);
      loadHistory();
    }

    function loadHistory() {
      if (!currentTarget) {
        document.getElementById('chat-scroll-wrapper').innerHTML =
          '<div style="padding:20px; text-align:center; font-style:italic; font-size:12px;">Please select or create a topic from the sidebar.</div>';
        return;
      }
      log(
        'Refreshing topic data view. space:',
        currentMode,
        'target:',
        currentTarget,
        'index:',
        currentHistoryIndex,
      );
      var wrapper = document.getElementById('chat-scroll-wrapper');
      wrapper.innerHTML = '';
      var xhr = new XMLHttpRequest();
      var endpoint = '/topic-history?slug=' + currentTarget + '&index=';
      xhr.open('GET', BACKEND_URL + endpoint + currentHistoryIndex, true);
      if (token) xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          log('History stream synced.');
          var data = JSON.parse(xhr.responseText);
          document.getElementById('page-display-index').textContent =
            'PAGE: ' + currentHistoryIndex;
          for (var i = 0; i < data.length; i++) {
            appendMessage(data[i]);
          }
        }
      };
      xhr.send();
    }

    async function sendMessage() {
      var input = document.getElementById('content');
      var text = input.value.trim();
      if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
      if (!currentTarget)
        return await unAlert('Please select a topic room first.');
      log('Dispatching topic message.');
      socket.send(
        JSON.stringify({
          type: 'topic_message',
          content: text,
          target: currentTarget,
        }),
      );
      input.value = '';
    }

    document.getElementById('send').onclick = sendMessage;
    document.getElementById('content').onkeydown = function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };
    document.getElementById('content').oninput = function () {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    };

    function openProfileModal(targetUser) {
      log('Pulling profile metadata for:', targetUser);
      var xhr = new XMLHttpRequest();
      xhr.open('GET', BACKEND_URL + '/api/profile/' + targetUser, true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var p = JSON.parse(xhr.responseText);
          showProfileInModal(p);
        }
      };
      xhr.send();
    }

    function showProfileInModal(p) {
      log('Profile modal view active.');
      if (!p) {
        show('#modal-overlay');
        return;
      }

      document.getElementById('info-username').textContent = p.username;
      document.getElementById('info-location').textContent = p.location;
      document.getElementById('info-bio').textContent = p.bio;
      document.getElementById('info-avatar').textContent = p.avatar_emoji;

      var isSelf = p.username === myUsername;
      document.getElementById('info-dm-btn').onclick = function () {
        closeInfoModal();
        switchChannel('dm', p.username);
      };

      if (isSelf) {
        document.querySelector('#info-edit-controls').style.display = 'flex';
        hide('#info-dm-btn');
        document.getElementById('edit-avatar').value = p.avatar_emoji;
        document.getElementById('edit-location').value = p.location;
        document.getElementById('edit-bio').value = p.bio;
        document.getElementById('change-pass-current').value = '';
        document.getElementById('change-pass-new').value = '';
      } else {
        document.querySelector('#info-edit-controls').style.display = 'none';
        show('#info-dm-btn');
      }

      if (userRoles.role.role && userRoles.role.role === 'admin') {
        show('#admin-controls');
        show('#admin-ban-btn');
        show('#admin-pardon-btn');
        show('#admin-timeout-btn');
        document.getElementById('admin-ban-btn').onclick = async function () {
          if (await unConfirm('Ban ' + p.username + '?'))
            socket.send(
              JSON.stringify({ type: 'mod_ban', target: p.username }),
            );
        };
        document.getElementById('admin-pardon-btn').onclick = function () {
          socket.send(
            JSON.stringify({ type: 'mod_pardon', target: p.username }),
          );
        };
        document.getElementById('admin-timeout-btn').onclick =
          async function () {
            var dur = document.getElementById('admin-timeout-dur').value;
            var r =
              userRoles.role.role && userRoles.role.role === 'admin'
                ? "Admin doesn't need any reasons"
                : await unPrompt('Reason for timeout?');
            socket.send(
              JSON.stringify({
                type: 'mod_timeout',
                target: p.username,
                duration: dur,
                reason: r,
              }),
            );
          };
      } else if (
        userRoles.role.role &&
        userRoles.role.role === 'moderator' &&
        !isSelf
      ) {
        show('#admin-controls');
        hide('#admin-ban-btn');
        hide('#admin-pardon-btn');
        show('#admin-timeout-btn');
        document.getElementById('admin-timeout-btn').onclick =
          async function () {
            var dur = document.getElementById('admin-timeout-dur').value;
            var r =
              userRoles.role.role && userRoles.role.role === 'admin'
                ? "Admin doesn't need any reasons"
                : await unPrompt('Reason for timeout?');
            if (r)
              socket.send(
                JSON.stringify({
                  type: 'mod_timeout',
                  target: p.username,
                  duration: dur,
                  reason: r,
                }),
              );
          };
      } else {
        hide('#admin-controls');
      }
      show('#modal-overlay');
    }

    function closeInfoModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    function saveProfileChanges() {
      var av = document.getElementById('edit-avatar').value.trim();
      var loc = document.getElementById('edit-location').value.trim();
      var bio = document.getElementById('edit-bio').value.trim();
      log('Sending profile update packet.');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/profile', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          closeInfoModal();
          openProfileModal(myUsername);
        }
      };
      xhr.send(JSON.stringify({ bio: bio, location: loc, avatar_emoji: av }));
    }

    async function submitPasswordChange() {
      var currentPass = document.getElementById('change-pass-current').value;
      var newPass = document.getElementById('change-pass-new').value;
      if (!currentPass || !newPass)
        return await unAlert('Please fill out both password fields.');
      log('Sending security parameter update packet.');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/change-password', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = async function () {
        if (xhr.readyState === 4) {
          var res = JSON.parse(xhr.responseText);
          if (xhr.status === 200 && res.success) {
            await unAlert('Password updated!');
            closeInfoModal();
          } else await unAlert(res.error || 'Failed to update password.');
        }
      };
      xhr.send(
        JSON.stringify({
          currentPassword: currentPass,
          newPassword: newPass,
        }),
      );
    }

    if (token && myUsername) {
      initApp();
    }
  </script>
</body>

</html>
