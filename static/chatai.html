<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unreader // kindle ai</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css" />
    <script src="common.js"></script>
    <style>
        :root {
            --panel-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
        }

        /* Stark Minimalist E-Ink Aesthetic */
        body {
            background-color: var(--panel-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }

        h1 {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .subtitle {
            font-size: 14px;
            margin-bottom: 5px;
            text-transform: lowercase;
        }

        .credits {
            font-size: 11px;
            color: #555555;
            margin-bottom: 20px;
            text-transform: none;
            font-style: italic;
        }

        /* API Settings Panel */
        .settings-panel {
            border: 2px solid var(--border-color);
            padding: 15px;
            margin-bottom: 30px;
            background-color: var(--panel-color);
        }

        .settings-panel h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .settings-panel input,
        .settings-panel textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            box-sizing: border-box;
            font-size: 13px;
            background-color: var(--panel-color);
            color: var(--text-color);
        }

        .settings-panel textarea {
            height: 70px;
            resize: vertical;
        }

        /* Chat Logs */
        #chat-log {
            margin-bottom: 30px;
        }

        .msg {
            margin-bottom: 20px;
            padding: 15px;
        }

        .user {
            background-color: #f2f2f2;
            border-left: 4px solid var(--border-color);
        }

        .ai {
            background-color: var(--panel-color);
            border: 1px dashed var(--border-color);
        }

        .msg-header {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Input Form */
        #user-input {
            width: 100%;
            height: 100px;
            background-color: var(--panel-color);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            box-sizing: border-box;
            resize: vertical;
            font-size: 14px;
        }

        #user-input:focus {
            outline: none;
            background-color: #fafafa;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        button {
            background-color: var(--text-color);
            color: var(--panel-color);
            border: 2px solid var(--border-color);
            font-family: 'Courier New', Courier, monospace;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--panel-color);
            color: var(--text-color);
        }

        button.secondary {
            background-color: var(--panel-color);
            color: var(--text-color);
            border: 1px solid #888888;
        }

        button.secondary:hover {
            background-color: #f2f2f2;
        }

        .loading {
            font-style: italic;
            color: #666666;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.3;
            }
        }

        /* Dark mode */
        body.dark-mode {
            background-color: #121212 !important;
            color: #ffffff !important;
        }

        body.dark-mode h1,
        body.dark-mode .subtitle {
            color: #ffffff !important;
            border-color: #ffffff !important;
        }

        body.dark-mode .credits {
            color: #aaaaaa !important;
        }

        body.dark-mode .settings-panel {
            background-color: #1a1a1a !important;
            border-color: #ffffff !important;
            color: #ffffff !important;
        }

        body.dark-mode .settings-panel input,
        body.dark-mode .settings-panel textarea {
            background-color: #121212 !important;
            color: #ffffff !important;
            border-color: #ffffff !important;
        }

        body.dark-mode .user {
            background-color: #1e1e1e !important;
            border-left-color: #ffffff !important;
        }

        body.dark-mode .ai {
            background-color: #121212 !important;
            border-color: #ffffff !important;
        }

        body.dark-mode #user-input {
            background-color: #121212 !important;
            color: #ffffff !important;
            border-color: #ffffff !important;
        }

        body.dark-mode button {
            background-color: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
        }

        body.dark-mode button.secondary {
            background-color: #1a1a1a !important;
            color: #ffffff !important;
            border-color: #888888 !important;
        }

        body.dark-mode .loading {
            color: #aaaaaa !important;
        }

        body.dark-mode {
            color: #ffffff;
        }

        body.dark-mode * {
            border-color: #ffffff !important;
        }
    </style>
</head>

<body>
<script>applySavedPreferences();</script>

    <h1>unreader // kindle ai</h1>
    <div class="subtitle">clean formatting & chat for e-ink reading</div>
    <div class="credits">Programmed by Unreader team</div>

    <div class="settings-panel">
        <h3> Connection & AI Settings</h3>

        <div class="input-group">
            <label for="api-url-input">API Operator Endpoint URL:</label>
            <input type="text" id="api-url-input"
                placeholder="https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent"
                onchange="saveSettings()">
        </div>

        <div class="input-group">
            <label for="api-key-input">Gemini API Key:</label>
            <input type="password" id="api-key-input" placeholder="Enter your secret API key..."
                onchange="saveSettings()">
        </div>

        <div class="input-group">
            <label for="api-prompt-input">Custom AI System Instructions:</label>
            <textarea id="api-prompt-input"
                placeholder="You are an AI made specifically for Kindles. You were programmed by KodiGamingYT..."
                onchange="saveSettings()"></textarea>
        </div>

        <span style="color:#666; font-size:10px; display:block; margin-top:5px;">All configurations and instructions are
            saved safely in your browser memory.</span>
    </div>

    <div id="chat-log"></div>

    <div id="input-area">
        <textarea id="user-input" placeholder="Paste text or ask a question to format for Kindle..."></textarea>
        <div class="btn-container">
            <button class="secondary" onclick="clearHistory()">Clear History</button>
            <button onclick="sendToGemini()">Send</button>
        </div>
    </div>

    <script>
        // Initialize Setup from Browser Storage
        let chatHistory = JSON.parse(localStorage.getItem('kindle_chat_history')) || [];

        // Default system prompt if the user has never written one
        const defaultPrompt = "You are an AI made specifically for Kindles. You were programmed by KodiGamingYT. Your job is to strip away internet fluff and format the provided text into clear headers, minimalist bullet points, and neat spacing. Keep your answers short, direct, and highly readable for high-contrast e-ink screens.";

        // Auto-populate input boxes from localStorage
        document.getElementById('api-url-input').value = localStorage.getItem('kindle_api_url') || '';
        document.getElementById('api-key-input').value = localStorage.getItem('kindle_api_key') || '';
        document.getElementById('api-prompt-input').value = localStorage.getItem('kindle_system_prompt') || defaultPrompt;

        const chatLogDiv = document.getElementById('chat-log');
        renderHistory();

        function saveSettings() {
            const urlValue = document.getElementById('api-url-input').value.trim();
            const keyValue = document.getElementById('api-key-input').value.trim();
            const promptValue = document.getElementById('api-prompt-input').value.trim();

            localStorage.setItem('kindle_api_url', urlValue);
            localStorage.setItem('kindle_api_key', keyValue);
            localStorage.setItem('kindle_system_prompt', promptValue);
        }

        function renderHistory() {
            chatLogDiv.innerHTML = '';
            if (chatHistory.length === 0) {
                chatLogDiv.innerHTML = '<p style="color:#666; font-style:italic;">History is clean. Ready for reading.</p>';
                return;
            }

            chatHistory.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('msg', msg.role);

                const header = document.createElement('div');
                header.classList.add('msg-header');
                header.innerText = msg.role === 'user' ? '● You' : '○ Kindle AI';

                const body = document.createElement('div');
                body.style.whiteSpace = "pre-wrap";
                body.innerText = msg.text;

                msgDiv.appendChild(header);
                msgDiv.appendChild(body);
                chatLogDiv.appendChild(msgDiv);
            });
            window.scrollTo(0, document.body.scrollHeight);
        }

        async function sendToGemini() {
            const storedUrl = localStorage.getItem('kindle_api_url');
            const storedKey = localStorage.getItem('kindle_api_key');
            const storedPrompt = localStorage.getItem('kindle_system_prompt') || defaultPrompt;

            if (!storedUrl || !storedKey) {
                alert("Please fill in both the API Endpoint URL and your API Key in the settings panel first!");
                return;
            }

            const inputField = document.getElementById('user-input');
            const userText = inputField.value.trim();
            if (!userText) return;

            chatHistory.push({ role: 'user', text: userText });
            saveHistory();
            renderHistory();
            inputField.value = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.classList.add('msg', 'ai', 'loading');
            loadingDiv.id = 'loading-placeholder';
            loadingDiv.innerText = 'Formatting for e-ink...';
            chatLogDiv.appendChild(loadingDiv);

            // Appends key token to URL automatically if not explicit
            let targetUrl = storedUrl;
            if (!targetUrl.includes('key=')) {
                targetUrl += (targetUrl.includes('?') ? '&' : '?') + `key=${storedKey}`;
            }

            try {
                const response = await fetch(targetUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `${storedPrompt}\n\nUser request:\n${userText}` }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                const aiText = data.candidates[0].content.parts[0].text;

                document.getElementById('loading-placeholder').remove();
                chatHistory.push({ role: 'ai', text: aiText });
                saveHistory();
                renderHistory();

            } catch (error) {
                console.error(error);
                document.getElementById('loading-placeholder').innerText = `Error: ${error.message || "Failed execution. Check layout options."}`;
            }
        }

        function saveHistory() {
            localStorage.setItem('kindle_chat_history', JSON.stringify(chatHistory));
        }

        function clearHistory() {
            localStorage.removeItem('kindle_chat_history');
            chatHistory = [];
            renderHistory();
        }

        document.getElementById('user-input').addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                sendToGemini();
            }
        });
    </script>
</body>

</html>
