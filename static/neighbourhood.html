<html lang="en">

<head>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="bbs.css" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.2/purify.min.js"></script>

  <style type="text/css">
    #active-users {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .mod-indicator-active {
      background: red !important;
      color: white !important;
      border-style: solid !important;
    }

    .page-btn {
      background: #ffffff;
      border: var(--border);
      padding: 2px 8px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
      box-shadow: 1px 1px 0 black;
    }

    #page-display-index {
      margin: 0 10px;
      font-weight: bold;
      font-size: 12px;
    }

    #input-bar-container {
      flex-wrap: wrap;
      align-items: stretch;
    }

    #nb-title-input {

      font-size: 15px;
      border: var(--border);

      background: white;

    .nb-post-box {

      margin-bottom: 15px;

    .nb-header {

    .comment-toggle-btn {

      font-weight: bold;

    #modal-overlay {
      position: fixed;
      top: 0;

      height: 100%;

    .auth-box {

    .auth-box input {

    body.contrast-medium {

      --border-width: 3px;

  <div class="window">

  <script type="text/javascript">
    var token = localStorage.getItem('token');
    var myUsername = localStorage.getItem('username');
    var currentMode = 'neighborhood';
    var currentTarget = '';
    var socket = null;
    var isRegisterMode = false;
    var currentHistoryIndex = 0;
    var modModeActive = false;
    var userRoles = {
      role: { role: '', prefix: '', style: '', class: '' },
      is_banned: false,
      timeout_until: 0,
      last_ip: null,
    };

    function log(...args) {
      if (DO_LOGGING) console.log(`[CLIENT]`, ...args);
    }

    function parseMarkdownForKindle(text) {
      // replace bold text: '**text**' -> '<strong>text</strong>'
      text = text.replace(
        /([\*_])([\*_](.*?)[\*_])([\*_])/g,
        '<strong>$2</strong>',
      );
      // replace italic text: '*text*' -> '<i>text</i>'
      text = text.replace(/([\*_])(.*?)([\*_])/g, '<i>$2</i>');
      // replace links: '[text](url)' -> '<a href="url">text</a>'
      text = text.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>');
      // replace images: '![alt text](url)' -> '<img src="url" alt="alt text">'
      text = text.replace(/\!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">');
      // replace headers: # H1 -> <h1>H1</h1>
      text = text.replace(/\#{1} (.*?)/g, '<h1>$1</h1>');
      // replace headers: ## H2 -> <h2>H2</h2>
      text = text.replace(/\#{2} (.*?)/g, '<h2>$1</h2>');
      // replace headers: ### H3 -> <h3>H3</h3>
      text = text.replace(/\#{3} (.*?)/g, '<h3>H3</h3>');
      // replace headers: #### H4 -> <h4>H4</h4>
      text = text.replace(/\#{4} (.*?)/g, '<h4>H4</h4>');
      // replace headers: ##### H5 -> <h5>H5</h5>
      text = text.replace(/\#{5} (.*?)/g, '<h5>H5</h5>');
      // replace headers: ###### H6 -> <h6>H6</h6>
      text = text.replace(/\#{6} (.*?)/g, '<h6>H6</h6>');
      // replace unordered lists: '- item' -> '<li>item</li>'
      text = text.replace(/^(-|\*) (.*?)/g, '<li>$1</li>');
      // replace ordered lists: '1. item' -> '<li>item</li>'
      text = text.replace(/^\d\. (.*?)/g, '<li>$1</li>');
      // replace code blocks: '```code```' -> '<pre><code>code</code></pre>'
      text = text.replace(/```(.*?)```/g, '<pre><code>$1</code></pre>');
      // replace inline code: '`code`' -> '<code>code</code>'
      text = text.replace(/`(.*?)`/g, '<code>$1</code>');
      // replace blockquotes: '> quote' -> '<blockquote>quote</blockquote>'
      text = text.replace(/\>(.*?)/g, '<blockquote>$1</blockquote>');
      // replace horizontal rules: '---' -> '<hr>'
      text = text.replace(/\-\-\- /g, '<hr>');
      // replace strikethrough: '~text~' -> '<del>text</del>'
      text = text.replace(/~(.*?)~/g, '<del>$1</del>');
      return text;
    }

    function parseMarkup(text) {
      if (!text) return '';
      const escaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      if (navigator.userAgent.toLowerCase().includes('kindle')) {
        return DOMPurify.sanitize(escaped);
      }
      return DOMPurify.sanitize(marked.parse(escaped)).trim();
    }

    function formatTimeToken(unixTimestamp) {
      if (!unixTimestamp) return 'MOMENTS AGO';
      var parsedNum = Number(unixTimestamp);
      if (isNaN(parsedNum)) return 'MOMENTS AGO';
      var d = new Date(parsedNum);
      return (
        d.toLocaleDateString() +
        ' ' +
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      );
    }

    function toggleModMode() {
      modModeActive = !modModeActive;
      log('Mod mode toggle state:', modModeActive);
      var btn = document.getElementById('mod-mode-btn');
      btn.textContent = modModeActive ? 'MOD MODE: ACTIVE' : 'MOD MODE: OFF';
      btn.classList.toggle('mod-indicator-active', modModeActive);
      loadHistory();
    }

    document.getElementById('auth-toggle').onclick = function () {
      isRegisterMode = !isRegisterMode;
      log('Auth mode toggled. isRegisterMode:', isRegisterMode);
      document.getElementById('auth-title').textContent = isRegisterMode
        ? 'REGISTER'
        : 'LOGIN';
      this.textContent = isRegisterMode
        ? 'Already have an account? Login'
        : 'Need an account? Register';
    };

    document.getElementById('auth-submit-btn').onclick = async function () {
      var username = document.getElementById('auth-user').value.trim();
      var password = document.getElementById('auth-pass').value;
      if (!username || !password)
        return await unAlert('Fill in all log credentials.');
      var url = isRegisterMode ? '/api/register' : '/api/login';
      log('Auth submit. endpoint:', url, 'user:', username);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onreadystatechange = async function () {
        if (xhr.readyState === 4) {
          log('Auth XHR complete. status:', xhr.status);
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              localStorage.setItem('token', data.token);
              localStorage.setItem('username', data.username);
              token = data.token;
              myUsername = data.username;
              applySavedPreferences();
              initApp();
            } catch (e) {
              log('Auth JSON parse error:', e);
              await unAlert('Server returned an invalid packet signature.');
            }
          } else {
            log('Auth failed. buffer:', xhr.responseText);
            try {
              var errData = JSON.parse(xhr.responseText);
              await unAlert(
                'Server error: ' + (errData.error || 'Access Denied'),
              );
            } catch (e) {
              await unAlert('Structural connection failure.');
            }
          }
        }
      };
      xhr.send(JSON.stringify({ username: username, password: password }));
    };

    function initApp() {
      log('Booting application logic layers.');
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('user-display').textContent = '@' + myUsername;

      if (socket) {
        try {
          socket.close();
        } catch (e) { }
      }
      log('Opening WS link:', WS_URL);
      socket = new WebSocket(WS_URL);
      socket.onopen = function () {
        log('WS Link connected. Authenticating...');
        socket.send(JSON.stringify({ type: 'auth', token: token }));
        socket.send(
          JSON.stringify({
            type: 'switch_context',
            mode: 'neighborhood',
            target: '',
          }),
        );
      };
      socket.onmessage = async function (event) {
        var data = JSON.parse(event.data);
        log('Incoming packet:', data.type);
        if (data.type === 'terminated') {
          await unAlert(data.reason || 'Session expired.');
          localStorage.clear();
          window.location.reload();
          return;
        }
        if (data.type === 'auth_success') {
          if (
            data.userRoles.role.role &&
            data.userRoles.role.role === 'admin'
          ) {
            show('#kick-all-btn');
          }
          return;
        }
        if (data.type === 'error_alert') {
          await unAlert(data.message);
          return;
        }
        if (data.type === 'refresh_feed') {
          log('Broadcast: refresh_feed received.');
          loadHistory();
          return;
        }
        if (data.type === 'roster_update') {
          renderUserRoster(data.users);
          return;
        }
        if (data.type === 'topics_update') {
          if (data.user_roles) {
            userRoles = data.user_roles;
            log('Roles updated:', userRoles);
            if (['admin', 'moderator'].includes(userRoles.role.role)) {
              document.querySelector('#mod-toggle-container').style.display =
                'flex';
              localStorage.setItem('unreader-rank', 'mod');
            } else {
              localStorage.setItem('unreader-rank', 'user');
            }
          }
          return;
        }
        if (currentHistoryIndex === 0) loadHistory();
      };
      loadHistory();
    }

    var onlineUsers = [];
    function renderUserRoster(userList) {
      onlineUsers = userList;
      var container = document.getElementById('roster-list');
      container.innerHTML = '';

      var sysDiv = document.createElement('div');
      sysDiv.className = 'roster-user';
      sysDiv.style.display = 'flex';
      sysDiv.style.justifyContent = 'space-between';
      sysDiv.style.alignItems = 'center';
      var sysSpan = document.createElement('span');
      sysSpan.className = 'roster-name';
      sysSpan.textContent = 'system (Global)';
      sysSpan.onclick = function () {
        openProfileModal('system');
      };
      sysDiv.appendChild(sysSpan);
      container.appendChild(sysDiv);

      for (var i = 0; i < userList.length; i++) {
        var u = userList[i];
        if (u.username === 'system') continue;
        var div = document.createElement('div');
        div.className = 'roster-user';
        div.style.display = 'flex';
        div.style.justifyContent = 'space-between';
        div.style.alignItems = 'center';
        var span = document.createElement('span');
        span.className = 'roster-name';
        var context =
          u.mode === 'public'
            ? ' (Global)'
            : u.mode === 'dm'
              ? ' (DM @' + u.target + ')'
              : ' (Neighborhood)';
        span.textContent = u.username + context;
        (function (user) {
          span.onclick = function () {
            openProfileModal(user.username);
          };
        })(u);
        div.appendChild(span);
        log(
          'Showing online user: ' +
          u.username +
          (u.mode === 'public'
            ? ' (Global)'
            : u.mode === 'dm'
              ? ' (DM @' + u.target + ')'
              : ' (Neighborhood)') +
          ' who ' +
          (['admin', 'moderator'].includes(userRoles.role.role) &&
            u.username !== myUsername
            ? 'can'
            : 'cannot') +
          ' be kicked.',
        );
        if (
          u.username !== myUsername &&
          userRoles.role.role &&
          (userRoles.role.role === 'admin' ||
            (userRoles.role.role === 'moderator' &&
              !u.userRoles.role.role === 'admin'))
        ) {
          const username = u.username;
          var kick = document.createElement('button');
          kick.className = 'paper-btn';
          kick.textContent = 'KICK';
          kick.onclick = function () {
            kickUser(username);
          };
          div.appendChild(kick);
        }
        container.appendChild(div);
      }
    }

    function appendNeighborhoodPost(data) {
      log('APPEND_POST entry details:', JSON.stringify(data));
      var chatWrapper = document.getElementById('chat-scroll-wrapper');
      var box = document.createElement('div');
      box.className = 'nb-post-box';
      box.id = 'nb-post-' + data.id;
      if (data.is_deleted) {
        box.innerHTML = '<em>[POST RECORD PURGED]</em>';
      } else {
        var timeStr = formatTimeToken(data.timestamp);
        var effectiveUsername =
          data.username || data.sender || 'UNKNOWN_NODE';
        var nameDisplay = DOMPurify.sanitize(
          (data.role.prefix || '') + ' @' + effectiveUsername,
        ).trim();
        box.innerHTML =
          '<div class="nb-header" style="cursor:pointer;">' +
          nameDisplay +
          ' • ' +
          timeStr +
          '</div>' +
          '<div class="nb-title"></div>' +
          '<div class="message-text" style="font-size:13px; margin-bottom:10px;"></div>' +
          '<button class="paper-btn" onclick="toggleCommentsSection(' +
          data.id +
          ')">Comments</button>' +
          '<div class="comment-area" id="comment-area-for-' +
          data.id +
          '">' +
          '<div class="comment-list"></div>' +
          '<div style="margin-top:6px; display:flex;">' +
          '<input type="text" class="paper-input" placeholder="Write response..." id="input-comment-for-' +
          data.id +
          '" style="flex-grow:1; margin-right: 6px;"> ' +
          '<button class="paper-btn" onclick="submitComment(' +
          data.id +
          ')">REPLY</button>' +
          '</div>' +
          '</div>';
        box.querySelector('.nb-header').onclick = function () {
          openProfileModal(effectiveUsername);
        };
        box.querySelector('.nb-title').innerHTML = censor(
          parseMarkup(data.title),
        );
        box.querySelector('.message-text').innerHTML = censor(
          parseMarkup(data.content),
        );
        var cList = box.querySelector('.comment-list');
        if (data.comments && data.comments.length > 0) {
          for (var i = 0; i < data.comments.length; i++) {
            var c = data.comments[i];
            // log('Appending comment ' + JSON.stringify(c) + '...');
            var cDiv = document.createElement('div');
            cDiv.className = 'comment-item';
            if (c.is_deleted) {
              cDiv.innerHTML = '<em>[Comment Purged]</em>';
            } else {
              var cEffectiveUsername =
                c.username || c.sender || 'UNKNOWN_NODE';
              var cName = DOMPurify.sanitize(
                c.role.prefix + '@' + cEffectiveUsername,
              );
              cDiv.innerHTML =
                '<strong style="cursor:pointer;">' +
                cName +
                '</strong>: <span class="c-txt"></span>';
              (function (u) {
                cDiv.querySelector('strong').onclick = function () {
                  openProfileModal(u);
                };
              })(cEffectiveUsername);
              cDiv.querySelector('.c-txt').innerHTML = censor(
                parseMarkup(c.content),
              );

              if (
                cEffectiveUsername === myUsername ||
                ['admin', 'moderator'].includes(userRoles.role.role)
              ) {
                var cDel = document.createElement('button');
                cDel.style =
                  'float:right; font-size:8px; font-family:monospace; cursor:pointer; background:white; border:1px solid black;';
                cDel.textContent = 'X';
                (function (cid) {
                  cDel.onclick = async function () {
                    var r =
                      userRoles.role.role && userRoles.role.role === 'admin'
                        ? "Admin doesn't need any reasons"
                        : await unPrompt('Reason for purge?');
                    if (r !== null) {
                      log('Mod Action: Purge Comment id:', cid);
                      socket.send(
                        JSON.stringify({
                          type: 'mod_delete',
                          id: cid,
                          channel: 'neighborhood_comment',
                          reason: r,
                        }),
                      );
                    }
                  };
                })(c.id);
                cDiv.appendChild(cDel);
              }
            }
            cList.appendChild(cDiv);
          }
        }
      }
      injectModTray(box, data, false);
      chatWrapper.appendChild(box);
    }

    function toggleCommentsSection(postId) {
      var target = document.getElementById('comment-area-for-' + postId);
      target.style.display =
        target.style.display === 'block' ? 'none' : 'block';
    }

    function submitComment(postId) {
      var inp = document.getElementById('input-comment-for-' + postId);
      var text = inp.value.trim();
      if (!text) return;
      if (socket && socket.readyState === WebSocket.OPEN) {
        log('Broadcasting neighborhood comment packet.');
        socket.send(
          JSON.stringify({
            type: 'neighborhood_comment',
            post_id: postId,
            content: text,
          }),
        );
      }
      inp.value = '';
    }

    function injectModTray(targetNode, data, isMe) {
      if (
        !['admin', 'moderator'].includes(userRoles.role.role) ||
        !modModeActive ||
        data.id === -1
      )
        return;
      var trayDiv = document.createElement('div');
      trayDiv.className = 'mod-action-tray';
      trayDiv.style.float = isMe ? 'right' : 'left';
      trayDiv.style.clear = 'both';

      if (!data.is_deleted) {
        var dBtn = document.createElement('button');
        dBtn.className = 'mod-tray-btn';
        dBtn.textContent = 'PURGE';
        dBtn.onclick = async function () {
          var r =
            userRoles.role.role && userRoles.role.role === 'admin'
              ? "Admin doesn't need any reasons"
              : await unPrompt('Reason for purge?');
          if (r !== null) sendModAction('mod_delete', data.id, r);
        };
        trayDiv.appendChild(dBtn);
      } else {
        if (
          userRoles.role.role &&
          (userRoles.role.role === 'admin' ||
            (userRoles.role.role === 'moderator' &&
              data.deleted_by === myUsername))
        ) {
          var rBtn = document.createElement('button');
          rBtn.className = 'mod-tray-btn';
          rBtn.textContent = 'RESTORE';
          rBtn.onclick = function () {
            log('Sending restore packet for id:', data.id);
            sendModAction('mod_restore', data.id);
          };
          trayDiv.appendChild(rBtn);
        }
      }
      targetNode.appendChild(trayDiv);
    }

    function sendModAction(type, id, reason) {
      log('Dispatching moderator action packet:', type);
      socket.send(
        JSON.stringify({
          type: type,
          id: id,
          channel: currentMode,
          reason: reason,
        }),
      );
    }

    async function kickUser(username) {
      if (!socket || socket.readyState !== WebSocket.OPEN)
        return await unAlert('Socket offline.');
      var reason =
        userRoles.role.role && userRoles.role.role === 'admin'
          ? "Admin doesn't need any reasons"
          : await unPrompt('Reason for kick?');
      if (
        !(userRoles.role.role && userRoles.role.role === 'admin') &&
        !reason
      )
        return;
      var payload = {
        type: 'mod_kick',
        target: username,
        reason: reason,
      };
      log('Sending mod_kick packet for:', username, payload);
      socket.send(JSON.stringify(payload));
    }

    function kickAllUsers() {
      for (const user of onlineUsers) {
        const username = user.username;
        if (
          username === myUsername ||
          (user.userRoles.role.role && user.userRoles.role.role === 'admin')
        )
          continue;
        kickUser(username);
      }
    }

    function jumpPage(val) {
      currentHistoryIndex = Math.max(0, currentHistoryIndex + val);
      loadHistory();
    }

    function loadHistory() {
      log(
        'Refreshing neighborhood data view. space:',
        currentMode,
        'index:',
        currentHistoryIndex,
      );
      var wrapper = document.getElementById('chat-scroll-wrapper');
      wrapper.innerHTML = '';
      var xhr = new XMLHttpRequest();
      var endpoint = '/neighborhood-history?index=';
      xhr.open('GET', BACKEND_URL + endpoint + currentHistoryIndex, true);
      if (token) xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          log('History stream synced.');
          var data = JSON.parse(xhr.responseText);
          document.getElementById('page-display-index').textContent =
            'PAGE: ' + currentHistoryIndex;
          for (var i = 0; i < data.length; i++) {
            appendNeighborhoodPost(data[i]);
          }
        }
      };
      xhr.send();
    }

    async function sendMessage() {
      var input = document.getElementById('content');
      var text = input.value.trim();
      if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;

      var tInput = document.getElementById('nb-title-input');
      var titleText = tInput.value.trim();
      if (!titleText) return await unAlert('Enter a post heading title.');
      socket.send(
        JSON.stringify({
          type: 'neighborhood_post',
          title: titleText,
          content: text,
        }),
      );
      tInput.value = '';

      input.value = '';
    }

    document.getElementById('send').onclick = sendMessage;
    document.getElementById('content').onkeydown = function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };
    document.getElementById('content').oninput = function () {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    };

    function openProfileModal(targetUser) {
      log('Pulling profile metadata for:', targetUser);
      var xhr = new XMLHttpRequest();
      xhr.open('GET', BACKEND_URL + '/api/profile/' + targetUser, true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var p = JSON.parse(xhr.responseText);
          showProfileInModal(p);
        }
      };
      xhr.send();
    }

    function showProfileInModal(p) {
      log('Profile modal view active.');
      if (!p) {
        show('#modal-overlay');
        return;
      }

      document.getElementById('info-username').textContent = p.username;
      document.getElementById('info-location').textContent = p.location;
      document.getElementById('info-bio').textContent = p.bio;
      document.getElementById('info-avatar').textContent = p.avatar_emoji;

      var isSelf = p.username === myUsername;
      document.getElementById('info-dm-btn').onclick = function () {
        closeInfoModal();
        switchChannel('dm', p.username);
      };

      if (isSelf) {
        document.querySelector('#info-edit-controls').style.display = 'flex';
        hide('#info-dm-btn');
        document.getElementById('edit-avatar').value = p.avatar_emoji;
        document.getElementById('edit-location').value = p.location;
        document.getElementById('edit-bio').value = p.bio;
        document.getElementById('change-pass-current').value = '';
        document.getElementById('change-pass-new').value = '';
      } else {
        document.querySelector('#info-edit-controls').style.display = 'none';
        show('#info-dm-btn');
      }

      if (userRoles.is_admin) {
        show('#admin-controls');
        show('#admin-ban-btn');
        show('#admin-pardon-btn');
        show('#admin-timeout-btn');
        document.getElementById('admin-ban-btn').onclick = async function () {
          if (await unConfirm('Ban ' + p.username + '?'))
            socket.send(
              JSON.stringify({ type: 'mod_ban', target: p.username }),
            );
        };
        document.getElementById('admin-pardon-btn').onclick = function () {
          socket.send(
            JSON.stringify({ type: 'mod_pardon', target: p.username }),
          );
        };
        document.getElementById('admin-timeout-btn').onclick =
          async function () {
            var dur = document.getElementById('admin-timeout-dur').value;
            var r =
              userRoles.role.role && userRoles.role.role === 'admin'
                ? "Admin doesn't need any reasons"
                : await unPrompt('Reason for timeout?');
            socket.send(
              JSON.stringify({
                type: 'mod_timeout',
                target: p.username,
                duration: dur,
                reason: r,
              }),
            );
          };
      } else if (
        userRoles.role.role &&
        userRoles.role.role === 'moderator' &&
        !isSelf
      ) {
        show('#admin-controls');
        hide('#admin-ban-btn');
        hide('#admin-pardon-btn');
        show('#admin-timeout-btn');
        document.getElementById('admin-timeout-btn').onclick =
          async function () {
            var dur = document.getElementById('admin-timeout-dur').value;
            var r =
              userRoles.role.role && userRoles.role.role === 'admin'
                ? "Admin doesn't need any reasons"
                : await unPrompt('Reason for timeout?');
            if (r)
              socket.send(
                JSON.stringify({
                  type: 'mod_timeout',
                  target: p.username,
                  duration: dur,
                  reason: r,
                }),
              );
          };
      } else {
        hide('#admin-controls');
      }
      show('#modal-overlay');
    }

    function closeInfoModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    function saveProfileChanges() {
      var av = document.getElementById('edit-avatar').value.trim();
      var loc = document.getElementById('edit-location').value.trim();
      var bio = document.getElementById('edit-bio').value.trim();
      log('Sending profile update packet.');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/profile', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          closeInfoModal();
          openProfileModal(myUsername);
        }
      };
      xhr.send(JSON.stringify({ bio: bio, location: loc, avatar_emoji: av }));
    }

    async function submitPasswordChange() {
      var currentPass = document.getElementById('change-pass-current').value;
      var newPass = document.getElementById('change-pass-new').value;
      if (!currentPass || !newPass)
        return await unAlert('Please fill out both password fields.');
      log('Sending security parameter update packet.');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/change-password', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = async function () {
        if (xhr.readyState === 4) {
          var res = JSON.parse(xhr.responseText);
          if (xhr.status === 200 && res.success) {
            await unAlert('Password updated!');
            closeInfoModal();
          } else await unAlert(res.error || 'Failed to update password.');
        }
      };
      xhr.send(
        JSON.stringify({
          currentPassword: currentPass,
          newPassword: newPass,
        }),
      );
    }

    if (token && myUsername) {
      initApp();
    }
  </script>
</body>

</html>
