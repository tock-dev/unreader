<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Un-Reader - Suggestions</title>
  <style>
    /* --- KINDLE E-INK CORE LAYOUT --- */
    * { box-sizing: border-box; transition: none !important; animation: none !important; border-radius: 0 !important; }
    
    :root { 
      --bg-color: #ffffff; 
      --text-color: #000000; 
      --border-color: #000000; 
      --border-width: 2px; 
      --body-font: "Courier New", Courier, monospace; 
    }
    
    body.dark-mode { --bg-color: #000000; --text-color: #ffffff; --border-color: #ffffff; }
    body.dyslexic-font { --body-font: "OpenDyslexic", sans-serif; }
    
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: var(--body-font); overflow-x: hidden; }

    /* Layout Frames */
    .header-container { text-align: center; padding: 20px; border-bottom: var(--border-width) solid var(--border-color); position: relative; width: 100%; }
    .title { font-size: 24px; font-weight: 900; margin: 0; letter-spacing: 1px; }
    .subtitle { font-size: 13px; margin-top: 5px; font-weight: bold; }
    .back-btn { position: absolute; top: 20px; left: 20px; cursor: pointer; font-weight: 900; font-size: 14px; text-decoration: underline; }

    /* Forms & Inputs */
    .form-box { margin: 15px; border: var(--border-width) solid var(--border-color); padding: 15px; background: var(--bg-color); max-width: calc(100% - 30px); }
    .section-title { font-weight: 900; font-size: 14px; border-bottom: var(--border-width) solid var(--border-color); padding-bottom: 5px; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
    
    .kindle-input { width: 100%; border: 2px solid var(--border-color); background: var(--bg-color); color: var(--text-color); padding: 8px; font-family: inherit; font-size: 13px; margin-bottom: 12px; }
    textarea.kindle-input { resize: vertical; min-height: 80px; }
    
    button { border: var(--border-width) solid var(--text-color); background: var(--bg-color); color: var(--text-color); font-weight: 900; padding: 6px 12px; cursor: pointer; font-family: inherit; }
    button:active { background: var(--text-color); color: var(--bg-color); }
    .submit-btn { width: 100%; padding: 10px; font-size: 13px; font-weight: 900; }

    /* Suggestion Feed Cards */
    .suggestions-feed { margin: 15px; max-width: calc(100% - 30px); }
    .suggestion-card { border: var(--border-width) solid var(--border-color); padding: 12px; margin-bottom: 12px; background: var(--bg-color); }
    .card-header { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; border-bottom: 1px dashed var(--border-color); padding-bottom: 4px; margin-bottom: 8px; }
    .card-title { font-weight: 900; font-size: 14px; margin: 0 0 6px 0; text-transform: uppercase; }
    .card-desc { font-size: 12px; line-height: 1.3; white-space: pre-wrap; }
    
    .status-msg { font-size: 12px; font-weight: bold; text-align: center; margin: 10px 0; display: none; padding: 5px; border: 1px dashed var(--border-color); }
  </style>
  <script src="common.js"></script>
</head>
<body>

  <div class="header-container">
    <div class="back-btn" onclick="window.location.href='index.html'">&lt; DASHBOARD</div>
    <div class="title">SUGGESTIONS</div>
    <div class="subtitle">Suggest an app! Share your ideas with the platform.</div>
  </div>

  <!-- INPUT FORM FOR NEW IDEAS -->
  <div class="form-box" id="form-container">
    <div class="section-title">Submit an Idea</div>
    <div id="status-log" class="status-msg"></div>
    
    <div style="font-weight: 900; margin-bottom: 4px; font-size: 11px;">APPLICATION NAME:</div>
    <input type="text" id="idea-title" class="kindle-input" placeholder="e.g., Mail Client, Snake Game..." autocomplete="off" />
    
    <div style="font-weight: 900; margin-bottom: 4px; font-size: 11px;">CONCEPT DESCRIPTION:</div>
    <textarea id="idea-desc" class="kindle-input" placeholder="Explain what this app would do and why we need it..."></textarea>
    
    <button id="idea-submit" class="submit-btn">POST SUGGESTION</button>
  </div>

  <!-- ACTIVE FEED -->
  <div class="suggestions-feed">
    <div class="section-title">Community App Ideas</div>
    <div id="feed-container"></div>
  </div>

  <script>
    // --- LEGACY HARDWARE CACHE SYNC ENGINE ---
    function getStorageItem(key) {
        let val = localStorage.getItem(key);
        if (!val) {
            const pairs = document.cookie.split('; ');
            for (let i = 0; i < pairs.length; i++) {
                const parts = pairs[i].split('=');
                if (parts[0] === key) return decodeURIComponent(parts[1]);
            }
        }
        return val;
    }

    // Apply global Kindle environment constraints
    if (getStorageItem('dark-mode') === 'true') document.body.classList.add('dark-mode');
    if (getStorageItem('dyslexic-font') === 'true') document.body.classList.add('dyslexic-font');

    var token = getStorageItem("token");
    var myUsername = getStorageItem("username");

    // Hide input interface if browser session is unauthenticated
    if (!token || !myUsername) {
        var statusLog = document.getElementById("status-log");
        statusLog.textContent = "Guest Mode: Please log in via Dashboard settings to submit ideas.";
        statusLog.style.display = "block";
        document.getElementById("idea-title").disabled = true;
        document.getElementById("idea-desc").disabled = true;
        document.getElementById("idea-submit").disabled = true;
    }

    // --- FETCH FEED VIA GENERIC BACKEND REST DATA DESCRIPTORS ---
    function fetchSuggestions() {
        var container = document.getElementById("feed-container");
        container.innerHTML = '<div style="font-size:12px; font-style:italic;">Querying backend databanks...</div>';

        var xhr = new XMLHttpRequest();
        // Pointing to neighborhood posts or a custom suggestions target context
        xhr.open("GET", BACKEND_URL + "/history?index=0", true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var posts = JSON.parse(xhr.responseText);
                        container.innerHTML = "";
                        
                        // Parse out structural targets containing app concept parameters
                        var foundAny = false;
                        posts.forEach(post => {
                            if (post.content && post.content.includes("[APP_SUGGESTION]")) {
                                foundAny = true;
                                var cleanContent = post.content.replace("[APP_SUGGESTION]", "").trim();
                                var lines = cleanContent.split("\n");
                                var title = lines[0] || "Untitled Concept";
                                var desc = lines.slice(1).join("\n") || "No explanation provided.";

                                var card = document.createElement("div");
                                card.className = "suggestion-card";
                                card.innerHTML = `
                                    <div class="card-header">
                                        <div>@${post.username || "anonymous"}</div>
                                        <div>${new Date(post.timestamp).toLocaleDateString()}</div>
                                    </div>
                                    <div class="card-title">${title}</div>
                                    <div class="card-desc">${desc}</div>
                                `;
                                container.appendChild(card);
                            }
                        });

                        if (!foundAny) {
                            container.innerHTML = '<div style="font-size:12px; font-style:italic;">No custom app ideas logged yet. Be the first!</div>';
                        }
                    } catch (e) {
                        container.innerHTML = '<div style="font-size:12px; color:red;">Data rendering processing fault.</div>';
                    }
                } else {
                    container.innerHTML = '<div style="font-size:12px; color:red;">Could not retrieve suggestion tracking stream.</div>';
                }
            }
        };
        xhr.send();
    }

    // --- POST SUGGESTION INTERCEPT HANDLER ---
    document.getElementById("idea-submit").onclick = function () {
        var titleInp = document.getElementById("idea-title");
        var descInp = document.getElementById("idea-desc");
        var errorLog = document.getElementById("status-log");

        var title = titleInp.value.trim();
        var desc = descInp.value.trim();

        if (!title || !desc) {
            errorLog.textContent = "Error: Input fields cannot be blank.";
            errorLog.style.display = "block";
            return;
        }

        errorLog.style.display = "none";
        
        // Structured flag allows filtering inside the global/neighborhood logging feeds cleanly
        var payload = "[APP_SUGGESTION]" + title + "\n" + desc;

        var xhr = new XMLHttpRequest();
        xhr.open("POST", BACKEND_URL + "/api/message", true); 
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.setRequestHeader("Authorization", "Bearer " + token);
        
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    titleInp.value = "";
                    descInp.value = "";
                    errorLog.textContent = "Idea successfully committed!";
                    errorLog.style.display = "block";
                    fetchSuggestions();
                } else {
                    errorLog.textContent = "Transmission failed. Verify server authorization parameters.";
                    errorLog.style.display = "block";
                }
            }
        };
        xhr.send(JSON.stringify({ content: payload, channel: "public" }));
    };

    // Initialize application stream
    fetchSuggestions();
  </script>
</body>
</html>
