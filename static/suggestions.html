<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>un-reader BBS - App Suggestions Board</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="bbs.css" />
  <style type="text/css">
    #suggestion-list {
      max-height: 400px;
      overflow-y: auto;
      background: white;
      padding: 10px;
      border: var(--border);
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }

    .suggestion-card {
      background: #fafafa;
      border: var(--border);
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 2px 2px 0px black;
    }

    .suggestion-meta {
      font-size: 11px;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 5px;
      border-bottom: 1px dotted #ccc;
      padding-bottom: 3px;
    }

    .suggestion-body {
      font-size: 13px;
      white-space: pre-wrap;
      line-height: 1.4;
      color: black;
    }

    .empty-board {
      text-align: center;
      padding: 30px;
      color: #777;
      font-style: italic;
    }

    #input-box {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
  </style>
</head>

<body>
  <div class="window" style="max-width: 800px; margin: 20px auto;">
    <div class="title-bar">
      <div class="title-stripes"></div>
      <button class='paper-btn' onclick="window.location.href = 'chat.html'">
        ◀ BACK TO CHAT
      </button>
      <div class="title-text">App Suggestions Board</div>
      <span class='paper-btn' id="user-display"></span>
    </div>

    <div style="padding: 12px;">
      <div class="panel-header">Submitted Concept Streams</div>
      <div id="suggestion-list">
        <div class="empty-board">Loading application database layers...</div>
      </div>

      <div class="panel-header">Submit New Project Idea</div>
      <div id="input-box">
        <textarea class='paper-input' id="suggestion-content" placeholder="Describe your layout, software debloat idea, or target feature here..." rows="4" style="resize: none;"></textarea>
        <button id="submit-suggestion-btn" class='paper-btn' onclick="submitSuggestion()" style="align-self: flex-end; padding: 6px 15px;">SUBMIT IDEA</button>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    var token = localStorage.getItem("token");
    var myUsername = localStorage.getItem("username");

    if (!token || !myUsername) {
      alert("Session expired. Please log in through the main terminal interface.");
      window.location.href = "chat.html";
    } else {
      document.getElementById("user-display").textContent = "@" + myUsername;
      loadSuggestions();
    }

    // Pull database logs and display ONLY app suggestions
    function loadSuggestions() {
      var xhr = new XMLHttpRequest();
      // Hits the standard history tracking endpoint
      xhr.open("GET", BACKEND_URL + "/history?index=0", true);
      if (token) xhr.setRequestHeader("Authorization", "Bearer " + token);
      
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          var container = document.getElementById("suggestion-list");
          container.innerHTML = "";

          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              var validSuggestionsCount = 0;

              for (var i = 0; i < data.length; i++) {
                var msg = data[i];
                
                // Inverse matching: Check if the custom tag string exists in message
                if (msg.content && msg.content.indexOf("[APP_SUGGESTION]") !== -1 && !msg.is_deleted) {
                  validSuggestionsCount++;

                  // Clean up target string block so metadata header doesn't show raw text tags
                  var cleanText = msg.content.replace("[APP_SUGGESTION]", "").trim();

                  var card = document.createElement("div");
                  card.className = "suggestion-card";

                  var meta = document.createElement("div");
                  meta.className = "suggestion-meta";
                  meta.textContent = "@" + (msg.username || "UNKNOWN_NODE") + " • " + formatTimeToken(msg.timestamp);

                  var body = document.createElement("div");
                  body.className = "suggestion-body";
                  body.textContent = cleanText;

                  card.appendChild(meta);
                  card.appendChild(body);
                  container.appendChild(card);
                }
              }

              if (validSuggestionsCount === 0) {
                container.innerHTML = "<div class='empty-board'>No active platform suggestions found. System ready for input.</div>";
              } else {
                // Keep the list scrolled to the bottom to see new logs
                container.scrollTop = container.scrollHeight;
              }

            } catch (e) {
              log("Parser parsing exception:", e);
              container.innerHTML = "<div class='empty-board'>Error: Fault structural payload signature received.</div>";
            }
          } else {
            container.innerHTML = "<div class='empty-board'>Connection down. Failed to map background history stream.</div>";
          }
        }
      };
      xhr.send();
    }

    // Push signature back up using the WebSocket pool or an alternate direct HTTP POST if supported
    function submitSuggestion() {
      var input = document.getElementById("suggestion-content");
      var text = input.value.trim();
      if (!text) return;

      // Wrap string payload inside your hidden tracking signature
      var taggedPayload = "[APP_SUGGESTION] " + text;

      // Send to backend stream using standard XHR POST signature
      var xhr = new XMLHttpRequest();
      xhr.open("POST", BACKEND_URL + "/api/messages", true); // Double check if your backend route matches this or a custom controller endpoint
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.setRequestHeader("Authorization", "Bearer " + token);
      
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status === 200 || xhr.status === 201) {
            input.value = "";
            loadSuggestions(); // Reload display layout
          } else {
            alert("Submission error tracking interface block. Dropping payload data.");
          }
        }
      };
      
      xhr.send(JSON.stringify({
        channel: "public",
        content: taggedPayload
      }));
    }

    // Helper timestamp utility mimicking common.js parser logic
    function formatTimeToken(timestamp) {
      if (!timestamp) return "00:00";
      var d = new Date(timestamp);
      var hours = String(d.getHours()).padStart(2, '0');
      var mins = String(d.getMinutes()).padStart(2, '0');
      return hours + ":" + mins;
    }
  </script>
</body>

</html>
