<!doctype html>
<html lang="en">
<head>
  <script src="https://louisabraham.github.io/nekojs/neko.js" data-autostart></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>un-reader BBS - Suggestions</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="bbs.css" />
  <style type="text/css">
    .form-box { margin: 15px; border: var(--border); padding: 15px; background: white; box-shadow: 2px 2px 0px black; }
    .kindle-input { width: 100%; border: var(--border); background: white; color: black; padding: 8px; font-family: monospace; font-size: 13px; margin-bottom: 12px; }
    textarea.kindle-input { resize: vertical; min-height: 80px; }
    .submit-btn { width: 100%; padding: 10px; font-size: 13px; font-weight: bold; cursor: pointer; }
    
    .suggestions-feed { margin: 15px; }
    .suggestion-card { border: var(--border); padding: 12px; margin-bottom: 12px; background: white; box-shadow: 2px 2px 0px black; }
    .card-header { display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; color: #555; border-bottom: 1px dashed black; padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase; }
    .card-title { font-weight: bold; font-size: 14px; margin: 0 0 6px 0; }
    .card-desc { font-size: 13px; line-height: 1.3; white-space: pre-wrap; color: black; }
    .status-msg { font-size: 12px; font-weight: bold; text-align: center; margin: 10px 0; display: none; padding: 5px; border: 1px dashed black; }
    
    #pagination-bar { display: flex; justify-content: space-between; align-items: center; margin: 15px; }
  </style>
  <script src="common.js"></script>
</head>
<body>

  <div class="window">
    <div class="title-bar">
      <div class="title-stripes"></div>
      <button class='paper-btn' id="back-btn" onclick="window.location.href='index.html'">◀ HOME</button>
      <div class="title-text">SUGGESTIONS</div>
    </div>

    <div class="form-box">
      <div style="font-weight: bold; margin-bottom: 4px; font-size: 11px;">APPLICATION NAME:</div>
      <input type="text" id="idea-title" class="kindle-input paper-input" placeholder="e.g., Mail Client, Snake Game..." autocomplete="off" />
      
      <div style="font-weight: bold; margin-bottom: 4px; font-size: 11px;">CONCEPT DESCRIPTION:</div>
      <textarea id="idea-desc" class="kindle-input paper-input" placeholder="Explain what this app would do..."></textarea>
      
      <button id="idea-submit" class="paper-btn submit-btn">POST SUGGESTION</button>
      <div id="status-log" class="status-msg"></div>
    </div>

    <div class="suggestions-feed">
      <div id="pagination-bar">
        <button class="paper-btn" onclick="jumpPage(-1)">&lt; NEWER</button>
        <span id="page-display-index" style="font-family: monospace; font-weight: bold;">PAGE: 0</span>
        <button class="paper-btn" onclick="jumpPage(1)">OLDER &gt;</button>
      </div>
      <div id="feed-container"></div>
    </div>
  </div>

  <script type="text/javascript">
    var token = localStorage.getItem("token");
    var myUsername = localStorage.getItem("username");
    var currentHistoryIndex = 0;
    var socket = null;

    if (!token || !myUsername) {
        var statusLog = document.getElementById("status-log");
        statusLog.textContent = "Guest Mode: Please log in via Chat/Dashboard to submit ideas.";
        statusLog.style.display = "block";
        document.getElementById("idea-title").disabled = true;
        document.getElementById("idea-desc").disabled = true;
        document.getElementById("idea-submit").disabled = true;
    } else {
        // Initialize WebSocket so we can broadcast/save directly to the database
        initWebSocket();
    }

    function initWebSocket() {
        if (socket) { try { socket.close(); } catch (e) {} }
        socket = new WebSocket(WS_URL);
        
        socket.onopen = function () {
            socket.send(JSON.stringify({ type: "auth", token: token }));
        };

        socket.onmessage = function (event) {
            var data = JSON.parse(event.data);
            // Refresh feed instantly if someone updates or posts
            if (data.type === "refresh_feed" && currentHistoryIndex === 0) {
                loadHistory();
            }
        };

        socket.onclose = function () {
            setTimeout(initWebSocket, 5000);
        };
    }

    function jumpPage(val) {
        currentHistoryIndex = Math.max(0, currentHistoryIndex + val);
        loadHistory();
    }

    // GET HISTORY VIA THE CORRECT chatapp ENDPOINT
    function loadHistory() {
        var container = document.getElementById("feed-container");
        container.innerHTML = '<div style="font-size:12px; font-family:monospace; font-style:italic;">Querying BBS databanks...</div>';

        var xhr = new XMLHttpRequest();
        xhr.open("GET", BACKEND_URL + "/history?index=" + currentHistoryIndex, true);
        if (token) xhr.setRequestHeader("Authorization", "Bearer " + token);
        
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        document.getElementById("page-display-index").textContent = "PAGE: " + currentHistoryIndex;
                        container.innerHTML = "";
                        
                        var foundAny = false;

                        for (var i = 0; i < data.length; i++) {
                            var post = data[i];
                            if (post.content && post.content.indexOf("[APP_SUGGESTION]") !== -1 && !post.is_deleted) {
                                foundAny = true;
                                
                                var cleanContent = post.content.replace("[APP_SUGGESTION]", "").trim();
                                var lines = cleanContent.split("\n");
                                var title = lines[0] || "Untitled Concept";
                                var desc = lines.slice(1).join("\n") || "No explanation provided.";

                                var dateDisplay = post.timestamp ? new Date(post.timestamp).toLocaleDateString() : "Unknown";

                                var card = document.createElement("div");
                                card.className = "suggestion-card";
                                card.innerHTML = `
                                    <div class="card-header">
                                        <div>@${post.username || "anonymous"}</div>
                                        <div>${dateDisplay}</div>
                                    </div>
                                    <div class="card-title">💡 ${title}</div>
                                    <div class="card-desc">${desc}</div>
                                `;
                                container.appendChild(card);
                            }
                        }

                        if (!foundAny) {
                            container.innerHTML = '<div style="font-size:12px; font-family:monospace; font-style:italic; text-align:center;">No custom app ideas found on this page.</div>';
                        }
                    } catch (e) {
                        container.innerHTML = '<div style="font-size:12px; color:red; font-family:monospace;">Data rendering parsing fault.</div>';
                    }
                } else {
                    container.innerHTML = '<div style="font-size:12px; color:red; font-family:monospace;">Could not retrieve stream. Status: ' + xhr.status + '</div>';
                }
            }
        };
        xhr.send();
    }

    // SEND VIA WEBSOCKET INSTEAD OF POST TO PREVENT 404
    document.getElementById("idea-submit").onclick = function () {
        var titleInp = document.getElementById("idea-title");
        var descInp = document.getElementById("idea-desc");
        var errorLog = document.getElementById("status-log");

        var title = titleInp.value.trim();
        var desc = descInp.value.trim();

        if (!title || !desc) {
            errorLog.textContent = "Error: Input fields cannot be blank.";
            errorLog.style.display = "block";
            return;
        }

        if (!socket || socket.readyState !== WebSocket.OPEN) {
            errorLog.textContent = "Error: Connection to system socket offline.";
            errorLog.style.display = "block";
            return;
        }

        errorLog.style.display = "none";
        var payload = "[APP_SUGGESTION]" + title + "\n" + desc;

        // Dispatches through the socket exactly like chat.html to trigger internal DB saves
        socket.send(JSON.stringify({
            type: "message",
            content: payload,
            target: ""
        }));

        titleInp.value = "";
        descInp.value = "";
        errorLog.textContent = "Idea successfully sent!";
        errorLog.style.display = "block";
        
        currentHistoryIndex = 0;
        // Small delay to let database settle before pulling feed
        setTimeout(loadHistory, 400);
    };

    // Initial feed fetch
    loadHistory();
  </script>
</body>
</html>
