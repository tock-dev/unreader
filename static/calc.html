<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BBS Calculator - E-Ink Edition</title>
  <script src="common.js"></script>
  <style type="text/css">
    /* --- E-Ink Optimization Variables --- */
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --border-color: #000000;
      --border-width: 3px; /* Thicker lines for crisp rendering on e-ink */
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: "Courier New", Courier, monospace;
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .calc-container {
      width: 100%;
      max-width: 450px; /* Wider for easier precise touch on reader screens */
      border: var(--border-width) solid var(--border-color);
      background: var(--bg-color);
      padding: 12px;
      box-sizing: border-box;
    }

    .calc-screen {
      width: 100%;
      height: 60px;
      border: var(--border-width) solid var(--border-color);
      background: var(--bg-color);
      color: var(--text-color);
      font-family: "Courier New", Courier, monospace;
      font-size: 28px;
      font-weight: bold;
      text-align: right;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 12px;
      outline: none;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .calc-btn {
      font-family: "Courier New", Courier, monospace;
      font-size: 24px; /* Large print for low-light/e-ink clarity */
      font-weight: bold;
      background: var(--bg-color);
      color: var(--text-color);
      border: var(--border-width) solid var(--border-color);
      padding: 22px 10px; /* Deep vertical padding for large hit boxes */
      cursor: pointer;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      /* No hover/active color shifts to minimize slow ghosting frames */
    }

    .double-width {
      grid-column: span 2;
    }

    .window-title {
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      border-bottom: var(--border-width) solid var(--border-color);
      padding-bottom: 6px;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    /* Dark mode */
    body.dark-mode {
      --bg-color: #121212;
      --text-color: #ffffff;
      --border-color: #ffffff;
      background-color: #121212 !important;
      color: #ffffff !important;
    }

    body.dark-mode .calc-container,
    body.dark-mode .calc-screen,
    body.dark-mode .calc-btn {
      background-color: #121212 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    body.dark-mode {
      color: #ffffff;
    }

    body.dark-mode * {
      border-color: #ffffff !important;
    }
  </style>
</head>

<body>
<script>applySavedPreferences();</script>
  <div class="calc-container">
    <div class="window-title">SYS: CALCULATOR Matrix</div>
    <input type="text" id="screen" class="calc-screen" value="0" readonly />
    
    <div class="calc-grid">
      <button class="calc-btn double-width" onclick="clearScreen()">CLEAR</button>
      <button class="calc-btn" onclick="appendOperator('/')">/</button>
      <button class="calc-btn" onclick="appendOperator('*')">*</button>

      <button class="calc-btn" onclick="appendNumber('7')">7</button>
      <button class="calc-btn" onclick="appendNumber('8')">8</button>
      <button class="calc-btn" onclick="appendNumber('9')">9</button>
      <button class="calc-btn" onclick="appendOperator('-')">-</button>

      <button class="calc-btn" onclick="appendNumber('4')">4</button>
      <button class="calc-btn" onclick="appendNumber('5')">5</button>
      <button class="calc-btn" onclick="appendNumber('6')">6</button>
      <button class="calc-btn" onclick="appendOperator('+')">+</button>

      <button class="calc-btn" onclick="appendNumber('1')">1</button>
      <button class="calc-btn" onclick="appendNumber('2')">2</button>
      <button class="calc-btn" onclick="appendNumber('3')">3</button>
      <button class="calc-btn double-width" style="grid-row: span 2; height: 100%;" onclick="calculate()">=</button>

      <button class="calc-btn double-width" onclick="appendNumber('0')">0</button>
      <button class="calc-btn" onclick="appendDecimal()">.</button>
    </div>
  </div>

  <script type="text/javascript">
    var currentInput = '0';
    var lastOperator = '';
    var pendingValue = 0;
    var clearOnNextNum = false;

    var screenEl = document.getElementById('screen');

    function updateScreen() {
      screenEl.value = currentInput;
    }

    function appendNumber(num) {
      if (currentInput === '0' || clearOnNextNum) {
        currentInput = num;
        clearOnNextNum = false;
      } else {
        currentInput += num;
      }
      updateScreen();
    }

    function appendDecimal() {
      if (clearOnNextNum) {
        currentInput = '0.';
        clearOnNextNum = false;
        updateScreen();
        return;
      }
      if (currentInput.indexOf('.') === -1) {
        currentInput += '.';
        updateScreen();
      }
    }

    function clearScreen() {
      currentInput = '0';
      lastOperator = '';
      pendingValue = 0;
      clearOnNextNum = false;
      updateScreen();
    }

    function appendOperator(op) {
      var val = parseFloat(currentInput);
      
      if (lastOperator && !clearOnNextNum) {
        pendingValue = runExecution(pendingValue, val, lastOperator);
        currentInput = String(pendingValue);
        updateScreen();
      } else {
        pendingValue = val;
      }
      
      lastOperator = op;
      clearOnNextNum = true;
    }

    function calculate() {
      if (!lastOperator) return;
      var val = parseFloat(currentInput);
      var result = runExecution(pendingValue, val, lastOperator);
      
      currentInput = String(result);
      lastOperator = '';
      pendingValue = 0;
      clearOnNextNum = true;
      updateScreen();
    }

    function runExecution(a, b, op) {
      switch (op) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return b !== 0 ? a / b : 0;
        default: return b;
      }
    }
  </script>
</body>
</html>
