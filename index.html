<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, interactive-widget=resizes-content">
  <title>un-reader</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/symbola" type="text/css"/>
  <style type="text/css">
    /* SYSTEM 7 HIGH-CONTRAST E-INK AESTHETICS */
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --border: 2px solid #000000;
      --shadow: 4px 4px 0px #000000;
      --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
    }

    html, body {
      margin: 0; padding: 0; overflow: hidden;
      height: 100%; width: 100%;
      font-family: "Geneva", "Verdana", sans-serif, "SymbolaRegular";
      background-color: #e5e5e5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* WINDOW CONTAINER MATRIX */
    .window {
      background: white; border: 2px solid black; box-shadow: var(--shadow);
      display: flex; flex-direction: column; height: 95vh; width: 98vw; max-width: 900px; position: relative;
    }

    /* SYSTEM 7 STRIPED TITLE BAR */
    .title-bar {
      height: 35px; border-bottom: 2px solid black; display: flex; align-items: center; justify-content: center; background: white; padding: 0 10px; position: relative; flex-shrink: 0;
    }
    .title-stripes { position: absolute; top: 4px; bottom: 4px; left: 4px; right: 4px; background-image: var(--stripe-pattern); z-index: 0; }
    .title-text { background: white; padding: 0 15px; font-weight: bold; z-index: 1; font-size: 14px; text-transform: uppercase; }
    
    #logout-btn { position: absolute; left: 10px; z-index: 2; cursor: pointer; font-family: monospace; font-size: 11px; background: white; border: 2px solid black; padding: 2px 6px; box-shadow: 2px 2px 0 black; font-weight: bold; }
    #logout-btn:active { background: black; color: white; box-shadow: none; }

    #user-display { position: absolute; right: 10px; z-index: 2; font-size: 11px; font-weight: bold; background: white; padding: 2px 6px; border: 1px solid black; }

    /* CORE ARCHITECTURE GRID TABLE */
    #workspace-table { width: 100%; height: calc(100% - 37px); border-collapse: collapse; table-layout: fixed; }
    #sidebar-cell { width: 240px; background: #fafafa; border-right: 2px solid black; vertical-align: top; padding: 0; }
    #chat-cell { vertical-align: top; padding: 0; position: relative; background-color: #ffffff; }

    /* SIDEBAR COMPONENT INTERFACES */
    .panel-header { font-weight: bold; padding: 8px; text-transform: uppercase; border-bottom: 2px solid black; background: #eee; font-size: 11px; letter-spacing: 1px; }
    #roster-list, #dm-list { max-height: 140px; overflow-y: auto; background: white; }
    
    .roster-user { padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 12px; clear: both; }
    .roster-name { font-weight: bold; cursor: pointer; text-decoration: underline; }
    .roster-action-btn { float: right; font-size: 9px; background: white; border: 1px solid black; font-weight: bold; cursor: pointer; padding: 0 3px; }

    .nav-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; background: white; }
    .nav-item:hover { background: #f0f0f0; }
    .nav-item-active { background-color: #000000 !important; color: #ffffff !important; font-weight: bold; }
    #dm-target-input { margin: 4px; padding: 4px; font-family: monospace; font-size: 11px; outline: none; width: calc(100% - 16px); border: 1px solid black; }

    #settings-box-container { padding: 6px; background: white; border-bottom: 1px solid #ccc; }
    .settings-input { width: 90%; padding: 3px; margin-bottom: 4px; font-family: monospace; font-size: 11px; border: 1px solid black; }
    .settings-btn { width: 95%; font-family: monospace; font-size: 11px; font-weight: bold; background: white; border: 2px solid black; cursor: pointer; padding: 2px 0; }

    /* E-INK SNAP PAGINATION SYSTEM */
    #pagination-header-bar { padding: 6px; background: #eee; border-bottom: 2px solid #000000; text-align: center; height: 26px; }
    .page-btn { background: #ffffff; border: 2px solid #000000; padding: 2px 8px; font-family: monospace; font-weight: bold; cursor: pointer; font-size: 11px; box-shadow: 1px 1px 0 black; }
    .page-btn:active { box-shadow: none; transform: translate(1px, 1px); }
    #page-display-index { margin: 0 10px; font-weight: bold; font-size: 12px; }

    /* CHAT STREAM TERMINAL */
    #chat-scroll-wrapper { position: absolute; top: 40px; bottom: 55px; left: 0; right: 0; overflow-y: auto; padding: 12px; }
    #typing-indicator { position: absolute; bottom: 58px; left: 12px; font-size: 11px; font-weight: bold; color: #555; font-style: italic; height: 15px; }

    /* FOOTER CONTROL DOCK CONTAINER */
    #input-bar-container { position: absolute; bottom: 0; left: 0; right: 0; height: 52px; background-color: #eee; padding: 8px; box-sizing: border-box; border-top: 2px solid black; }
    #content { float: left; width: 78%; padding: 6px; font-size: 13px; font-family: monospace; border: 2px solid black; outline: none; background: white; }
    #send { float: right; width: 18%; height: 32px; cursor: pointer; font-family: monospace; font-weight: bold; font-size: 12px; background: white; border: 2px solid black; box-shadow: 2px 2px 0 black; }
    #send:active { box-shadow: none; transform: translate(1px, 1px); }

    /* MESSAGE BUBBLES CARDS */
    .message-container { width: 100%; margin-bottom: 10px; clear: both; display: block; }
    .message { border: 2px solid black; padding: 6px 10px; max-width: 75%; width: auto; position: relative; background: white; box-shadow: 2px 2px 0px black; }
    .message-meta { font-size: 10px; font-weight: bold; color: #555; margin-bottom: 3px; text-transform: uppercase; }
    .message-text { font-size: 13px; white-space: pre-wrap; line-height: 1.3; color: black; }
    
    .my-msg { float: right; border-style: dashed; }
    .other-msg { float: left; }

    /* SYSTEM OPERATOR SPECIAL CARDS LAYER (augustinejames & tockdev) */
    .boss-msg { float: right; border: 4px double black !important; background: #fff !important; box-shadow: 4px 4px 0px black !important; }
    .boss-meta { color: black !important; font-weight: bold !important; text-decoration: underline; }
    .del-btn { position: absolute; top: 3px; right: 3px; border: 1px solid black; background: white; font-size: 9px; cursor: pointer; font-weight: bold; padding: 0 3px; }

    /* LOGIN PANEL OVERLAY STYLING */
    #auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); display: block; z-index: 1000; text-align: center; padding-top: 100px; }
    .auth-box { padding: 24px; width: 280px; margin: 0 auto; background: white; border: 2px solid black; box-shadow: var(--shadow); }
    .auth-box h2 { font-size: 16px; margin-top: 0; font-weight: bold; letter-spacing: 1px; }
    .auth-box input { width: 90%; padding: 6px; margin: 6px 0; font-family: monospace; border: 2px solid black; }
    .auth-box button { width: 96%; padding: 8px; margin-top: 8px; cursor: pointer; font-family: monospace; font-weight: bold; background: white; border: 2px solid black; box-shadow: 2px 2px 0 black; }
    .auth-box button:active { box-shadow: none; transform: translate(1px, 1px); }
    .auth-toggle { font-size: 11px; margin-top: 12px; cursor: pointer; text-decoration: underline; color: blue; font-weight: bold; }
  </style>
</head>
<body>

  <!-- System 7 Auth Container Layer -->
  <div id="auth-screen">
    <div class="auth-box">
      <h2 id="auth-title">LOGIN</h2>
      <input type="text" id="auth-user" placeholder="Username" autocomplete="off">
      <input type="password" id="auth-pass" placeholder="Password">
      <button id="auth-submit-btn">SUBMIT</button>
      <div id="auth-toggle" class="auth-toggle">Need to create an account? Register</div>
    </div>
  </div>

  <!-- Main System Frame Window -->
  <div class="window">
    <div class="title-bar">
      <div class="title-stripes"></div>
      <button id="logout-btn">LOGOUT</button>
      <div class="title-text">un-reader</div>
      <span id="user-display"></span>
    </div>
    
    <table id="workspace-table">
      <tr>
        <td id="sidebar-cell">
          <div class="panel-header">🟢 Online Users</div>
          <div id="roster-list"></div>

          <div class="panel-header">Channels</div>
          <div class="nav-item nav-item-active" id="nav-public" onclick="switchChannel('public', '')">🌍 Global Chat</div>
          
          <div class="panel-header">Direct Messages</div>
          <input type="text" id="dm-target-input" placeholder="+ Target name & Enter..." autocomplete="off">
          <div id="dm-list"></div>
          
          <div class="panel-header">Account Profile</div>
          <div id="settings-box-container">
            <input type="password" id="settings-new-pass" class="settings-input" placeholder="New Password...">
            <button id="settings-save-btn" class="settings-btn">UPDATE</button>
          </div>
        </td>
        <td id="chat-cell">
          <!-- Static Snap Navigation Header Desk Bar for E-Ink Refresh Sync -->
          <div id="pagination-header-bar">
            <button class="page-btn" id="prev-page-btn" onclick="jumpToPreviousPage()">&lt; NEWER LOGS</button>
            <span id="page-display-index">PAGE: 0</span>
            <button class="page-btn" id="next-page-btn" onclick="jumpToNextPage()">OLDER LOGS &gt;</button>
          </div>

          <div id="chat-scroll-wrapper"></div>
          <div id="typing-indicator"></div>
          
          <div id="input-bar-container">
            <input type="text" id="content" placeholder="Enter message text here..." autocomplete="off">
            <button id="send">SEND</button>
          </div>
        </td>
      </tr>
    </table>
  </div>

  <script type="text/javascript">
    // ⚠️ CONFIGURATION TARGET: REPLACE BOTH URLS BELOW WITH YOUR RENDER APP ADDRESS
    var BACKEND_URL = "https://unreader.onrender.com"; 
    var WS_URL = "wss://unreader.onrender.com";

    var token = localStorage.getItem('token');
    var myUsername = localStorage.getItem('username');
    var currentMode = 'public';
    var currentDMTarget = '';
    var socket = null;
    var isRegisterMode = false;
    var typingClearTimer = null;
    var currentHistoryIndex = 0;

    var authToggle = document.getElementById('auth-toggle');
    authToggle.onclick = function() {
      isRegisterMode = !isRegisterMode;
      document.getElementById('auth-title').textContent = isRegisterMode ? 'REGISTER' : 'LOGIN';
      authToggle.textContent = isRegisterMode ? 'Already have an account? Login' : 'Need to create an account? Register';
    };

    function isMasterAdmin(name) {
      return name === 'augustinejames' || name === 'tockdev';
    }

    document.getElementById('auth-submit-btn').onclick = function() {
      var username = document.getElementById('auth-user').value.trim();
      var password = document.getElementById('auth-pass').value;
      if(!username || !password) return alert('Fields cannot be blank');

      var url = isRegisterMode ? '/api/register' : '/api/login';
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var data = JSON.parse(xhr.responseText);
          if(data.error) return alert(data.error);
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          token = data.token;
          myUsername = data.username;
          initApp();
        }
      };
      xhr.send(JSON.stringify({ username: username, password: password }));
    };

    document.getElementById('settings-save-btn').onclick = function() {
      var newPassword = document.getElementById('settings-new-pass').value;
      if (!newPassword) return alert('Password cannot be blank');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/change-password', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var data = JSON.parse(xhr.responseText);
          if (data.error) return alert(data.error);
          document.getElementById('settings-new-pass').value = '';
          alert('Password profile modified successfully');
        }
      };
      xhr.send(JSON.stringify({ password: newPassword }));
    };

    document.getElementById('logout-btn').onclick = function() {
      localStorage.clear();
      window.location.reload();
    };

    function initApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('user-display').textContent = '@' + myUsername;
      
      socket = new WebSocket(WS_URL);
      socket.onopen = function() { socket.send(JSON.stringify({ type: 'auth', token: token })); };

      socket.onmessage = function(event) {
        var data = JSON.parse(event.data);
        if (data.type === 'terminated') {
          alert('Session terminated by administrator');
          localStorage.clear();
          window.location.reload();
          return;
        }
        if (data.type === 'msg_deleted') {
          var targetNode = document.getElementById('msg-id-' + data.id);
          if (targetNode) targetNode.innerHTML = '<div class="message-meta">System</div><div class="message-text">[PURGED BY ROOT]</div>';
          return;
        }
        if (data.type === 'roster_update') {
          renderUserRoster(data.users);
          return;
        }
        
        if (currentHistoryIndex === 0) {
          if (data.type === 'message' && currentMode === 'public') {
            loadHistory();
          } else if (data.type === 'dm') {
            var partner = data.sender === myUsername ? data.receiver : data.sender;
            ensureDMNavOption(partner);
            if (currentMode === 'dm' && currentDMTarget === partner) {
              loadHistory();
            }
          }
        }
      };
      
      loadDMContacts(); 
      loadHistory();
    }

    function renderUserRoster(userList) {
      var container = document.getElementById('roster-list');
      container.innerHTML = '';
      for (var i = 0; i < userList.length; i++) {
        var username = userList[i];
        if (username === myUsername) continue;

        var userDiv = document.createElement('div');
        userDiv.className = 'roster-user';

        var nameSpan = document.createElement('span');
        nameSpan.className = 'roster-name';
        nameSpan.textContent = username;
        
        (function(uname) {
          nameSpan.onclick = function() { ensureDMNavOption(uname); switchChannel('dm', uname); };
        })(username);
        userDiv.appendChild(nameSpan);

        if (isMasterAdmin(myUsername) && !isMasterAdmin(username)) {
          var modBtn = document.createElement('button');
          modBtn.className = 'roster-action-btn';
          modBtn.textContent = 'TERM';
          (function(uname) {
            modBtn.onclick = function() {
              if (confirm('Terminate connection for: ' + uname + '?')) {
                socket.send(JSON.stringify({ type: 'mod_kick', target: uname }));
              }
            };
          })(username);
          userDiv.appendChild(modBtn);
        }
        container.appendChild(userDiv);
      }
    }

    function jumpToPreviousPage() {
      if (currentHistoryIndex > 0) {
        currentHistoryIndex--;
        document.getElementById('page-display-index').textContent = "PAGE: " + currentHistoryIndex;
        loadHistory();
      }
    }
    
    function jumpToNextPage() {
      currentHistoryIndex++;
      document.getElementById('page-display-index').textContent = "PAGE: " + currentHistoryIndex;
      loadHistory();
    }

    function loadDMContacts() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', BACKEND_URL + '/dm-contacts', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var contacts = JSON.parse(xhr.responseText);
          for (var i = 0; i < contacts.length; i++) { ensureDMNavOption(contacts[i]); }
        }
      };
      xhr.send();
    }

    function ensureDMNavOption(username) {
      if (document.getElementById('nav-dm-' + username) || username === myUsername) return;
      var targetList = document.getElementById('dm-list');
      var item = document.createElement('div');
      item.className = 'nav-item';
      item.id = 'nav-dm-' + username;
      item.textContent = '💬 ' + username;
      item.onclick = function() { switchChannel('dm', username); };
      targetList.appendChild(item);
    }

    document.getElementById('dm-target-input').onkeypress = function(e) {
      var key = e.keyCode || e.which;
      if (key === 13) {
        var target = e.target.value.trim();
        if(!target || target === myUsername) return;
        ensureDMNavOption(target);
        switchChannel('dm', target);
        e.target.value = '';
      }
    };

    function switchChannel(mode, target) {
      if(!target) target = '';
      currentMode = mode;
      currentDMTarget = target;
      currentHistoryIndex = 0;
      document.getElementById('page-display-index').textContent = "PAGE: 0";
      
      var navItems = document.getElementById('sidebar-cell').getElementsByTagName('div');
      for (var i = 0; i < navItems.length; i++) {
        if(navItems[i].className.indexOf('nav-item') !== -1) navItems[i].className = 'nav-item';
      }
      if(mode === 'public') {
        document.getElementById('nav-public').className = 'nav-item nav-item-active';
      } else {
        var activeTab = document.getElementById('nav-dm-' + target);
        if (activeTab) activeTab.className = 'nav-item nav-item-active';
      }
      loadHistory();
    }

    function appendMessage(data) {
      var chatWrapper = document.getElementById('chat-scroll-wrapper');
      var containerDiv = document.createElement('div');
      containerDiv.className = 'message-container';
      
      var msgDiv = document.createElement('div');
      msgDiv.id = 'msg-id-' + data.id;
      var isMe = data.username === myUsername;
      var isBoss = isMasterAdmin(data.username);
      
      var messageStyleClass = 'message ';
      if (isBoss) messageStyleClass += 'boss-msg';
      else if (isMe) messageStyleClass += 'my-msg';
      else messageStyleClass += 'other-msg';
      msgDiv.className = messageStyleClass;
      
      var timeStr = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      var nameDisplay = isBoss ? '👑 ' + data.username + ' [SYS_OP]' : data.username;
      var metaStyleClass = isBoss ? 'message-meta boss-meta' : 'message-meta';

      msgDiv.innerHTML = '<div class="' + metaStyleClass + '">' + nameDisplay + ' • ' + timeStr + '</div><div class="message-text"></div>';
      
      if (isMasterAdmin(myUsername) && data.id !== -1) {
        var delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.textContent = 'X';
        delBtn.onclick = function() { triggerMsgDeletion(data.id); };
        msgDiv.appendChild(delBtn);
      }

      msgDiv.querySelector('.message-text').textContent = data.content;
      containerDiv.appendChild(msgDiv);
      chatWrapper.appendChild(containerDiv);
      chatWrapper.scrollTop = chatWrapper.scrollHeight;
    }

    function triggerMsgDeletion(msgId) {
      if (!isMasterAdmin(myUsername)) return;
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'mod_delete', id: msgId, channel: currentMode }));
      }
    }

    function loadHistory() {
      document.getElementById('chat-scroll-wrapper').innerHTML = '';
      var xhr = new XMLHttpRequest();
      if (currentMode === 'public') {
        xhr.open('GET', BACKEND_URL + '/history?index=' + currentHistoryIndex, true);
      } else {
        xhr.open('GET', BACKEND_URL + '/dm-history?target=' + currentDMTarget + '&index=' + currentHistoryIndex, true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      }
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var data = JSON.parse(xhr.responseText);
          if (data.length === 0 && currentHistoryIndex > 0) {
            currentHistoryIndex--;
            document.getElementById('page-display-index').textContent = "PAGE: " + currentHistoryIndex;
            loadHistory();
            return;
          }
          for (var i = 0; i < data.length; i++) {
            var msg = data[i];
            if (currentMode === 'public') {
              appendMessage(msg);
            } else {
              // UNIFIED DATA PROPERTY WRAPPER: Parses .username or .sender natively safely
              appendMessage({ id: msg.id, username: msg.username || msg.sender, content: msg.content, timestamp: msg.timestamp });
            }
          }
        }
      };
      xhr.send();
    }

    var input = document.getElementById('content');
    input.oninput = function() {
        if (currentMode === 'dm' && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: 'typing', target: currentDMTarget }));
        }
    };

    function sendMessage() {
      var text = input.value.trim();
      if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
      
      var payload = {
        type: currentMode === 'public' ? 'message' : 'dm',
        content: text,
        target: currentDMTarget
      };
      
      socket.send(JSON.stringify(payload));
      input.value = '';
    }

    document.getElementById('send').onclick = sendMessage;
    input.onkeypress = function(e) {
      var key = e.keyCode || e.which;
      if (key === 13) sendMessage();
    };

    if (token && myUsername) initApp();
  </script>
</body>
</html>
