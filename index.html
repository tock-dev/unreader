<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>un-reader [E-INK CORE]</title>
  <style type="text/css">
    /* High-Contrast Stark Black & White E-Ink Structural Baseline Rules */
    html, body {
      margin: 0; padding: 0; overflow: auto;
      height: 100%; width: 100%;
      font-family: monospace; background-color: #ffffff; color: #000000;
    }
    .paper { 
      border: 3px solid #000000; background-color: #ffffff; color: #000000; margin: 4px; padding: 6px;
    }
    #title-bar { height: 45px; border-bottom: 4px double #000000; padding: 4px; }
    #title-bar h1 { font-size: 18px; margin: 0; float: left; font-weight: bold; text-transform: uppercase; }
    #title-right { float: right; font-size: 12px; }
    #logout-btn { font-family: monospace; cursor: pointer; background: #ffffff; border: 3px solid #000000; font-weight: bold; padding: 4px 8px; }
    
    /* Static Table Structure - Avoids CSS3 Flexbox bugs on old E-reader browsers */
    #workspace-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
    #sidebar-cell { width: 230px; border-right: 4px double #000000; vertical-align: top; padding: 4px; }
    #chat-cell { vertical-align: top; padding: 4px; }
    
    .panel-header { font-weight: bold; padding: 6px; text-transform: uppercase; border-bottom: 2px solid #000000; font-size: 13px; margin-bottom: 4px; }
    .nav-item { padding: 8px; cursor: pointer; border: 2px solid #000000; font-size: 12px; margin-bottom: 4px; background: #ffffff; }
    .nav-item-active { background-color: #000000 !important; color: #ffffff !important; font-weight: bold; }
    #dm-target-input { padding: 4px; font-family: monospace; font-size: 12px; width: 90%; margin-bottom: 6px; border: 2px solid #000000; }

    /* Static Non-Scrolling Pagination Frame Components */
    #pagination-header-bar { padding: 6px; margin-bottom: 8px; border-bottom: 2px solid #000000; clear: both; }
    .page-btn { background: #ffffff; border: 3px solid #000000; padding: 4px 12px; font-family: monospace; font-weight: bold; cursor: pointer; }
    #chat-static-frame { width: 100%; min-height: 420px; background-color: #ffffff; }
    
    #input-bar-container { margin-top: 15px; padding: 8px; border-top: 4px double #000000; clear: both; }
    #content { width: 75%; padding: 6px; font-size: 14px; font-family: monospace; border: 3px solid #000000; float: left; background: #ffffff; }
    #send { width: 20%; height: 34px; float: right; background: #ffffff; border: 3px solid #000000; font-family: monospace; font-weight: bold; cursor: pointer; }

    .message-container { width: 100%; margin-bottom: 12px; clear: both; display: block; }
    .message { border: 2px solid #000000; padding: 8px 12px; max-width: 80%; width: auto; position: relative; background: #ffffff; }
    .message-meta { font-size: 11px; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; }
    .message-text { font-size: 14px; white-space: pre-wrap; line-height: 1.4; color: #000000; }
    
    /* Plain layouts use high contrast outlines instead of color tints */
    .my-msg { float: right; border: 3px dashed #000000; }
    .other-msg { float: left; border: 2px solid #000000; }

    /* 👑 Crisp Double-Thick Lines for Augustinejames & Tockdev profiles */
    .boss-msg { float: right; border: 5px double #000000 !important; }
    .boss-meta { font-weight: bold; text-decoration: underline; }

    .del-btn { position: absolute; top: 4px; right: 4px; border: 2px solid #000000; background: #ffffff; font-size: 10px; cursor: pointer; font-weight: bold; padding: 0 4px; }

    #roster-list, #dm-list { margin-bottom: 10px; }
    .roster-user { padding: 5px; border: 2px solid #000000; margin-bottom: 4px; font-size: 11px; background: #ffffff; }
    .roster-name { cursor: pointer; text-decoration: underline; font-weight: bold; }
    .roster-action-btn { float: right; font-size: 9px; background: #ffffff; border: 2px solid #000000; cursor: pointer; font-weight: bold; padding: 0 2px; }

    #settings-box-container { padding: 4px; border: 2px dashed #000000; margin-bottom: 8px; background: #ffffff; }
    .settings-input { width: 88%; padding: 4px; margin-bottom: 4px; font-family: monospace; font-size: 11px; border: 2px solid #000000; }
    .settings-btn { width: 95%; font-family: monospace; font-size: 11px; font-weight: bold; background: #ffffff; border: 3px solid #000000; cursor: pointer; padding: 4px 0; }

    #auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #ffffff; display: block; z-index: 100; text-align: center; padding-top: 60px; }
    .auth-box { padding: 25px; width: 280px; margin: 0 auto; border: 4px double #000000; background: #ffffff; }
    .auth-box input { width: 88%; padding: 6px; margin: 6px 0; font-family: monospace; border: 3px solid #000000; }
    .auth-box button { width: 95%; padding: 8px; margin-top: 8px; cursor: pointer; font-family: monospace; font-weight: bold; background: #ffffff; border: 3px solid #000000; }
    .auth-toggle { font-size: 11px; margin-top: 12px; cursor: pointer; text-decoration: underline; font-weight: bold; color: #000000; }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-box">
      <h2 id="auth-title" style="margin-top:0; text-transform:uppercase; font-weight:bold;">Login</h2>
      <input type="text" id="auth-user" placeholder="Username" autocomplete="off">
      <input type="password" id="auth-pass" placeholder="Password">
      <button id="auth-submit-btn">SUBMIT</button>
      <div id="auth-toggle" class="auth-toggle">Create an account instead</div>
    </div>
  </div>

  <div class="paper" id="title-bar">
    <h1>un-reader</h1>
    <div id="title-right">
      <span id="user-display" style="font-weight:bold; margin-right:10px;"></span>
      <button id="logout-btn">LOGOUT</button>
    </div>
  </div>
  
  <table id="workspace-table">
    <tr>
      <td id="sidebar-cell">
        <div class="panel-header">🟢 Online</div>
        <div id="roster-list"></div>

        <div class="panel-header">Channels</div>
        <div class="nav-item nav-item-active" id="nav-public" onclick="switchChannel('public', '')">🌍 Global Chat</div>
        
        <div class="panel-header">Direct Messages</div>
        <input type="text" id="dm-target-input" placeholder="+ Type user & press Enter..." autocomplete="off">
        <div id="dm-list"></div>
        
        <div class="panel-header">Settings</div>
        <div id="settings-box-container">
          <input type="password" id="settings-new-pass" class="settings-input" placeholder="New Password...">
          <button id="settings-save-btn" class="settings-btn">UPDATE</button>
        </div>
      </td>
      <td id="chat-cell">
        <!-- High Contrast Button Page turning panel to replace continuous scrolling -->
        <div id="pagination-header-bar">
          <button class="page-btn" id="prev-page-btn" onclick="jumpToPreviousPage()">&lt; PREV LOGS</button>
          <span id="page-display-index" style="margin: 0 15px; font-weight: bold;">PAGE: 0</span>
          <button class="page-btn" id="next-page-btn" onclick="jumpToNextPage()">OLDER LOGS &gt;</button>
        </div>

        <div id="chat-static-frame"></div>
        <div id="typing-indicator" style="display:none;"></div>
        
        <div id="input-bar-container">
          <input type="text" id="content" placeholder="Enter message text..." autocomplete="off">
          <button id="send">SEND</button>
        </div>
      </td>
    </tr>
  </table>

  <script type="text/javascript">
    // ⚠️ CONFIGURATION TARGET: REPLACE BOTH URLS BELOW WITH YOUR RENDER APP ADDRESS
    var BACKEND_URL = "https://unreadeer.onrender.com"; 
    var WS_URL = "wss://unreader.onrender.com";

    var token = localStorage.getItem('token');
    var myUsername = localStorage.getItem('username');
    var currentMode = 'public';
    var currentDMTarget = '';
    var socket = null;
    var isRegisterMode = false;
    var currentHistoryIndex = 0;

    var authToggle = document.getElementById('auth-toggle');
    authToggle.onclick = function() {
      isRegisterMode = !isRegisterMode;
      document.getElementById('auth-title').textContent = isRegisterMode ? 'Register' : 'Login';
      authToggle.textContent = isRegisterMode ? 'Already have an account? Login' : 'Create an account instead';
    };

    function isMasterAdmin(name) {
      return name === 'augustinejames' || name === 'tockdev';
    }

    document.getElementById('auth-submit-btn').onclick = function() {
      var username = document.getElementById('auth-user').value.trim();
      var password = document.getElementById('auth-pass').value;
      if(!username || !password) return alert('Fields cannot be blank');

      var url = isRegisterMode ? '/api/register' : '/api/login';
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var data = JSON.parse(xhr.responseText);
          if(data.error) return alert(data.error);
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          token = data.token;
          myUsername = data.username;
          initApp();
        }
      };
      xhr.send(JSON.stringify({ username: username, password: password }));
    };

    document.getElementById('settings-save-btn').onclick = function() {
      var newPassword = document.getElementById('settings-new-pass').value;
      if (!newPassword) return alert('Password cannot be blank');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/change-password', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var data = JSON.parse(xhr.responseText);
          if (data.error) return alert(data.error);
          document.getElementById('settings-new-pass').value = '';
          alert('Password modified successfully');
        }
      };
      xhr.send(JSON.stringify({ password: newPassword }));
    };

    document.getElementById('logout-btn').onclick = function() {
      localStorage.clear();
      window.location.reload();
    };

    function initApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('user-display').textContent = '@' + myUsername;
      
      socket = new WebSocket(WS_URL);
      socket.onopen = function() { socket.send(JSON.stringify({ type: 'auth', token: token })); };

      socket.onmessage = function(event) {
        var data = JSON.parse(event.data);
        if (data.type === 'terminated') {
          alert('Session terminated by administrator');
          localStorage.clear();
          window.location.reload();
          return;
        }
        if (data.type === 'msg_deleted') {
          var targetNode = document.getElementById('msg-id-' + data.id);
          if (targetNode) targetNode.innerHTML = '<div class="message-meta">System</div><div class="message-text">[PURGED BY ROOT]</div>';
          return;
        }
        if (data.type === 'roster_update') {
          renderUserRoster(data.users);
          return;
        }
        
        if (currentHistoryIndex === 0) {
          if (data.type === 'public' && currentMode === 'public') {
            loadHistory();
          } else if (data.type === 'dm') {
            var partner = data.sender === myUsername ? data.receiver : data.sender;
            ensureDMNavOption(partner);
            if (currentMode === 'dm' && currentDMTarget === partner) {
              loadHistory();
            }
          }
        }
      };
      
      loadDMContacts(); 
      loadHistory();
    }

    function renderUserRoster(userList) {
      var container = document.getElementById('roster-list');
      container.innerHTML = '';
      for (var i = 0; i < userList.length; i++) {
        var username = userList[i];
        if (username === myUsername) continue;

        var userDiv = document.createElement('div');
        userDiv.className = 'roster-user';

        var nameSpan = document.createElement('span');
        nameSpan.className = 'roster-name';
        nameSpan.textContent = username;
        
        (function(uname) {
          nameSpan.onclick = function() { ensureDMNavOption(uname); switchChannel('dm', uname); };
        })(username);
        userDiv.appendChild(nameSpan);

        if (isMasterAdmin(myUsername) && !isMasterAdmin(username)) {
          var modBtn = document.createElement('button');
          modBtn.className = 'roster-action-btn';
          modBtn.textContent = 'TERM';
          (function(uname) {
            modBtn.onclick = function() {
              if (confirm('Terminate account connection profile for: ' + uname + '?')) {
                socket.send(JSON.stringify({ type: 'mod_kick', target: uname }));
              }
            };
          })(username);
          userDiv.appendChild(modBtn);
        }
        container.appendChild(userDiv);
      }
    }

    function jumpToPreviousPage() {
      if (currentHistoryIndex > 0) {
        currentHistoryIndex--;
        document.getElementById('page-display-index').textContent = "PAGE: " + currentHistoryIndex;
        loadHistory();
      }
    }
    
    function jumpToNextPage() {
      currentHistoryIndex++;
      document.getElementById('page-display-index').textContent = "PAGE: " + currentHistoryIndex;
      loadHistory();
    }

    function loadDMContacts() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', BACKEND_URL + '/dm-contacts', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var contacts = JSON.parse(xhr.responseText);
          for (var i = 0; i < contacts.length; i++) { ensureDMNavOption(contacts[i]); }
        }
      };
      xhr.send();
    }

    function ensureDMNavOption(username) {
      if (document.getElementById('nav-dm-' + username) || username === myUsername) return;
      var targetList = document.getElementById('dm-list');
      var item = document.createElement('div');
      item.className = 'nav-item';
      item.id = 'nav-dm-' + username;
      item.textContent = '💬 ' + username;
      item.onclick = function() { switchChannel('dm', username); };
      targetList.appendChild(item);
    }

    document.getElementById('dm-target-input').onkeypress = function(e) {
      var key = e.keyCode || e.which;
      if (key === 13) {
        var target = e.target.value.trim();
        if(!target || target === myUsername) return;
        ensureDMNavOption(target);
        switchChannel('dm', target);
        e.target.value = '';
      }
    };

    function switchChannel(mode, target) {
      if(!target) target = '';
      currentMode = mode;
      currentDMTarget = target;
      currentHistoryIndex = 0;
      document.getElementById('page-display-index').textContent = "PAGE: 0";
      
      var navItems = document.getElementById('sidebar-cell').getElementsByTagName('div');
      for (var i = 0; i < navItems.length; i++) {
        if(navItems[i].className.indexOf('nav-item') !== -1) navItems[i].className = 'nav-item';
      }
      if(mode === 'public') {
        document.getElementById('nav-public').className = 'nav-item nav-item-active';
      } else {
        var activeTab = document.getElementById('nav-dm-' + target);
        if (activeTab) activeTab.className = 'nav-item nav-item-active';
      }
      loadHistory();
    }

    function appendMessage(data) {
      var chatWrapper = document.getElementById('chat-static-frame');
      var containerDiv = document.createElement('div');
      containerDiv.className = 'message-container';
      
      var msgDiv = document.createElement('div');
      msgDiv.id = 'msg-id-' + data.id;
      var isMe = data.username === myUsername;
      var isBoss = isMasterAdmin(data.username);
      
      var messageStyleClass = 'message ';
      if (isBoss) messageStyleClass += 'boss-msg';
      else if (isMe) messageStyleClass += 'my-msg';
      else messageStyleClass += 'other-msg';
      msgDiv.className = messageStyleClass;
      
      var timeStr = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      var nameDisplay = isBoss ? '👑 ' + data.username + ' [SYS_OP]' : data.username;
      var metaStyleClass = isBoss ? 'message-meta boss-meta' : 'message-meta';

      msgDiv.innerHTML = '<div class="' + metaStyleClass + '">' + nameDisplay + ' • ' + timeStr + '</div><div class="message-text"></div>';
      
      if (isMasterAdmin(myUsername) && data.id !== -1) {
        var delBtn = document.createElement('button');
        delBtn.className = 'del-btn';
        delBtn.textContent = 'X';
        delBtn.onclick = function() { triggerMsgDeletion(data.id); };
        msgDiv.appendChild(delBtn);
      }

      msgDiv.querySelector('.message-text').textContent = data.content;
      containerDiv.appendChild(msgDiv);
      chatWrapper.appendChild(containerDiv);
    }

    function triggerMsgDeletion(msgId) {
      if (!isMasterAdmin(myUsername)) return;
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'mod_delete', id: msgId, channel: currentMode }));
      }
    }

    function loadHistory() {
      document.getElementById('chat-static-frame').innerHTML = '';
      var xhr = new XMLHttpRequest();
      if (currentMode === 'public') {
        xhr.open('GET', BACKEND_URL + '/history?index=' + currentHistoryIndex, true);
      } else {
        xhr.open('GET', BACKEND_URL + '/dm-history?target=' + currentDMTarget + '&index=' + currentHistoryIndex, true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      }
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var data = JSON.parse(xhr.responseText);
          if (data.length === 0 && currentHistoryIndex > 0) {
            currentHistoryIndex--;
            document.getElementById('page-display-index').textContent = "PAGE: " + currentHistoryIndex;
            loadHistory();
            return;
          }
          for (var i = 0; i < data.length; i++) {
            var msg = data[i];
            if (currentMode === 'public') appendMessage(msg);
            else appendMessage({ id: msg.id, username: msg.sender, content: msg.content, timestamp: msg.timestamp });
          }
        }
      };
      xhr.send();
    }

    var input = document.getElementById('content');
    function sendMessage() {
      var text = input.value.trim();
      if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: currentMode === 'public' ? 'public' : 'dm', content: text, target: currentDMTarget }));
      input.value = '';
    }

    document.getElementById('send').onclick = sendMessage;
    input.onkeypress = function(e) {
      var key = e.keyCode || e.which;
      if (key === 13) sendMessage();
    };

    if (token && myUsername) initApp();
  </script>
</body>
</html>
