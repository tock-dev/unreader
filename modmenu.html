<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>un-reader BBS - Moderation Console</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org/face/symbola/css/symbola.css" type="text/css"/>
  <style type="text/css">
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --border: 2px solid #000000;
      --border-width: 2px;
      --shadow: 4px 4px 0px #000000;
      --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
    }

    html, body {
      margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%;
      font-family: "Geneva", "Verdana", sans-serif, "SymbolaRegular"; background-color: #e5e5e5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .window {
      background: white; border: var(--border); box-shadow: var(--shadow);
      display: flex; flex-direction: column; height: 95vh; width: 98vw; max-width: 950px; position: relative;
    }

    .title-bar {
      height: 35px; border-bottom: var(--border); display: flex; align-items: center; justify-content: center; background: white; padding: 0 10px; position: relative; flex-shrink: 0;
    }
    .title-stripes { position: absolute; top: 4px; bottom: 4px; left: 4px; right: 4px; background-image: var(--stripe-pattern); z-index: 0; }
    .title-text { background: white; padding: 0 15px; font-weight: bold; z-index: 1; font-size: 14px; text-transform: uppercase; }
    
    #back-btn { position: absolute; left: 10px; z-index: 2; cursor: pointer; font-family: monospace; font-size: 11px; background: white; border: var(--border); padding: 2px 6px; box-shadow: 2px 2px 0 black; font-weight: bold; }
    #user-display { position: absolute; right: 10px; z-index: 2; font-size: 11px; font-weight: bold; background: white; padding: 2px 6px; border: 1px solid black; }

    #workspace-table { width: 100%; height: calc(100% - 37px); border-collapse: collapse; table-layout: fixed; }
    #sidebar-cell { width: 230px; background: #fafafa; border-right: var(--border); vertical-align: top; padding: 0; overflow-y: auto; }
    #console-cell { vertical-align: top; padding: 15px; position: relative; background-color: #ffffff; overflow-y: auto; }

    .panel-header { font-weight: bold; padding: 6px 8px; text-transform: uppercase; border-bottom: var(--border); border-top: var(--border); background: #eee; font-size: 10px; letter-spacing: 1px; }
    .panel-header:first-child { border-top: none; }

    .nav-item { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 11px; background: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-item:hover { background: #f0f0f0; }

    /* Dual pane design */
    .dual-pane {
      display: flex;
      gap: 15px;
      height: 100%;
      min-height: 480px;
    }
    
    .pane-left {
      flex: 1;
      border: var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .pane-right {
      flex: 1.2;
      border: var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .pane-title {
      font-size: 13px;
      font-weight: bold;
      border-bottom: var(--border);
      padding-bottom: 6px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .retro-input {
      width: 95%;
      padding: 6px;
      font-family: monospace;
      border: var(--border);
      outline: none;
      background: white;
    }

    .retro-btn {
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      background: white;
      border: var(--border);
      padding: 6px 10px;
      cursor: pointer;
      box-shadow: 2px 2px 0 black;
    }
    .retro-btn:active {
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    .danger-btn {
      background: #ffcccc !important;
      color: #770000;
    }

    #user-search-results {
      margin-top: 10px;
      padding: 8px;
      border: 1px dashed black;
      background: #fafafa;
      font-size: 11px;
      font-family: monospace;
      flex-grow: 1;
      overflow-y: auto;
    }

    #mod-log-list {
      flex-grow: 1;
      overflow-y: auto;
      border: 1px solid black;
      background: #fafafa;
      padding: 8px;
      font-size: 10px;
      font-family: monospace;
      max-height: 400px;
    }

    .mod-log-item {
      border-bottom: 1px dotted black;
      padding: 5px 0;
      line-height: 1.3;
    }

    /* E-Ink / Brutalist Dark Mode adjustments */
    body.dark-mode {
      --bg-color: #121212;
      --text-color: #ffffff;
      --border: 2px solid #ffffff;
      --shadow: 4px 4px 0px #ffffff;
      --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #fff 3px, #fff 4px);
      background-color: #242424 !important;
    }
    body.dark-mode .window,
    body.dark-mode .title-bar,
    body.dark-mode .title-text,
    body.dark-mode #back-btn,
    body.dark-mode #user-display,
    body.dark-mode .nav-item,
    body.dark-mode .pane-left,
    body.dark-mode .pane-right,
    body.dark-mode .retro-input,
    body.dark-mode .retro-btn,
    body.dark-mode #user-search-results,
    body.dark-mode #mod-log-list,
    body.dark-mode .mod-log-item {
      background-color: #121212 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }
    body.dark-mode #sidebar-cell {
      background-color: #1a1a1a !important;
      border-right-color: #ffffff !important;
    }
    body.dark-mode #console-cell {
      background-color: #121212 !important;
    }
    body.dark-mode .panel-header {
      background-color: #222222 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }
    body.dark-mode .danger-btn {
      background: #770000 !important;
      color: #ffcccc !important;
    }
    body.dark-mode .mod-log-item {
      border-bottom-color: #333 !important;
    }

    body.contrast-medium {
      --border: 3px solid var(--text-color);
      --border-width: 3px;
    }
    body.contrast-high {
      --border: 4px solid var(--text-color);
      --border-width: 4px;
    }
  </style>
</head>
<body>

  <div class="window">
    <div class="title-bar">
      <div class="title-stripes"></div>
      <button id="back-btn" onclick="window.location.href='index.html'">◀ HOME</button>
      <div class="title-text">un-reader BBS - Moderation Console</div>
      <span id="user-display"></span>
    </div>
    
    <table id="workspace-table">
      <tr>
        <td id="sidebar-cell">
          <div class="panel-header">Quick Links</div>
          <div class="nav-item" onclick="window.location.href='chat.html'">💬 Go to Chat</div>
          <div class="nav-item" onclick="window.location.href='topics.html'"># Topic Rooms</div>
          <div class="nav-item" onclick="window.location.href='neighbourhood.html'">🏡 Neighbourhood</div>

          <div class="panel-header">Status</div>
          <div style="padding: 10px; font-size: 11px; font-weight: bold; font-family: monospace;">
            Role: <span id="mod-role-text" style="color: blue;">MODERATOR</span>
          </div>
        </td>
        <td id="console-cell">
          <div class="dual-pane">
            
            <div class="pane-left">
              <div class="pane-title">🔍 User Management</div>
              <div class="form-group">
                <label for="user-search-input">LOOKUP BY USERNAME:</label>
                <input type="text" id="user-search-input" class="retro-input" placeholder="Search...">
              </div>
              <button class="retro-btn" onclick="searchUserAction()">FIND USER</button>
              
              <div id="user-search-results">
                Search a user to access timing out, banning, and promoting action streams.
              </div>
            </div>

            <div class="pane-right">
              <div class="pane-title">🛡️ System Audit Logs</div>
              <button class="retro-btn" onclick="openModLogs()" style="margin-bottom: 10px;">REFRESH AUDIT LOGS</button>
              <div id="mod-log-list">
                Logs loading...
              </div>
            </div>

          </div>
        </td>
      </tr>
    </table>
  </div>

  <script type="text/javascript">
    const DEBUG = false;
    const DO_LOGGING = true;
    var BACKEND_URL = DEBUG ? "http://localhost:3000" : "https://unreader.onrender.com"; 
    var WS_URL = DEBUG ? "ws://localhost:3000" : "wss://unreader.onrender.com";

    // Standardized token sharing & preference loader
    function applySavedPreferences() {
      if (localStorage.getItem('unreader-token') && !localStorage.getItem('token')) {
        localStorage.setItem('token', localStorage.getItem('unreader-token'));
      }
      if (localStorage.getItem('unreader-username') && !localStorage.getItem('username')) {
        localStorage.setItem('username', localStorage.getItem('unreader-username'));
      }
      if (localStorage.getItem('token') && !localStorage.getItem('unreader-token')) {
        localStorage.setItem('unreader-token', localStorage.getItem('token'));
      }
      if (localStorage.getItem('username') && !localStorage.getItem('unreader-username')) {
        localStorage.setItem('unreader-username', localStorage.getItem('username'));
      }

      if (localStorage.getItem('unreader-darkmode') === 'enabled') {
        document.body.classList.add('dark-mode');
      }
      const savedContrast = localStorage.getItem('unreader-contrast') || 'normal';
      if (savedContrast !== 'normal') {
        document.body.classList.add(`contrast-${savedContrast}`);
      }
      const savedFont = localStorage.getItem('unreader-font') || 'sans';
      if (savedFont === 'mono') {
        document.documentElement.style.setProperty('--body-font', 'monospace');
        document.body.style.fontFamily = 'monospace';
      }
    }
    applySavedPreferences();

    var token = localStorage.getItem('token');
    var myUsername = localStorage.getItem('username');
    var socket = null;
    var userRoles = { is_admin: false, is_moderator: false };

    function log(...args) { if (DO_LOGGING) console.log(`[CLIENT]`, ...args); }

    function formatTimeToken(unixTimestamp) {
      if (!unixTimestamp) return "MOMENTS AGO";
      var parsedNum = Number(unixTimestamp);
      if (isNaN(parsedNum)) return "MOMENTS AGO";
      var d = new Date(parsedNum);
      return d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function initApp() {
      log("Booting moderation layers.");
      document.getElementById('user-display').textContent = '@' + myUsername;
      
      if (socket) { try { socket.close(); } catch(e){} }
      log("Opening WS link:", WS_URL);
      socket = new WebSocket(WS_URL);
      socket.onopen = function() { 
        log("WS Link connected. Authenticating...");
        socket.send(JSON.stringify({ type: 'auth', token: token })); 
      };
      socket.onmessage = function(event) {
        var data = JSON.parse(event.data);
        if (data.type === 'terminated') {
          alert('Session terminated.');
          window.location.href = 'index.html'; return;
        }
        if (data.type === 'error_alert') { alert(data.message); return; }
        if (data.type === 'topics_update') { 
          if (data.user_roles) {
            userRoles = data.user_roles;
            log("Mod console roles synced:", userRoles);
            
            // Security verification
            if (!userRoles.is_admin && !userRoles.is_moderator) {
              alert("Access Denied: You do not possess structural operator credentials.");
              window.location.href = 'index.html';
              return;
            }
            
            document.getElementById('mod-role-text').textContent = userRoles.is_admin ? "ADMINISTRATOR" : "MODERATOR";
            document.getElementById('mod-role-text').style.color = userRoles.is_admin ? "red" : "blue";
          }
          return; 
        }
      };
      openModLogs();
    }

    function openModLogs() {
      log("Syncing audit log stream.");
      var xhr = new XMLHttpRequest(); xhr.open('GET', BACKEND_URL + '/api/mod-logs', true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            var logs = JSON.parse(xhr.responseText);
            var list = document.getElementById('mod-log-list'); list.innerHTML = '';
            if (logs.length === 0) {
              list.innerHTML = '<div style="padding:10px; text-align:center;">No moderator actions logged.</div>';
              return;
            }
            logs.forEach(function(l) {
              var div = document.createElement('div'); div.className = 'mod-log-item';
              div.textContent = `[${formatTimeToken(l.timestamp)}] ${l.mod_username}: ${l.action_type.toUpperCase()} on ${l.target_username || 'ID '+l.target_id} | Reason: ${l.reason}`;
              list.appendChild(div);
            });
          } else {
            document.getElementById('mod-log-list').innerHTML = 'Access Denied or Connection Failure.';
          }
        }
      };
      xhr.send();
    }

    function searchUserAction() {
      var target = document.getElementById('user-search-input').value.trim();
      if (!target) return;
      log("Dispatching user query target:", target);
      var xhr = new XMLHttpRequest(); xhr.open('GET', BACKEND_URL + '/api/admin/find-user/' + target, true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          log("User query response code:", xhr.status);
          var res = document.getElementById('user-search-results');
          if (xhr.status === 200) {
            var u = JSON.parse(xhr.responseText);
            var status = u.is_banned ? 'BANNED' : (BigInt(u.timeout_until) > BigInt(Date.now()) ? 'TIMED OUT' : 'ACTIVE');
            
            var html = `<div style="line-height: 1.5;">
              <strong>Username:</strong> ${u.username}<br>
              <strong>Last IP:</strong> ${u.last_ip || 'Unknown'}<br>
              <strong>Status:</strong> ${status}<br>
              <strong>Roles:</strong> Admin: ${u.is_admin}, Mod: ${u.is_moderator}<br>`;
            // Show alts if any
            if (u.alts && u.alts.length > 0) {
              html += `<strong>Alt Accounts:</strong> ${u.alts.map(a => a.username).join(', ')}<br>`;
            }
            html += `<br>
              <div style="border-top: 1px dotted black; padding-top:8px; margin-top:8px;">
                <strong>Operator Timeout:</strong><br>
                Duration (mins): <input type="number" id="admin-timeout-dur" value="60" style="width: 40px; font-family:monospace; padding:2px; border:1px solid black; background:white;">
                <button class="retro-btn" onclick="submitTimeout('${u.username}')">TIMEOUT</button>
              </div>`;
            if (userRoles.is_admin) {
              html += `<div style="border-top: 1px dotted black; padding-top:8px; margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
                <button class="retro-btn" onclick="setModeratorAction('${u.username}', ${!u.is_moderator})">${u.is_moderator ? 'REMOVE MOD ROLE' : 'PROMOTE TO MOD'}</button>
                <button class="retro-btn danger-btn" onclick="adminAction('mod_ban', '${u.username}')">BAN USER</button>
                <button class="retro-btn" onclick="adminAction('mod_pardon', '${u.username}')">PARDON USER</button>
                <button class="retro-btn danger-btn" onclick="banIP('${u.username}')">BAN IP</button>
              </div>`;
            }
            html += `</div>`;
            res.innerHTML = html;
            // Apply dark mode styles to dynamic inputs
            if (localStorage.getItem('unreader-darkmode') === 'enabled') {
              res.querySelectorAll('input').forEach(e => { e.style.backgroundColor = '#121212'; e.style.color = '#ffffff'; e.style.borderColor = '#ffffff'; });
            }
          } else { 
            res.innerHTML = 'User identity not found.'; 
          }
        }
      };
      xhr.send();
    }

    function submitTimeout(targetUser) {
      var dur = document.getElementById('admin-timeout-dur').value;
      if (!socket || socket.readyState !== WebSocket.OPEN) return alert('Socket offline.');
      // Admins do not need to provide a reason for timeout
      var reason = userRoles.is_admin ? '' : prompt("Reason for timeout?");
      if (!userRoles.is_admin && !reason) return;
      var payload = { type: 'mod_timeout', target: targetUser, duration: dur };
      if (reason) payload.reason = reason;
      log("Sending mod_timeout packet for:", targetUser, payload);
      socket.send(JSON.stringify(payload));
      setTimeout(function() { searchUserAction(); openModLogs(); }, 500);
    }

    function setModeratorAction(target, isMod) {
      log("Sending role update packet.");
      var xhr = new XMLHttpRequest(); xhr.open('POST', BACKEND_URL + '/api/admin/set-role', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() { if (xhr.readyState === 4) searchUserAction(); };
      xhr.send(JSON.stringify({ target: target, is_moderator: isMod }));
    }

    function adminAction(type, target) {
      if (type === 'mod_ban' && !confirm('Are you absolutely sure you want to BAN ' + target + '?')) return;
      log("Sending administrative action packet:", type);
      socket.send(JSON.stringify({ type: type, target: target }));
      setTimeout(function() { searchUserAction(); openModLogs(); }, 500);
    }

    function banIP(targetUser) {
      if (!userRoles.is_admin) return alert('Only admins can ban IPs.');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/admin/ban-ip', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            alert('IP ban successful for ' + targetUser);
            searchUserAction();
            openModLogs();
          } else {
            alert('IP ban failed: ' + xhr.responseText);
          }
        }
      };
      xhr.send(JSON.stringify({ username: targetUser }));
    }

    if (token && myUsername) { initApp(); }
    else {
      alert("Please log in on the homepage first.");
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
