<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>un-reader BBS - Moderation Console</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.2/purify.min.js"></script>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org/face/symbola/css/symbola.css" type="text/css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="bbs.css" />
  <script src="common.js"></script>
  <style type="text/css">
    /* --- Base Variables Framework --- */
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --border-color: #000000;
      --border-width: 2px;
    }

    /* --- Layout & Architecture Overrides --- */
    #console-cell {
      padding: 20px;
      background-color: var(--bg-color);
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    .panel-header {
      font-weight: bold;
      padding: 8px 12px;
      text-transform: uppercase;
      border-bottom: var(--border-width) solid var(--border-color);
      border-top: var(--border-width) solid var(--border-color);
      background: var(--bg-color);
      font-size: 11px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .panel-header:first-child {
      border-top: none;
    }

    .nav-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px dashed var(--border-color);
      font-size: 13px;
      background: var(--bg-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover,
    .nav-item:active {
      background: var(--text-color);
      color: var(--bg-color);
    }

    /* Dual pane design */
    .dual-pane {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      height: 100%;
    }

    .lookup-pane,
    .logs-pane {
      flex: 1 0 40%;
      box-sizing: border-box;
      border: var(--border-width) solid var(--border-color);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      background: var(--bg-color);
      min-height: 40%;
      word-break: break-all;
    }

    .lookup-pane {
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .pane-title {
      font-size: 15px;
      font-weight: bold;
      border-bottom: var(--border-width) solid var(--border-color);
      padding-bottom: 8px;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .retro-input {
      box-sizing: border-box;
      width: 100%;
      padding: 10px;
      font-family: inherit;
      border: var(--border-width) solid var(--border-color);
      outline: none;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .retro-btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: bold;
      background: var(--bg-color);
      color: var(--text-color);
      border: var(--border-width) solid var(--border-color);
      padding: 10px 16px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .retro-btn:active {
      background: var(--text-color);
      color: var(--bg-color);
    }

    .danger-btn {
      border-color: #ff0000 !important;
    }
    
    body.dark-mode .danger-btn {
      border-color: #ff3333 !important;
    }

    #user-search-results {
      flex-grow: 1;
      margin-top: 16px;
      padding: 12px;
      border: 1px dashed var(--border-color);
      background: var(--bg-color);
      font-size: 13px;
    }

    #mod-log-list {
      flex-grow: 1;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      padding: 12px;
      font-size: 12px;
    }

    .mod-log-item {
      border-bottom: 1px dotted var(--border-color);
      padding: 8px 0;
      line-height: 1.4;
    }

    /* Functional Helpers Style Blocks */
    .action-header-row {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      gap: 10px;
      margin-bottom: 14px;
    }

    .action-header-row input {
      flex: 1;
      min-width: 0;
    }

    /* Theme Engine Adaptability overrides */
    body.dark-mode {
      --bg-color: #121212;
      --text-color: #ffffff;
      --border-color: #ffffff;
      background-color: #121212 !important;
    }

    body.dark-mode .window,
    body.dark-mode .title-bar,
    body.dark-mode .title-text,
    body.dark-mode #back-btn,
    body.dark-mode #user-display,
    body.dark-mode .nav-item,
    body.dark-mode .lookup-pane,
    body.dark-mode .logs-pane,
    body.dark-mode .retro-input,
    body.dark-mode .retro-btn,
    body.dark-mode #user-search-results,
    body.dark-mode #mod-log-list,
    body.dark-mode .mod-log-item {
      background-color: var(--bg-color) !important;
      color: var(--text-color) !important;
      border-color: var(--border-color) !important;
    }

    body.dark-mode #sidebar-cell {
      background-color: #1a1a1a !important;
      border-right: var(--border-width) solid var(--border-color) !important;
    }

    body.dark-mode #console-cell {
      background-color: var(--bg-color) !important;
    }

    body.dark-mode .panel-header {
      background-color: #222222 !important;
      color: var(--text-color) !important;
      border-color: var(--border-color) !important;
    }

    body.contrast-medium {
      --border-width: 3px;
    }

    body.contrast-high {
      --border-width: 4px;
    }
  </style>
</head>

<body>
  <div class="window">
    <div class="title-bar">
      <div class="title-stripes"></div>
      <button id="back-btn" onclick="window.location.href = 'index.html'">
        ◀ HOME
      </button>
      <div class="title-text">un-reader BBS - Moderation Console</div>
      <span id="user-display"></span>
    </div>

    <div id="workspace-table">
      <div id="sidebar-cell">
        <div class="panel-header">Quick Links</div>
        <div class="nav-item" onclick="window.location.href = 'chat.html'">
          💬 Go to Chat
        </div>
        <div class="nav-item" onclick="window.location.href = 'topics.html'">
          # Topic Rooms
        </div>
        <div class="nav-item" onclick="window.location.href = 'neighbourhood.html'">
          🏡 Neighbourhood
        </div>

        <div class="panel-header">Status</div>
        <div style="padding: 12px; font-size: 13px; font-weight: bold;">
          Role: <span id="mod-role-text" style="color: var(--text-color)">MODERATOR</span>
        </div>
      </div>
      
      <div id="console-cell">
        <div class="dual-pane">
          <div class="lookup-pane">
            <div class="pane-title">🔍 User Management</div>
            <div class="form-group">
              <label for="user-search-input">LOOKUP BY USERNAME:</label>
              <input type="text" id="user-search-input" class="retro-input" placeholder="Search..." />
            </div>
            <button class="retro-btn" onclick="searchUserAction()">
              FIND USER
            </button>

            <div id="user-search-results">
              Search a user to access timing out, banning, and promoting action streams.
            </div>
          </div>

          <div class="logs-pane">
            <div class="pane-title">🛡️ System Audit Logs</div>
            
            <div class="action-header-row">
              <input type="text" id="log-filter-input" class="retro-input" oninput="filterLogsLocally()" placeholder="Filter logs..." style="padding: 6px 10px; font-size: 12px;" />

              <button class="retro-btn" onclick="openModLogs()">
                REFRESH
              </button>
            </div>

            <div id="mod-log-list">Logs loading...</div>
          </div>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      var token = localStorage.getItem('token');
      var myUsername = localStorage.getItem('username');
      var socket = null;
      var userRoles = { role: { role:'', prefix: '', style: '', class: '' }, is_banned: false, timeout_until: 0, last_ip: null };

      function initApp() {
        log('Booting moderation layers.');
        document.getElementById('user-display').textContent = '@' + myUsername;

        if (socket) {
          try {
            socket.close();
          } catch (e) { }
        }
        log('Opening WS link:', WS_URL);
        socket = new WebSocket(WS_URL);
        socket.onopen = function () {
          log('WS Link connected. Authenticating...');
          socket.send(JSON.stringify({ type: 'auth', token: token }));
        };
        socket.onmessage = async function (event) {
          var data = JSON.parse(event.data);
          if (data.type === 'terminated') {
            await unAlert(data.reason || 'Session terminated.');
            window.location.href = 'index.html';
            return;
          }
          if (data.type === 'error_alert') {
            await unAlert(data.message);
            return;
          }
          if (data.type === 'topics_update') {
            if (data.user_roles) {
              userRoles = data.user_roles;
              log('Mod console roles synced:', userRoles);

              if (!['admin', 'moderator'].includes(userRoles.role.role)) {
                await unAlert(
                  'Access Denied: You do not possess structural operator credentials.',
                );
                window.location.href = 'index.html';
                return;
              }

              document.getElementById('mod-role-text').textContent =
                userRoles.role.role.toUpperCase();
              document.getElementById('mod-role-text').style.color =
                userRoles.role.role === 'admin' ? '#ff0000' : '#0000ff';
            }
            return;
          }
        };
        openModLogs();
      }

      function openModLogs() {
        log('Syncing audit log stream.');
        var xhr = new XMLHttpRequest();
        xhr.open('GET', BACKEND_URL + '/api/mod-logs', true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              var logs = JSON.parse(xhr.responseText);
              var list = document.getElementById('mod-log-list');
              list.innerHTML = '';
              if (logs.length === 0) {
                list.innerHTML =
                  '<div style="padding:10px; text-align:center;">No moderator actions logged.</div>';
                return;
              }
              logs.forEach(function (l) {
                var div = document.createElement('div');
                div.className = 'mod-log-item';
                var safeText = DOMPurify.sanitize(
                  `[${formatTimeToken(l.timestamp)}] ${l.mod_username}:`
                  + ` ${l.action_type.toUpperCase()} on ${l.target_username || 'ID ' + l.target_id}`
                  + ` | Reason: ${l.reason} ${l.action_type === 'delete' ? '| Content: ' + l.content : ''}`
                );
                div.innerHTML = safeText;
                list.appendChild(div);
              });
              document.getElementById('log-filter-input').value = '';
            } else {
              document.getElementById('mod-log-list').innerHTML =
                'Access Denied or Connection Failure.';
            }
          }
        };
        xhr.send();
      }

      function filterLogsLocally() {
        var query = document.getElementById('log-filter-input').value.toLowerCase();
        var items = document.querySelectorAll('.mod-log-item');
        items.forEach(function (item) {
          if (item.textContent.toLowerCase().indexOf(query) > -1) {
            item.style.display = '';
          } else {
            item.style.display = 'none';
          }
        });
      }

      function searchUserAction() {
        var target = document.getElementById('user-search-input').value.trim();
        if (!target) return;
        log('Dispatching user query target:', target);
        var xhr = new XMLHttpRequest();
        xhr.open('GET', BACKEND_URL + '/api/admin/find-user/' + target, true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            log('User query response code:', xhr.status);
            var res = document.getElementById('user-search-results');
            if (xhr.status === 200) {
              var u = JSON.parse(xhr.responseText);
              var status = u.is_banned
                ? 'BANNED'
                : BigInt(u.timeout_until) > BigInt(Date.now())
                  ? 'TIMED OUT'
                  : 'ACTIVE';

              var safeUsername = DOMPurify.sanitize(u.username);
              var safeIP = DOMPurify.sanitize(u.last_ip || 'Unknown');
              var safeStatus = DOMPurify.sanitize(status);
              var safeAlts = u.alts ? DOMPurify.sanitize(u.alts.join(', ')) : '';

              var html = `<div style="line-height: 1.5;">
              <strong>Username:</strong> ${safeUsername}<br>
              <strong>Last IP:</strong> ${safeIP}<br>
              <strong>Status:</strong> ${safeStatus}<br>
              <strong>Roles:</strong> ${u.roles.map((r) => r.toUpperCase()).join(', ')}<br>`;
              if (u.alts && u.alts.length > 0) {
                html += `<strong>Alt Accounts:</strong> ${safeAlts}<br>`;
              }
              html += `<br>
              <div style="border-top: 1px dotted var(--border-color); padding-top:8px; margin-top:8px;">
                <strong>Operator Timeout:</strong><br>
                Duration (mins): <input type="number" id="admin-timeout-dur" value="60" style="width: 50px; padding:4px; border:var(--border-width) solid var(--border-color); background:var(--bg-color); color:var(--text-color);">
                <button class="retro-btn" onclick="submitTimeout('${safeUsername}')">TIMEOUT</button>
              </div>`;
              if (userRoles.role.role && userRoles.role.role === 'admin') {
                html += `<div style="border-top: 1px dotted var(--border-color); padding-top:8px; margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
                <button class="retro-btn" onclick="setModeratorAction('${safeUsername}', ${!u.roles.includes('moderator')})">${u.roles.includes('moderator') ? 'REMOVE MOD ROLE' : 'PROMOTE TO MOD'}</button>
                <button class="retro-btn danger-btn" onclick="adminAction('mod_ban', '${safeUsername}')">BAN USER</button>
                <button class="retro-btn" onclick="adminAction('mod_pardon', '${safeUsername}')">PARDON USER</button>
                <button class="retro-btn danger-btn" onclick="banIP('${safeUsername}')">BAN IP</button>
              </div>`;
              }
              html += `</div>`;
              res.innerHTML = html;

              if (localStorage.getItem('unreader-darkmode') === 'enabled') {
                res.querySelectorAll('input').forEach((e) => {
                  e.style.backgroundColor = '#121212';
                  e.style.color = '#ffffff';
                  e.style.borderColor = '#ffffff';
                });
              }
            } else {
              res.innerHTML = 'User identity not found.';
            }
          }
        };
        xhr.send();
      }

      async function submitTimeout(targetUser) {
        var dur = document.getElementById('admin-timeout-dur').value;
        if (!socket || socket.readyState !== WebSocket.OPEN)
          return await unAlert('Socket offline.');
        var reason = userRoles.role.role && userRoles.role.role === 'admin' ? 'Admin doesn\'t need any reasons' : await unPrompt('Reason for timeout?');
        if (!(userRoles.role.role && userRoles.role.role === 'admin') && !reason) return;
        var payload = {
          type: 'mod_timeout',
          target: targetUser,
          duration: dur,
        };
        if (reason) payload.reason = reason;
        log('Sending mod_timeout packet for:', targetUser, payload);
        socket.send(JSON.stringify(payload));
        setTimeout(function () {
          searchUserAction();
          openModLogs();
        }, 500);
      }

      function setModeratorAction(target, isMod) {
        log('Sending role update packet.');
        var xhr = new XMLHttpRequest();
        xhr.open('POST', BACKEND_URL + '/api/admin/set-role', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) searchUserAction();
        };
        xhr.send(JSON.stringify({ target: target, is_moderator: isMod }));
      }

      async function adminAction(type, target) {
        if (
          type === 'mod_ban' &&
          !(await unConfirm('Are you absolutely sure you want to BAN ' + target + '?'))
        )
          return;
        log('Sending administrative action packet:', type);
        socket.send(JSON.stringify({ type: type, target: target }));
        setTimeout(function () {
          searchUserAction();
          openModLogs();
        }, 500);
      }

      async function banIP(targetUser) {
        if (!(userRoles.role.role && userRoles.role.role === 'admin')) return await unAlert('Only admins can ban IPs.');
        var xhr = new XMLHttpRequest();
        xhr.open('POST', BACKEND_URL + '/api/admin/ban-ip', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        xhr.onreadystatechange = async function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              await unAlert('IP ban successful for ' + targetUser);
              searchUserAction();
              openModLogs();
            } else {
              await unAlert('IP ban failed: ' + xhr.responseText);
            }
          }
        };
        xhr.send(JSON.stringify({ username: targetUser }));
      }

      (async function () {
        applySavedPreferences();
        if (token && myUsername) {
          initApp();
        } else {
          await unAlert('Please log in on the homepage first.');
          window.location.href = 'index.html';
        }
      })();
    </script>
</body>

</html>
