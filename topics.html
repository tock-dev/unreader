<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://w3.org">
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>un-reader BBS - Topics</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org/face/symbola/css/symbola.css" type="text/css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="bbs.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.2/purify.min.js"></script>
  <script src="common.js"></script>
  <style type="text/css">
    #sidebar-cell {
      overflow-y: auto;
    }

    #chat-cell {
      vertical-align: top;
      padding: 0;
      position: relative;
      background-color: #ffffff;
    }

    .panel-header {
      font-weight: bold;
      padding: 6px 8px;
      text-transform: uppercase;
      border-bottom: var(--border);
      border-top: var(--border);
      background: #eee;
      font-size: 10px;
      letter-spacing: 1px;
    }

    .panel-header:first-child {
      border-top: none;
    }

    #roster-list,
    #topic-list {
      max-height: 150px;
      overflow-y: auto;
      background: white;
    }

    .roster-user {
      padding: 4px 8px;
      border-bottom: 1px solid #eee;
      font-size: 11px;
    }

    .roster-name {
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
    }

    .nav-item {
      padding: 6px 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-size: 11px;
      background: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover {
      background: #f0f0f0;
    }

    .nav-item-active {
      background-color: #000000 !important;
      color: #ffffff !important;
      font-weight: bold;
    }

    .sidebar-input-container {
      display: flex;
      padding: 4px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .sidebar-input {
      flex-grow: 1;
      padding: 3px;
      font-family: monospace;
      font-size: 11px;
      outline: none;
      border: 1px solid black;
    }

    .sidebar-btn {
      font-family: monospace;
      font-size: 10px;
      font-weight: bold;
      background: white;
      border: 1px solid black;
      margin-left: 2px;
      cursor: pointer;
    }

    .mod-indicator-btn {
      background: #fff;
      border: 2px dashed red !important;
      color: red;
      width: 95%;
      font-weight: bold;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
      padding: 4px 0;
      text-align: center;
    }

    .mod-indicator-active {
      background: red !important;
      color: white !important;
      border-style: solid !important;
    }

    #pagination-header-bar {
      padding: 6px;
      background: #eee;
      border-bottom: var(--border);
      text-align: center;
      height: 26px;
    }

    .page-btn {
      background: #ffffff;
      border: var(--border);
      padding: 2px 8px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
      box-shadow: 1px 1px 0 black;
    }

    #page-display-index {
      margin: 0 10px;
      font-weight: bold;
      font-size: 12px;
    }

    #chat-scroll-wrapper {
      position: absolute;
      top: 40px;
      bottom: 60px;
      left: 0;
      right: 0;
      overflow-y: auto;
      padding: 12px;
    }

    #input-bar-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      min-height: 52px;
      background-color: #eee;
      padding: 8px;
      box-sizing: border-box;
      border-top: var(--border);
      z-index: 20;
    }

    #content {
      float: left;
      width: 78%;
      padding: 6px;
      font-size: 13px;
      font-family: monospace;
      border: var(--border);
      outline: none;
      background: white;
      box-sizing: border-box;
      height: 32px;
      resize: none;
      overflow-y: hidden;
    }

    #send {
      float: right;
      width: 18%;
      height: 32px;
      cursor: pointer;
      font-family: monospace;
      font-weight: bold;
      font-size: 12px;
      background: white;
      border: var(--border);
      box-shadow: 2px 2px 0 black;
    }

    .message-container {
      width: 100%;
      margin-bottom: 10px;
      clear: both;
      display: block;
      position: relative;
    }

    .message {
      border: var(--border);
      padding: 6px 10px;
      max-width: 75%;
      width: auto;
      position: relative;
      background: white;
      box-shadow: 2px 2px 0px black;
    }

    .message-meta {
      font-size: 10px;
      font-weight: bold;
      color: #555;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .message-text {
      font-size: 13px;
      white-space: pre-wrap;
      line-height: 1.3;
      color: black;
    }

    .my-msg {
      border-style: dashed;
    }

    .other-msg {
      border-style: solid;
    }

    .purged-msg {
      border-style: dotted !important;
      background: #fafafa !important;
      opacity: 0.6;
    }

    .mod-msg {
      border: 3px solid #0000ff !important;
      box-shadow: 4px 4px 0px #0000ff !important;
    }

    .admin-msg {
      background: black !important;
      color: white !important;
      border: 3px solid black !important;
      box-shadow: 4px 4px 0px #888 !important;
    }

    .admin-msg .message-text,
    .admin-msg .message-meta {
      color: white !important;
    }

    .user-delete-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      border: 1px dashed black;
      background: white;
      font-size: 9px;
      cursor: pointer;
      padding: 0 4px;
      font-family: monospace;
    }

    .mod-action-tray {
      display: block;
      background: #fff;
      border: 1px dashed red;
      padding: 4px;
      font-size: 11px;
      font-family: monospace;
      margin-top: 4px;
      max-width: 75%;
      box-sizing: border-box;
    }

    .mod-tray-btn {
      background: white;
      border: 1px solid black;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 4px;
      padding: 1px 4px;
      font-family: monospace;
    }

    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.2);
      display: none;
      z-index: 2000;
    }

    .info-window {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translate(-50%, 0);
      width: 340px;
      background: white;
      border: var(--border);
      box-shadow: var(--shadow);
    }

    .info-body {
      padding: 12px;
      font-size: 12px;
      max-height: 80vh;
      overflow-y: auto;
    }

    #auth-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      display: block;
      z-index: 3000;
      text-align: center;
      padding-top: 100px;
    }

    .auth-box {
      padding: 24px;
      width: 280px;
      margin: 0 auto;
      background: white;
      border: var(--border);
      box-shadow: var(--shadow);
    }

    .auth-box input {
      width: 90%;
      padding: 6px;
      margin: 6px 0;
      font-family: monospace;
      border: var(--border);
    }

    .auth-box button {
      width: 96%;
      padding: 8px;
      margin-top: 8px;
      cursor: pointer;
      font-family: monospace;
      font-weight: bold;
      background: white;
      border: var(--border);
      box-shadow: 2px 2px 0 black;
    }

    /* E-Ink / Brutalist Dark Mode adjustments */
    body.dark-mode {
      --bg-color: #121212;
      --text-color: #ffffff;
      --border: 2px solid #ffffff;
      --shadow: 4px 4px 0px #ffffff;
      --stripe-pattern: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          #fff 3px,
          #fff 4px);
      background-color: #242424 !important;
    }

    body.dark-mode .window,
    body.dark-mode .title-bar,
    body.dark-mode .title-text,
    body.dark-mode #back-btn,
    body.dark-mode #user-display,
    body.dark-mode .nav-item,
    body.dark-mode .sidebar-input,
    body.dark-mode .sidebar-btn,
    body.dark-mode .message,
    body.dark-mode #content,
    body.dark-mode #send,
    body.dark-mode .info-window,
    body.dark-mode .auth-box,
    body.dark-mode .comment-item,
    body.dark-mode .comment-toggle-btn,
    body.dark-mode .page-btn,
    body.dark-mode .mod-indicator-btn,
    body.dark-mode #find-user-btn,
    body.dark-mode #view-logs-btn,
    body.dark-mode .mod-action-tray {
      background-color: #121212 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    body.dark-mode #sidebar-cell {
      background-color: #1a1a1a !important;
      border-right-color: #ffffff !important;
    }

    body.dark-mode #chat-cell {
      background-color: #121212 !important;
    }

    body.dark-mode .panel-header,
    body.dark-mode #pagination-header-bar,
    body.dark-mode #input-bar-container {
      background-color: #222222 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    body.dark-mode .nav-item-active {
      background-color: #ffffff !important;
      color: #000000 !important;
    }

    body.dark-mode .roster-user {
      border-bottom-color: #333 !important;
    }

    body.dark-mode .nav-item {
      border-bottom-color: #333 !important;
    }

    body.dark-mode .user-delete-btn,
    body.dark-mode .mod-tray-btn {
      background: #121212 !important;
      color: #ffffff !important;
      border-color: #ffffff !important;
    }

    body.contrast-medium {
      --border: 3px solid var(--text-color);
      --border-width: 3px;
    }

    body.contrast-high {
      --border: 4px solid var(--text-color);
      --border-width: 4px;
    }
  </style>
</head>

<body>

  <script type="text/javascript">
    var token = localStorage.getItem('token');
    var myUsername = localStorage.getItem('username');
    var currentMode = 'topic';
    var currentTarget = '';
    var socket = null;
    var isRegisterMode = false;
    var currentHistoryIndex = 0;
    var modModeActive = false;
    var userRoles = { is_admin: false, is_moderator: false };

    function log(...args) {
      if (DO_LOGGING) console.log(`[CLIENT]`, ...args);
    }

    function parseMarkdownForKindle(text) {
      // replace bold text: '**text**' -> '<strong>text</strong>'
      text = text.replace(/([\*_])([\*_](.*?)[\*_])([\*_])/g, '<strong>$2</strong>');
      // replace italic text: '*text*' -> '<i>text</i>'
      text = text.replace(/([\*_])(.*?)([\*_])/g, '<i>$2</i>');
      // replace links: '[text](url)' -> '<a href="url">text</a>'
      text = text.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>');
      // replace images: '![alt text](url)' -> '<img src="url" alt="alt text">'
      text = text.replace(/\!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">');
      // replace headers: # H1 -> <h1>H1</h1>
      text = text.replace(/\#{1} (.*?)/g, '<h1>$1</h1>');
      // replace headers: ## H2 -> <h2>H2</h2>
      text = text.replace(/\#{2} (.*?)/g, '<h2>$1</h2>');
      // replace headers: ### H3 -> <h3>H3</h3>
      text = text.replace(/\#{3} (.*?)/g, '<h3>H3</h3>');
      // replace headers: #### H4 -> <h4>H4</h4>
      text = text.replace(/\#{4} (.*?)/g, '<h4>H4</h4>');
      // replace headers: ##### H5 -> <h5>H5</h5>
      text = text.replace(/\#{5} (.*?)/g, '<h5>H5</h5>');
      // replace headers: ###### H6 -> <h6>H6</h6>
      text = text.replace(/\#{6} (.*?)/g, '<h6>H6</h6>');
      // replace unordered lists: '- item' -> '<li>item</li>'
      text = text.replace(/^(-|\*) (.*?)/g, '<li>$1</li>');
      // replace ordered lists: '1. item' -> '<li>item</li>'
      text = text.replace(/^\d\. (.*?)/g, '<li>$1</li>');
      // replace code blocks: '```code```' -> '<pre><code>code</code></pre>'
      text = text.replace(/```(.*?)```/g, '<pre><code>$1</code></pre>');
      // replace inline code: '`code`' -> '<code>code</code>'
      text = text.replace(/`(.*?)`/g, '<code>$1</code>');
      // replace blockquotes: '> quote' -> '<blockquote>quote</blockquote>'
      text = text.replace(/\>(.*?)/g, '<blockquote>$1</blockquote>');
      // replace horizontal rules: '---' -> '<hr>'
      text = text.replace(/\-\-\- /g, '<hr>');
      // replace strikethrough: '~text~' -> '<del>text</del>'
      text = text.replace(/~(.*?)~/g, '<del>$1</del>');
      return text;
    }

    function parseMarkup(text) {
      if (!text) return '';
      const escaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      if (navigator.userAgent.toLowerCase().includes('kindle')) {
        return DOMPurify.sanitize(escaped);
      }
      return DOMPurify.sanitize(marked.parse(escaped)).trim();
    }

    function formatTimeToken(unixTimestamp) {
      if (!unixTimestamp) return 'MOMENTS AGO';
      var parsedNum = Number(unixTimestamp);
      if (isNaN(parsedNum)) return 'MOMENTS AGO';
      var d = new Date(parsedNum);
      return (
        d.toLocaleDateString() +
        ' ' +
        d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      );
    }

    function toggleModMode() {
      modModeActive = !modModeActive;
      log('Mod mode toggle state:', modModeActive);
      var btn = document.getElementById('mod-mode-btn');
      btn.textContent = modModeActive ? 'MOD MODE: ACTIVE' : 'MOD MODE: OFF';
      btn.className = modModeActive
        ? 'mod-indicator-btn mod-indicator-active'
        : 'mod-indicator-btn';
      loadHistory();
    }

    document.getElementById('auth-toggle').onclick = function () {
      isRegisterMode = !isRegisterMode;
      log('Auth mode toggled. isRegisterMode:', isRegisterMode);
      document.getElementById('auth-title').textContent = isRegisterMode
        ? 'REGISTER'
        : 'LOGIN';
      this.textContent = isRegisterMode
        ? 'Already have an account? Login'
        : 'Need an account? Register';
    };

    document.getElementById('auth-submit-btn').onclick = async function () {
      var username = document.getElementById('auth-user').value.trim();
      var password = document.getElementById('auth-pass').value;
      if (!username || !password)
        return await unAlert('Fill in all log credentials.');
      var url = isRegisterMode ? '/api/register' : '/api/login';
      log('Auth submit. endpoint:', url, 'user:', username);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + url, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onreadystatechange = async function () {
        if (xhr.readyState === 4) {
          log('Auth XHR complete. status:', xhr.status);
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              localStorage.setItem('token', data.token);
              localStorage.setItem('username', data.username);
              token = data.token;
              myUsername = data.username;
              applySavedPreferences();
              initApp();
            } catch (e) {
              log('Auth JSON parse error:', e);
              await unAlert('Server returned an invalid packet signature.');
            }
          } else {
            log('Auth failed. buffer:', xhr.responseText);
            try {
              var errData = JSON.parse(xhr.responseText);
              await unAlert('Server error: ' + (errData.error || 'Access Denied'));
            } catch (e) {
              await unAlert('Structural connection failure.');
            }
          }
        }
      };
      xhr.send(JSON.stringify({ username: username, password: password }));
    };

    function initApp() {
      log('Booting application logic layers.');
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('user-display').textContent = '@' + myUsername;

      if (socket) {
        try {
          socket.close();
        } catch (e) { }
      }
      log('Opening WS link:', WS_URL);
      socket = new WebSocket(WS_URL);
      socket.onopen = function () {
        log('WS Link connected. Authenticating...');
        socket.send(JSON.stringify({ type: 'auth', token: token }));
      };
      socket.onmessage = async function (event) {
        var data = JSON.parse(event.data);
        log('Incoming packet:', data.type);
        if (data.type === 'terminated') {
          await unAlert(data.reason || 'Session expired.');
          localStorage.clear();
          window.location.reload();
          return;
        }
        if (data.type === 'error_alert') {
          await unAlert(data.message);
          return;
        }
        if (data.type === 'refresh_feed') {
          log('Broadcast: refresh_feed received.');
          loadHistory();
          return;
        }
        if (data.type === 'roster_update') {
          renderUserRoster(data.users);
          return;
        }
        if (data.type === 'topics_update') {
          renderTopicList(data.topics);
          if (data.user_roles) {
            userRoles = data.user_roles;
            log('Roles updated:', userRoles);
            if (userRoles.is_admin || userRoles.is_moderator) {
              document.getElementById('mod-toggle-container').style.display =
                'block';
              localStorage.setItem('unreader-rank', 'mod');
            } else {
              localStorage.setItem('unreader-rank', 'user');
            }
          }
          if (data.topics && data.topics.length > 0 && !currentTarget) {
            switchChannel('topic', data.topics[0].slug);
          }
          return;
        }
        if (currentHistoryIndex === 0) loadHistory();
      };
      loadHistory();
    }

    function renderUserRoster(userList) {
      log('Showing users:', userList);
      var container = document.getElementById('roster-list');
      container.innerHTML = '';
      for (var i = 0; i < userList.length; i++) {
        var u = userList[i];
        var div = document.createElement('div');
        div.className = 'roster-user';
        var span = document.createElement('span');
        span.className = 'roster-name';
        var context = u.mode === 'public' ? ' (Global)' : u.mode === 'dm' ? ' (DM @' + u.target + ')' : ' (' + u.target + ')';
        span.textContent = u.username + context;
        (function (username) {
          span.onclick = function () {
            openProfileModal(username);
          };
        })(u);
        div.appendChild(span);
        container.appendChild(div);
      }
    }

    function renderTopicList(topics) {
      var container = document.getElementById('topic-list');
      container.innerHTML = '';
      for (var i = 0; i < topics.length; i++) {
        var t = topics[i];
        var div = document.createElement('div');
        div.className = 'nav-item';
        div.id = 'nav-topic-' + t.slug;
        div.textContent = '# ' + t.title;
        (function (slug) {
          div.onclick = function () {
            switchChannel('topic', slug);
          };
        })(t.slug);
        if (currentTarget === t.slug) {
          div.className = 'nav-item nav-item-active';
        }
        container.appendChild(div);
      }
    }

    function triggerCreateTopic() {
      var inp = document.getElementById('topic-target-input');
      var title = inp.value.trim();
      if (!title) return;
      if (socket && socket.readyState === WebSocket.OPEN) {
        log('Sending create_topic request.');
        socket.send(JSON.stringify({ type: 'create_topic', title: title }));
      }
      inp.value = '';
    }

    function switchChannel(mode, target) {
      log('Switching topic room. target:', target);
      currentMode = 'topic';
      currentTarget = target || '';
      currentHistoryIndex = 0;

      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'switch_context', mode: 'topic', target: target }));
      }

      var items = document.getElementsByClassName('nav-item');
      for (var i = 0; i < items.length; i++) items[i].className = 'nav-item';
      var node = document.getElementById('nav-topic-' + target);
      if (node) node.className = 'nav-item nav-item-active';
      loadHistory();
    }

    function appendMessage(data) {
      log('APPEND_MESSAGE payload details:', JSON.stringify(data));
      var chatWrapper = document.getElementById('chat-scroll-wrapper');
      var containerDiv = document.createElement('div');
      containerDiv.className = 'message-container';
      var msgDiv = document.createElement('div');
      msgDiv.id = 'msg-id-' + data.id;
      var effectiveUsername = data.username || data.sender || 'UNKNOWN_NODE';
      var isMe = effectiveUsername === myUsername;
      msgDiv.style.float = isMe ? 'right' : 'left';

      var styleClass = 'message ';
      if (data.is_deleted) styleClass += 'purged-msg';
      else {
        if (data.is_admin) styleClass += 'admin-msg';
        else if (data.is_moderator) styleClass += 'mod-msg';
        else styleClass += isMe ? 'my-msg' : 'other-msg';
      }
      msgDiv.className = styleClass;

      var timeStr = formatTimeToken(data.timestamp);
      var meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.style.cursor = 'pointer';
      var nameDisplay =
        (data.is_admin ? 'ADMIN ' : data.is_moderator ? 'MOD ' : '') +
        effectiveUsername;
      meta.textContent = nameDisplay + ' • ' + timeStr;
      (function (username) {
        meta.onclick = function () {
          openProfileModal(username);
        };
      })(effectiveUsername);

      var txtBody = document.createElement('div');
      txtBody.className = 'message-text';
      msgDiv.appendChild(meta);
      msgDiv.appendChild(txtBody);

      if (data.is_deleted) {
        txtBody.innerHTML = '<em>[MESSAGE PURGED]</em>';
      } else {
        txtBody.innerHTML = parseMarkup(data.content);
        if (isMe && data.id !== -1) {
          var selfDelBtn = document.createElement('button');
          selfDelBtn.className = 'user-delete-btn';
          selfDelBtn.textContent = 'X';
          selfDelBtn.onclick = async function () {
            if (await unConfirm('Delete message?'))
              sendModAction('mod_delete', data.id);
          };
          msgDiv.appendChild(selfDelBtn);
        }

      }
      containerDiv.appendChild(msgDiv);
      injectModTray(containerDiv, data, isMe);
      chatWrapper.appendChild(containerDiv);
      chatWrapper.scrollTop = chatWrapper.scrollHeight;
    }

    function injectModTray(targetNode, data, isMe) {
      if (
        (!userRoles.is_admin && !userRoles.is_moderator) ||
        !modModeActive ||
        data.id === -1
      )
        return;
      var trayDiv = document.createElement('div');
      trayDiv.className = 'mod-action-tray';
      trayDiv.style.float = isMe ? 'right' : 'left';
      trayDiv.style.clear = 'both';

      if (!data.is_deleted) {
        var dBtn = document.createElement('button');
        dBtn.className = 'mod-tray-btn';
        dBtn.textContent = 'PURGE';
        dBtn.onclick = async function () {
          var r = await unPrompt('Reason for purge?');
          if (r !== null) sendModAction('mod_delete', data.id, r);
        };
        trayDiv.appendChild(dBtn);
      }

      else {
        if (
          userRoles.is_admin ||
          (userRoles.is_moderator && data.deleted_by === myUsername)
        ) {
          var rBtn = document.createElement('button');
          rBtn.className = 'mod-tray-btn';
          rBtn.textContent = 'RESTORE';
          rBtn.onclick = function () {
            log('Sending restore packet for id:', data.id);
            sendModAction('mod_restore', data.id);
          };
          trayDiv.appendChild(rBtn);
        }
      }
      targetNode.appendChild(trayDiv);
    }

    function sendModAction(type, id, reason) {
      log('Dispatching moderator action packet:', type);
      socket.send(
        JSON.stringify({
          type: type,
          id: id,
          channel: currentMode,
          reason: reason,
        }),
      );
    }

    function jumpPage(val) {
      currentHistoryIndex = Math.max(0, currentHistoryIndex + val);
      loadHistory();
    }

    function loadHistory() {
      if (!currentTarget) {
        document.getElementById('chat-scroll-wrapper').innerHTML =
          '<div style="padding:20px; text-align:center; font-style:italic; font-size:12px;">Please select or create a topic from the sidebar.</div>';
        return;
      }
      log(
        'Refreshing topic data view. space:',
        currentMode,
        'target:',
        currentTarget,
        'index:',
        currentHistoryIndex,
      );
      var wrapper = document.getElementById('chat-scroll-wrapper');
      wrapper.innerHTML = '';
      var xhr = new XMLHttpRequest();
      var endpoint = '/topic-history?slug=' + currentTarget + '&index=';
      xhr.open('GET', BACKEND_URL + endpoint + currentHistoryIndex, true);
      if (token) xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          log('History stream synced.');
          var data = JSON.parse(xhr.responseText);
          document.getElementById('page-display-index').textContent =
            'PAGE: ' + currentHistoryIndex;
          for (var i = 0; i < data.length; i++) {
            appendMessage(data[i]);
          }
        }
      };
      xhr.send();
    }

    async function sendMessage() {
      var input = document.getElementById('content');
      var text = input.value.trim();
      if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
      if (!currentTarget) return await unAlert('Please select a topic room first.');
      log('Dispatching topic message.');
      socket.send(
        JSON.stringify({
          type: 'topic_message',
          content: text,
          target: currentTarget,
        }),
      );
      input.value = '';
      input.style.height = '32px';
    }

    document.getElementById('send').onclick = sendMessage;
    document.getElementById('content').onkeydown = function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };
    document.getElementById('content').oninput = function () {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    };

    function openProfileModal(targetUser) {
      log('Pulling profile metadata for:', targetUser);
      var xhr = new XMLHttpRequest();
      xhr.open('GET', BACKEND_URL + '/api/profile/' + targetUser, true);
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var p = JSON.parse(xhr.responseText);
          showProfileInModal(p);
        }
      };
      xhr.send();
    }

    function showProfileInModal(p) {
      log('Profile modal view active.');
      if (!p) {
        document.getElementById('modal-overlay').style.display = 'block';
        return;
      }

      document.getElementById('info-username').textContent = p.username;
      document.getElementById('info-location').textContent = p.location;
      document.getElementById('info-bio').textContent = p.bio;
      document.getElementById('info-avatar').textContent = p.avatar_emoji;

      var isSelf = p.username === myUsername;
      document.getElementById('info-edit-controls').style.display = isSelf
        ? 'block'
        : 'none';
      document.getElementById('info-dm-btn').style.display = isSelf
        ? 'none'
        : 'block';
      document.getElementById('info-dm-btn').onclick = function () {
        closeInfoModal();
        window.location.href = 'chat.html';
      }; // Direct messages on chat.html

      if (isSelf) {
        document.getElementById('edit-avatar').value = p.avatar_emoji;
        document.getElementById('edit-location').value = p.location;
        document.getElementById('edit-bio').value = p.bio;
        document.getElementById('change-pass-current').value = '';
        document.getElementById('change-pass-new').value = '';
      }

      if (userRoles.is_admin) {
        document.getElementById('admin-controls').style.display = 'block';
        document.getElementById('admin-ban-btn').style.display =
          'inline-block';
        document.getElementById('admin-pardon-btn').style.display =
          'inline-block';
        document.getElementById('admin-ban-btn').onclick = async function () {
          if (await unConfirm('Ban ' + p.username + '?'))
            socket.send(
              JSON.stringify({ type: 'mod_ban', target: p.username }),
            );
        };
        document.getElementById('admin-pardon-btn').onclick = function () {
          socket.send(
            JSON.stringify({ type: 'mod_pardon', target: p.username }),
          );
        };
        document.getElementById('admin-timeout-btn').onclick = function () {
          var dur = document.getElementById('admin-timeout-dur').value;
          socket.send(
            JSON.stringify({
              type: 'mod_timeout',
              target: p.username,
              duration: dur,
            }),
          );
        };
      } else if (userRoles.is_moderator && !isSelf) {
        document.getElementById('admin-controls').style.display = 'block';
        document.getElementById('admin-ban-btn').style.display = 'none';
        document.getElementById('admin-pardon-btn').style.display = 'none';
        document.getElementById('admin-timeout-btn').onclick = async function () {
          var dur = document.getElementById('admin-timeout-dur').value;
          var r = await unPrompt('Reason for timeout?');
          if (r)
            socket.send(
              JSON.stringify({
                type: 'mod_timeout',
                target: p.username,
                duration: dur,
                reason: r,
              }),
            );
        };
      } else {
        document.getElementById('admin-controls').style.display = 'none';
      }
      document.getElementById('modal-overlay').style.display = 'block';
    }

    function closeInfoModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    function saveProfileChanges() {
      var av = document.getElementById('edit-avatar').value.trim();
      var loc = document.getElementById('edit-location').value.trim();
      var bio = document.getElementById('edit-bio').value.trim();
      log('Sending profile update packet.');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/profile', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          closeInfoModal();
          openProfileModal(myUsername);
        }
      };
      xhr.send(JSON.stringify({ bio: bio, location: loc, avatar_emoji: av }));
    }

    async function submitPasswordChange() {
      var currentPass = document.getElementById('change-pass-current').value;
      var newPass = document.getElementById('change-pass-new').value;
      if (!currentPass || !newPass)
        return await unAlert('Please fill out both password fields.');
      log('Sending security parameter update packet.');
      var xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/change-password', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onreadystatechange = async function () {
        if (xhr.readyState === 4) {
          var res = JSON.parse(xhr.responseText);
          if (xhr.status === 200 && res.success) {
            await unAlert('Password updated!');
            closeInfoModal();
          } else await unAlert(res.error || 'Failed to update password.');
        }
      };
      xhr.send(
        JSON.stringify({
          currentPassword: currentPass,
          newPassword: newPass,
        }),
      );
    }

    if (token && myUsername) {
      initApp();
    }
  </script>
</body>
